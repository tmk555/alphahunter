    setLoading(false);
  }

  useEffect(() => { loadStatus(); }, []);

  async function calcSize() {
    if (!sizeEntry || !sizeStop) return;
    try {
      const d = await api('/api/portfolio/size', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ entryPrice: +sizeEntry, stopPrice: +sizeStop }),
      });
      setSizing(d);
    } catch(e) { setError(e.message); }
  }

  async function saveConfig() {
    try {
      const c = await api('/api/portfolio/config', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(cfgForm),
      });
      setConfig(c); setEditConfig(false); loadStatus();
    } catch(e) { setError(e.message); }
  }

  const heatColor = h => h >= 8 ? 'var(--red)' : h >= 5 ? 'var(--amber)' : 'var(--green)';
  const ddColor  = d => d >= 10 ? 'var(--red)' : d >= 5 ? 'var(--amber)' : 'var(--green)';

  return (
    <div>
      <div className="panel" style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            <div className="panel-title">Portfolio <span>Dashboard</span></div>
            <div className="panel-sub">Risk management — portfolio heat, sector exposure, drawdown circuit breaker</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary" onClick={()=>setEditConfig(!editConfig)}>
              {editConfig ? '✕ Cancel' : '⚙ Config'}
            </button>
            <button className="btn btn-primary" onClick={loadStatus} disabled={loading}>⟳ Refresh</button>
          </div>
        </div>
        {error && <ErrorBox msg={error}/>}
      </div>

      {loading && <div className="panel"><Loader msg="Loading portfolio status..."/></div>}

      {/* Config Editor */}
      {editConfig && config && (
        <div className="panel" style={{marginBottom:14}}>
          <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>PORTFOLIO CONFIGURATION</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>
            {[
              {key:'accountSize',label:'Account Size ($)',type:'number'},
              {key:'riskPerTrade',label:'Risk Per Trade (%)',type:'number',step:'0.1'},
              {key:'maxPositionPct',label:'Max Position (%)',type:'number'},
              {key:'maxPortfolioHeat',label:'Max Portfolio Heat (%)',type:'number'},
              {key:'maxSectorPct',label:'Max Sector Exposure (%)',type:'number'},
              {key:'maxIndustryPositions',label:'Max Same-Industry',type:'number'},
            ].map(f => (
              <div key={f.key}>
                <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>{f.label}</label>
                <input type={f.type} step={f.step||'1'} value={cfgForm[f.key]||''} onChange={e=>setCfgForm({...cfgForm,[f.key]:+e.target.value})}
                  style={{width:'100%',padding:'6px 8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13,fontFamily:'var(--font-mono)'}}/>
              </div>
            ))}
          </div>
          <button className="btn btn-primary" onClick={saveConfig} style={{marginTop:10}}>Save Config</button>
        </div>
      )}

      {status && (
        <div>
          {/* Top Metrics Row */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12,marginBottom:14}}>
            {/* Portfolio Heat */}
            <div className="panel" style={{padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>PORTFOLIO HEAT</div>
              <div style={{fontSize:36,fontWeight:800,color:heatColor(status.heat?.totalHeatPct||0),fontFamily:'var(--font-mono)'}}>
                {fmt(status.heat?.totalHeatPct||0,1)}%
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>
                of {fmt(config?.maxPortfolioHeat||8,0)}% max · {status.heat?.positionsAtRisk||0} positions at risk
              </div>
              <div style={{marginTop:8,height:6,background:'var(--bg3)',borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${Math.min((status.heat?.totalHeatPct||0)/(config?.maxPortfolioHeat||8)*100,100)}%`,background:heatColor(status.heat?.totalHeatPct||0),borderRadius:3,transition:'width 0.3s'}}/>
              </div>
            </div>

            {/* Drawdown */}
            <div className="panel" style={{padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>DRAWDOWN STATUS</div>
              <div style={{fontSize:36,fontWeight:800,color:ddColor(Math.abs(status.drawdown?.drawdownPct||0)),fontFamily:'var(--font-mono)'}}>
                {fmt(status.drawdown?.drawdownPct||0,1)}%
              </div>
              <div style={{fontSize:11,color:ddColor(Math.abs(status.drawdown?.drawdownPct||0)),marginTop:4,fontWeight:700}}>
                {status.drawdown?.action || 'Normal'}
              </div>
            </div>

            {/* Regime */}
            <div className="panel" style={{padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>MARKET REGIME</div>
              <div style={{fontSize:20,fontWeight:800,color:status.regime?.mode==='BULL / RISK ON'?'var(--green)':status.regime?.mode==='NEUTRAL'?'var(--amber)':'var(--red)',fontFamily:'var(--font-mono)'}}>
                {status.regime?.mode || '—'}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>
                Size multiplier: <strong>{status.regime?.sizeMultiplier || 1}x</strong>
              </div>
            </div>

            {/* Open Positions */}
            <div className="panel" style={{padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>OPEN POSITIONS</div>
              <div style={{fontSize:36,fontWeight:800,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>
                {status.openPositions || 0}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>
                Account: ${(config?.accountSize||100000).toLocaleString()}
              </div>
            </div>
          </div>

          {/* Sector Exposure */}
          {status.exposure && Object.keys(status.exposure).length > 0 && (
            <div className="panel" style={{marginBottom:14,padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>SECTOR EXPOSURE</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {Object.entries(status.exposure).sort((a,b)=>b[1]-a[1]).map(([sec,pct]) => (
                  <div key={sec} style={{padding:'6px 12px',background:'var(--bg3)',border:`1px solid ${pct>25?'var(--red)':'var(--border)'}`,borderRadius:4,fontSize:12}}>
                    <span style={{color:'var(--text2)'}}>{sec}</span>
                    <span style={{color:pct>25?'var(--red)':'var(--cyan)',fontWeight:700,marginLeft:8,fontFamily:'var(--font-mono)'}}>{fmt(pct,1)}%</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Position Sizer */}
          <div className="panel" style={{padding:14}}>
            <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>POSITION SIZER</div>
            <div style={{display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap'}}>
              <div>
                <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Entry Price</label>
                <input type="number" value={sizeEntry} onChange={e=>setSizeEntry(e.target.value)} placeholder="0.00"
                  style={{width:120,padding:'6px 8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13,fontFamily:'var(--font-mono)'}}/>
              </div>
              <div>
                <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Stop Price</label>
                <input type="number" value={sizeStop} onChange={e=>setSizeStop(e.target.value)} placeholder="0.00"
                  style={{width:120,padding:'6px 8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13,fontFamily:'var(--font-mono)'}}/>
              </div>
              <button className="btn btn-primary" onClick={calcSize}>Calculate</button>
            </div>
            {sizing && (
              <div style={{marginTop:12,display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:8}}>
                {[
                  {label:'Shares',val:sizing.shares,color:'var(--cyan)'},
                  {label:'Position $',val:'$'+Number(sizing.positionValue||0).toLocaleString(),color:'var(--text)'},
                  {label:'Risk $',val:'$'+fmt(sizing.dollarRisk,0),color:'var(--red)'},
                  {label:'Portfolio %',val:fmt(sizing.portfolioPct,1)+'%',color:'var(--amber)'},
                  {label:'Risk/Trade %',val:fmt(sizing.riskPct,2)+'%',color:'var(--amber)'},
                  {label:'Regime',val:sizing.regime||'—',color:'var(--green)'},
                ].map(m => (
                  <div key={m.label} style={{padding:'8px',background:'var(--bg3)',borderRadius:3,textAlign:'center'}}>
                    <div style={{fontSize:10,color:'var(--text3)',marginBottom:3}}>{m.label}</div>
                    <div style={{fontSize:16,fontWeight:700,color:m.color,fontFamily:'var(--font-mono)'}}>{m.val}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TRADE JOURNAL TAB ─────────────────────────────────────────────────────
function TradeJournalTab() {
  const [trades, setTrades]     = useState([]);
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');
  const [filter, setFilter]     = useState('all');
  const [showEntry, setShowEntry] = useState(false);
  const [showExit, setShowExit] = useState(null);
  const [form, setForm]         = useState({symbol:'',entry_price:'',stop_price:'',target1:'',shares:'',side:'long',sector:'',notes:''});
  const [exitForm, setExitForm] = useState({exit_price:'',exit_reason:'stop',notes:''});

  async function loadTrades() {
    setLoading(true); setError('');
    try {
      const d = await api(`/api/trades?status=${filter}&limit=100`);
      setTrades(d.trades || []);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  useEffect(() => { loadTrades(); }, [filter]);

  async function logEntry() {
    if (!form.symbol || !form.entry_price) return;
    try {
      await api('/api/trades', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({...form, entry_price:+form.entry_price, stop_price:+form.stop_price||undefined, target1:+form.target1||undefined, shares:+form.shares||undefined}),
      });
      setForm({symbol:'',entry_price:'',stop_price:'',target1:'',shares:'',side:'long',sector:'',notes:''});
      setShowEntry(false); loadTrades();
    } catch(e) { setError(e.message); }
  }

  async function logExit(id) {
    if (!exitForm.exit_price) return;
    try {
      await api(`/api/trades/${id}`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({...exitForm, exit_price:+exitForm.exit_price}),
      });
      setShowExit(null); setExitForm({exit_price:'',exit_reason:'stop',notes:''}); loadTrades();
    } catch(e) { setError(e.message); }
  }

  const pnlColor = v => v > 0 ? 'var(--green)' : v < 0 ? 'var(--red)' : 'var(--text3)';

  return (
    <div>
      <div className="panel" style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <div>
            <div className="panel-title">Trade <span>Journal</span></div>
            <div className="panel-sub">Log entries and exits — track R-multiples and P&L</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <div className="btn-group">
              {['all','open','closed'].map(f => (
                <button key={f} className={`mode-btn ${filter===f?'active':''}`} onClick={()=>setFilter(f)}>
                  {f.charAt(0).toUpperCase()+f.slice(1)}
                </button>
              ))}
            </div>
            <button className="btn btn-primary" onClick={()=>setShowEntry(!showEntry)}>
              {showEntry ? '✕ Cancel' : '+ New Trade'}
            </button>
          </div>
        </div>
        {error && <ErrorBox msg={error}/>}
      </div>

      {/* Entry Form */}
      {showEntry && (
        <div className="panel" style={{marginBottom:14}}>
          <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>LOG NEW ENTRY</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:8}}>
            {[
              {key:'symbol',label:'Symbol',ph:'NVDA'},
              {key:'entry_price',label:'Entry Price',ph:'0.00',type:'number'},
              {key:'stop_price',label:'Stop Price',ph:'0.00',type:'number'},
              {key:'target1',label:'Target 1',ph:'0.00',type:'number'},
              {key:'shares',label:'Shares',ph:'100',type:'number'},
              {key:'sector',label:'Sector',ph:'Technology'},
            ].map(f => (
              <div key={f.key}>
                <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>{f.label}</label>
                <input type={f.type||'text'} value={form[f.key]} onChange={e=>setForm({...form,[f.key]:e.target.value})} placeholder={f.ph}
                  style={{width:'100%',padding:'6px 8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13,fontFamily:'var(--font-mono)'}}/>
              </div>
            ))}
          </div>
          <div style={{marginTop:8}}>
            <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Notes</label>
            <input value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Trade thesis, setup type..."
              style={{width:'100%',padding:'6px 8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13}}/>
          </div>
          <button className="btn btn-primary" onClick={logEntry} style={{marginTop:10}}>Log Entry</button>
        </div>
      )}

      {loading && <div className="panel"><Loader msg="Loading trades..."/></div>}

      {/* Trades Table */}
      {trades.length > 0 && (
        <div className="panel" style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr style={{borderBottom:'1px solid var(--border)'}}>
                {['Symbol','Side','Entry','Stop','Target','Shares','Entry Date','Exit','P&L %','R-Multiple','Reason',''].map(h =>
                  <th key={h} style={{padding:'8px 6px',textAlign:'left',fontSize:10,color:'var(--text3)',letterSpacing:1,fontFamily:'var(--font-mono)'}}>{h}</th>
                )}
              </tr>
            </thead>
            <tbody>
              {trades.map(t => (
                <tr key={t.id} style={{borderBottom:'1px solid var(--border)'}}>
                  <td style={{padding:'8px 6px',fontWeight:700,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>{t.symbol}</td>
                  <td style={{padding:'8px 6px',color:t.side==='long'?'var(--green)':'var(--red)'}}>{t.side}</td>
                  <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>${fmt(t.entry_price)}</td>
                  <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',color:'var(--red)'}}>{t.stop_price?'$'+fmt(t.stop_price):'—'}</td>
                  <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',color:'var(--green)'}}>{t.target1?'$'+fmt(t.target1):'—'}</td>
                  <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>{t.shares||'—'}</td>
                  <td style={{padding:'8px 6px',color:'var(--text3)'}}>{t.entry_date}</td>
                  <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>
                    {t.exit_price ? '$'+fmt(t.exit_price) : <span style={{color:'var(--cyan)'}}>OPEN</span>}
                  </td>
                  <td style={{padding:'8px 6px',fontWeight:700,color:pnlColor(t.pnl_percent),fontFamily:'var(--font-mono)'}}>
                    {t.pnl_percent != null ? (t.pnl_percent>0?'+':'')+fmt(t.pnl_percent,1)+'%' : '—'}
                  </td>
                  <td style={{padding:'8px 6px',fontWeight:700,color:pnlColor(t.r_multiple),fontFamily:'var(--font-mono)'}}>
                    {t.r_multiple != null ? (t.r_multiple>0?'+':'')+fmt(t.r_multiple,2)+'R' : '—'}
                  </td>
                  <td style={{padding:'8px 6px',color:'var(--text3)',fontSize:10}}>{t.exit_reason||''}</td>
                  <td style={{padding:'8px 6px'}}>
                    {!t.exit_date && (
                      showExit === t.id ? (
                        <div style={{display:'flex',gap:4,alignItems:'center'}}>
                          <input type="number" value={exitForm.exit_price} onChange={e=>setExitForm({...exitForm,exit_price:e.target.value})} placeholder="Exit $"
                            style={{width:80,padding:'3px 5px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:11,fontFamily:'var(--font-mono)'}}/>
                          <select value={exitForm.exit_reason} onChange={e=>setExitForm({...exitForm,exit_reason:e.target.value})}
                            style={{padding:'3px 5px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:11}}>
                            {['stop','target1','target2','manual','regime_change'].map(r=><option key={r} value={r}>{r}</option>)}
                          </select>
                          <button onClick={()=>logExit(t.id)} style={{padding:'3px 8px',background:'var(--red)',border:'none',borderRadius:3,color:'#fff',fontSize:10,cursor:'pointer'}}>Exit</button>
                          <button onClick={()=>setShowExit(null)} style={{padding:'3px 6px',background:'transparent',border:'1px solid var(--border)',borderRadius:3,color:'var(--text3)',fontSize:10,cursor:'pointer'}}>x</button>
                        </div>
                      ) : (
                        <button onClick={()=>setShowExit(t.id)} style={{padding:'3px 8px',background:'rgba(255,61,87,0.15)',border:'1px solid rgba(255,61,87,0.3)',borderRadius:3,color:'var(--red)',fontSize:10,cursor:'pointer'}}>Close</button>
                      )
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {!loading && trades.length === 0 && (
        <div className="panel" style={{textAlign:'center',padding:30,color:'var(--text3)'}}>
          No trades yet — click <strong>+ New Trade</strong> to log your first entry
        </div>
      )}
    </div>
  );
}

// ─── PERFORMANCE TAB ───────────────────────────────────────────────────────
function PerformanceTab() {
  const [perf, setPerf]       = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');

  async function loadPerf() {
    setLoading(true); setError('');
    try {
      const d = await api('/api/trades/performance');
      setPerf(d);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  useEffect(() => { loadPerf(); }, []);

  return (
    <div>
      <div className="panel" style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            <div className="panel-title">Trading <span>Performance</span></div>
            <div className="panel-sub">Win rate, profit factor, R-multiples, Kelly criterion — track your edge</div>
          </div>
          <button className="btn btn-primary" onClick={loadPerf} disabled={loading}>⟳ Refresh</button>
        </div>
        {error && <ErrorBox msg={error}/>}
      </div>

      {loading && <div className="panel"><Loader msg="Loading performance data..."/></div>}

      {perf && !perf.totalTrades && (
        <div className="panel" style={{textAlign:'center',padding:40,color:'var(--text3)'}}>
          <div style={{fontSize:18,marginBottom:8}}>No closed trades yet</div>
          <div style={{fontSize:12}}>Log trades in the <strong>Trade Journal</strong> tab, then close them to see performance metrics here.</div>
        </div>
      )}

      {perf && perf.totalTrades > 0 && (
        <div>
          {/* Key Metrics */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:14}}>
            {[
              {label:'Win Rate',val:`${fmt(perf.winRate,1)}%`,color:perf.winRate>=50?'var(--green)':'var(--red)',sub:`${perf.wins}W / ${perf.losses}L`},
              {label:'Profit Factor',val:perf.profitFactor===Infinity?'∞':fmt(perf.profitFactor,2),color:perf.profitFactor>=1.5?'var(--green)':perf.profitFactor>=1?'var(--amber)':'var(--red)',sub:'gross wins / gross losses'},
              {label:'Avg R-Multiple',val:(perf.avgRMultiple>0?'+':'')+fmt(perf.avgRMultiple,2)+'R',color:perf.avgRMultiple>0?'var(--green)':'var(--red)',sub:`W: +${fmt(perf.avgWinR,2)}R / L: ${fmt(perf.avgLossR,2)}R`},
              {label:'Total P&L',val:'$'+Number(perf.totalPnl).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}),color:perf.totalPnl>=0?'var(--green)':'var(--red)',sub:`${perf.totalTrades} closed trades`},
              {label:'Avg Win',val:`+${fmt(perf.avgWinPct,1)}%`,color:'var(--green)',sub:'per winning trade'},
              {label:'Avg Loss',val:`${fmt(perf.avgLossPct,1)}%`,color:'var(--red)',sub:'per losing trade'},
              {label:'Kelly Optimal',val:`${fmt(perf.kellyOptimalPct,1)}%`,color:'var(--cyan)',sub:'optimal risk per trade'},
              {label:'Gross Wins',val:'$'+Number(perf.grossWins).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}),color:'var(--green)',sub:'total winning $'},
            ].map(m => (
              <div key={m.label} className="panel" style={{padding:14,textAlign:'center'}}>
                <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:6}}>{m.label.toUpperCase()}</div>
                <div style={{fontSize:24,fontWeight:800,color:m.color,fontFamily:'var(--font-mono)'}}>{m.val}</div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>{m.sub}</div>
              </div>
            ))}
          </div>

          {/* Recent Trades */}
          {perf.recentTrades?.length > 0 && (
            <div className="panel" style={{overflowX:'auto'}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>RECENT CLOSED TRADES</div>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    {['Symbol','Entry','Exit','P&L %','R-Multiple','Reason'].map(h =>
                      <th key={h} style={{padding:'6px',textAlign:'left',fontSize:10,color:'var(--text3)',letterSpacing:1,fontFamily:'var(--font-mono)'}}>{h}</th>
                    )}
                  </tr>
                </thead>
                <tbody>
                  {perf.recentTrades.map((t,i) => (
                    <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                      <td style={{padding:'6px',fontWeight:700,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>{t.symbol}</td>
                      <td style={{padding:'6px',color:'var(--text3)'}}>{t.entry_date}</td>
                      <td style={{padding:'6px',color:'var(--text3)'}}>{t.exit_date}</td>
                      <td style={{padding:'6px',fontWeight:700,color:t.pnl_percent>0?'var(--green)':'var(--red)',fontFamily:'var(--font-mono)'}}>
                        {t.pnl_percent>0?'+':''}{fmt(t.pnl_percent,1)}%
                      </td>
                      <td style={{padding:'6px',fontWeight:700,color:t.r_multiple>0?'var(--green)':'var(--red)',fontFamily:'var(--font-mono)'}}>
                        {t.r_multiple>0?'+':''}{fmt(t.r_multiple,2)}R
                      </td>
                      <td style={{padding:'6px',color:'var(--text3)',fontSize:10}}>{t.exit_reason}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
