                {broker.broker?.paper ? 'Paper Trading' : 'LIVE Trading'} · {broker.broker?.status || '—'}
              </div>
            </div>

            <div className="panel" style={{padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>EQUITY</div>
              <div style={{fontSize:28,fontWeight:800,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>
                ${broker.broker?.equity ? Number(broker.broker.equity).toLocaleString() : '—'}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>
                Buying Power: ${broker.broker?.buyingPower ? Number(broker.broker.buyingPower).toLocaleString() : '—'}
              </div>
            </div>

            <div className="panel" style={{padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>CASH</div>
              <div style={{fontSize:28,fontWeight:800,color:'var(--green)',fontFamily:'var(--font-mono)'}}>
                ${broker.broker?.cash ? Number(broker.broker.cash).toLocaleString() : '—'}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>
                PDT: {broker.broker?.patternDayTrader ? 'Yes' : 'No'}
              </div>
            </div>

            <div className="panel" style={{padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>STOP MONITOR</div>
              <div style={{fontSize:20,fontWeight:800,color:broker.monitor?.running?'var(--green)':'var(--red)',fontFamily:'var(--font-mono)'}}>
                {broker.monitor?.running ? 'ACTIVE' : 'STOPPED'}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>
                Checks: {broker.monitor?.totalChecks || 0} · Alerts: {broker.monitor?.activeAlerts || 0}
              </div>
            </div>
          </div>

          {/* Quick Stats */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12}}>
            <div className="panel" style={{padding:14,cursor:'pointer'}} onClick={()=>setSection('positions')}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:4}}>BROKER POSITIONS</div>
                  <div style={{fontSize:24,fontWeight:800,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>{positions.length}</div>
                </div>
                <div style={{fontSize:24,opacity:0.3}}>→</div>
              </div>
            </div>

            <div className="panel" style={{padding:14,cursor:'pointer'}} onClick={()=>setSection('staged')}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:4}}>STAGED ORDERS</div>
                  <div style={{fontSize:24,fontWeight:800,color:'var(--amber)',fontFamily:'var(--font-mono)'}}>{staged.filter(s=>s.status==='staged').length}</div>
                </div>
                <div style={{fontSize:24,opacity:0.3}}>→</div>
              </div>
            </div>

            <div className="panel" style={{padding:14,cursor:'pointer'}} onClick={()=>setSection('alerts')}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:4}}>ACTIVE ALERTS</div>
                  <div style={{fontSize:24,fontWeight:800,color:'var(--amber)',fontFamily:'var(--font-mono)'}}>{subs.length}</div>
                </div>
                <div style={{fontSize:24,opacity:0.3}}>→</div>
              </div>
            </div>
          </div>

          {/* Recent Fired Alerts */}
          {firedAlerts.length > 0 && (
            <div className="panel" style={{marginTop:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>RECENT ALERTS</div>
              {firedAlerts.slice(0,5).map(a => (
                <div key={a.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:14}}>{a.type==='stop_violation'?'🛑':a.type==='price_above'?'📈':'📉'}</span>
                    <div>
                      <div style={{fontSize:12,color:'var(--text)',fontWeight:600}}>{a.symbol}</div>
                      <div style={{fontSize:10,color:'var(--text3)'}}>{a.message}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--font-mono)'}}>{a.created_at}</span>
                    {!a.acknowledged && (
                      <button onClick={()=>acknowledgeAlert(a.id)}
                        style={{padding:'2px 8px',background:'rgba(240,165,0,0.12)',border:'1px solid rgba(240,165,0,0.3)',borderRadius:3,color:'var(--amber)',fontSize:9,cursor:'pointer',fontWeight:700}}>ACK</button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ─── STAGED ORDERS ────────────────────────── */}
      {section==='staged' && (
        <div>
          <div className="panel" style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)'}}>STAGED BRACKET ORDERS</div>
              <button className="btn btn-primary btn-sm" onClick={()=>setShowStageForm(!showStageForm)}>
                {showStageForm ? '✕ Cancel' : '+ Stage Order'}
              </button>
            </div>

            <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:4,padding:'8px 12px',marginBottom:12,fontSize:11,color:'var(--text2)'}}>
              Stage bracket orders here, then submit with one click. Each submission runs a pre-trade risk check (portfolio heat, sector exposure, regime) before sending to Alpaca.
            </div>

            {/* Stage Form */}
            {showStageForm && (
              <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:4,padding:14,marginBottom:12}}>
                <div style={{fontSize:10,color:'var(--amber)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>NEW STAGED ORDER</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:8}}>
                  {[
                    {key:'symbol',label:'Symbol',ph:'AAPL'},
                    {key:'entry_price',label:'Entry Price',ph:'0.00',type:'number'},
                    {key:'stop_price',label:'Stop Price',ph:'0.00',type:'number'},
                    {key:'target1_price',label:'Target Price',ph:'0.00',type:'number'},
                    {key:'qty',label:'Shares',ph:'100',type:'number'},
                  ].map(f => (
                    <div key={f.key}>
                      <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>{f.label}</label>
                      <input type={f.type||'text'} value={stageForm[f.key]} onChange={e=>setStageForm({...stageForm,[f.key]:e.target.value})} placeholder={f.ph}
                        style={{width:'100%',padding:'6px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13,fontFamily:'var(--font-mono)'}}/>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:8}}>
                  <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Notes</label>
                  <input value={stageForm.notes} onChange={e=>setStageForm({...stageForm,notes:e.target.value})} placeholder="Setup type, thesis..."
                    style={{width:'100%',padding:'6px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13}}/>
                </div>
                <button className="btn btn-primary btn-sm" onClick={stageOrder} style={{marginTop:10}}>Stage Bracket Order</button>
              </div>
            )}
          </div>

          {/* Staged Orders Table */}
          {staged.length > 0 ? (
            <div className="panel" style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    {['#','Symbol','Side','Entry','Stop','Target','R:R','Risk $','Qty','Source','Status','Created','Actions'].map(h =>
                      <th key={h} style={{padding:'8px 6px',textAlign:'left',fontSize:10,color:'var(--text3)',letterSpacing:1,fontFamily:'var(--font-mono)'}}>{h}</th>
                    )}
                  </tr>
                </thead>
                <tbody>
                  {staged.map(o => {
                    const risk = o.entry_price - o.stop_price;
                    const reward = o.target1_price ? o.target1_price - o.entry_price : 0;
                    const rr = risk > 0 && reward > 0 ? (reward / risk) : null;
                    const rrColor = rr >= 3 ? 'var(--green)' : rr >= 2 ? 'var(--cyan)' : rr >= 1 ? 'var(--amber)' : 'var(--red)';
                    const riskDollars = risk > 0 ? risk * o.qty : 0;
                    return (
                    <tr key={o.id} style={{borderBottom:'1px solid var(--border)'}}>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',color:'var(--text3)'}}>{o.id}</td>
                      <td style={{padding:'8px 6px',fontWeight:700,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>{o.symbol}</td>
                      <td style={{padding:'8px 6px',color:o.side==='buy'?'var(--green)':'var(--red)'}}>{o.side.toUpperCase()}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>${fmt(o.entry_price)}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',color:'var(--red)'}}>${fmt(o.stop_price)}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',color:'var(--green)'}}>{o.target1_price?'$'+fmt(o.target1_price):'—'}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',fontWeight:700,color:rr?rrColor:'var(--text3)'}}>
                        {rr ? `1:${fmt(rr,1)}` : '—'}
                      </td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',color:'var(--red)',fontSize:11}}>
                        ${fmt(riskDollars,0)}
                      </td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>{o.qty}</td>
                      <td style={{padding:'8px 6px',fontSize:10,color:'var(--text3)'}}>{o.source}</td>
                      <td style={{padding:'8px 6px'}}>
                        <span style={{padding:'2px 8px',borderRadius:3,fontSize:10,fontWeight:700,color:statusColor(o.status),background:`${statusColor(o.status)}15`,border:`1px solid ${statusColor(o.status)}30`}}>
                          {o.status.toUpperCase()}
                        </span>
                      </td>
                      <td style={{padding:'8px 6px',fontSize:10,color:'var(--text3)'}}>{o.created_at?.split(' ')[0]}</td>
                      <td style={{padding:'8px 6px'}}>
                        <div style={{display:'flex',gap:4}}>
                          {o.status==='staged' && (
                            <button onClick={()=>submitStaged(o.id)}
                              style={{padding:'3px 10px',background:'var(--green)',border:'none',borderRadius:3,color:'#000',fontSize:10,cursor:'pointer',fontWeight:700}}>
                              SUBMIT
                            </button>
                          )}
                          {(o.status==='staged'||o.status==='submitted') && (
                            <button onClick={()=>cancelStaged(o.id)}
                              style={{padding:'3px 8px',background:'transparent',border:'1px solid var(--border)',borderRadius:3,color:'var(--text3)',fontSize:10,cursor:'pointer'}}>
                              Cancel
                            </button>
                          )}
                        </div>
                      </td>
                    </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          ) : (
            <div className="panel" style={{textAlign:'center',padding:30,color:'var(--text3)'}}>
              No staged orders — use <strong>+ Stage Order</strong> or stage from Trade Setups tab
            </div>
          )}
        </div>
      )}

      {/* ─── POSITIONS ────────────────────────────── */}
      {section==='positions' && (
        <div>
          {positions.length > 0 ? (
            <div className="panel" style={{overflowX:'auto'}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>ALPACA POSITIONS</div>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    {['Symbol','Qty','Side','Avg Entry','Current','Mkt Value','Unrealized P&L','P&L %','Today','Stop','Target'].map(h =>
                      <th key={h} style={{padding:'8px 6px',textAlign:'left',fontSize:10,color:'var(--text3)',letterSpacing:1,fontFamily:'var(--font-mono)'}}>{h}</th>
                    )}
                  </tr>
                </thead>
                <tbody>
                  {positions.map(p => (
                    <tr key={p.symbol} style={{borderBottom:'1px solid var(--border)'}}>
                      <td style={{padding:'8px 6px',fontWeight:700,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>{p.symbol}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>{p.qty}</td>
                      <td style={{padding:'8px 6px',color:p.side==='long'?'var(--green)':'var(--red)'}}>{p.side}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>${fmt(p.avgEntryPrice)}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>${fmt(p.currentPrice)}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>${Number(p.marketValue).toLocaleString()}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',fontWeight:700,color:p.unrealizedPL>=0?'var(--green)':'var(--red)'}}>
                        {p.unrealizedPL>=0?'+':''}${fmt(p.unrealizedPL)}
                      </td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',fontWeight:700,color:p.unrealizedPLPct>=0?'var(--green)':'var(--red)'}}>
                        {p.unrealizedPLPct>=0?'+':''}{fmt(p.unrealizedPLPct,1)}%
                      </td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',color:p.changeToday>=0?'var(--green)':'var(--red)'}}>
                        {p.changeToday>=0?'+':''}{fmt(p.changeToday,1)}%
                      </td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',color:'var(--red)'}}>{p.localStop?'$'+fmt(p.localStop):'—'}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',color:'var(--green)'}}>{p.localTarget1?'$'+fmt(p.localTarget1):'—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          ) : (
            <div className="panel" style={{textAlign:'center',padding:30,color:'var(--text3)'}}>
              No open positions in Alpaca
            </div>
          )}
        </div>
      )}

      {/* ─── ALERTS ───────────────────────────────── */}
      {section==='alerts' && (
        <div>
          <div className="panel" style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)'}}>PRICE ALERT SUBSCRIPTIONS</div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-sm" onClick={checkAlertsNow}>Check Now</button>
                <button className="btn btn-primary btn-sm" onClick={()=>setShowAlertForm(!showAlertForm)}>
                  {showAlertForm ? '✕ Cancel' : '+ New Alert'}
                </button>
              </div>
            </div>

            <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:4,padding:'8px 12px',marginBottom:12,fontSize:11,color:'var(--text2)'}}>
              Set price alerts for breakouts, stop violations, or custom levels. Stop alerts are auto-created when you log trades with a stop price. The monitor checks every 5 min during market hours.
            </div>

            {/* Alert Form */}
            {showAlertForm && (
              <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:4,padding:14,marginBottom:12}}>
                <div style={{fontSize:10,color:'var(--amber)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>NEW PRICE ALERT</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:8}}>
                  <div>
                    <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Symbol</label>
                    <input value={alertForm.symbol} onChange={e=>setAlertForm({...alertForm,symbol:e.target.value})} placeholder="NVDA"
                      style={{width:'100%',padding:'6px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13,fontFamily:'var(--font-mono)'}}/>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Trigger Price</label>
                    <input type="number" value={alertForm.trigger_price} onChange={e=>setAlertForm({...alertForm,trigger_price:e.target.value})} placeholder="0.00"
                      style={{width:'100%',padding:'6px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13,fontFamily:'var(--font-mono)'}}/>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Direction</label>
                    <select value={alertForm.direction} onChange={e=>setAlertForm({...alertForm,direction:e.target.value})}
                      style={{width:'100%',padding:'6px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13}}>
                      <option value="above">Above (breakout)</option>
                      <option value="below">Below (stop)</option>
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Message (optional)</label>
                    <input value={alertForm.message} onChange={e=>setAlertForm({...alertForm,message:e.target.value})} placeholder="VCP pivot hit"
                      style={{width:'100%',padding:'6px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13}}/>
                  </div>
                </div>
                <button className="btn btn-primary btn-sm" onClick={createAlert} style={{marginTop:10}}>Create Alert</button>
              </div>
            )}
          </div>

          {/* Active Subscriptions */}
          {subs.length > 0 ? (
            <div className="panel" style={{marginBottom:14,overflowX:'auto'}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>ACTIVE ({subs.length})</div>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    {['Symbol','Type','Trigger','Direction','Message','Created',''].map(h =>
                      <th key={h} style={{padding:'8px 6px',textAlign:'left',fontSize:10,color:'var(--text3)',letterSpacing:1,fontFamily:'var(--font-mono)'}}>{h}</th>
                    )}
                  </tr>
                </thead>
                <tbody>
                  {subs.map(s => (
                    <tr key={s.id} style={{borderBottom:'1px solid var(--border)'}}>
                      <td style={{padding:'8px 6px',fontWeight:700,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>{s.symbol}</td>
                      <td style={{padding:'8px 6px'}}>
                        <span style={{padding:'2px 8px',borderRadius:3,fontSize:10,fontWeight:600,
                          color:s.alert_type==='stop_violation'?'var(--red)':s.alert_type==='vcp_pivot'?'var(--purple)':'var(--amber)',
                          background:s.alert_type==='stop_violation'?'rgba(255,61,87,0.1)':s.alert_type==='vcp_pivot'?'rgba(196,77,255,0.1)':'rgba(240,165,0,0.1)'}}>
                          {s.alert_type.replace('_',' ').toUpperCase()}
                        </span>
                      </td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',fontWeight:700}}>${fmt(s.trigger_price)}</td>
                      <td style={{padding:'8px 6px',color:s.direction==='above'?'var(--green)':'var(--red)',fontSize:11,fontWeight:700}}>
                        {s.direction==='above'?'▲ ABOVE':'▼ BELOW'}
                      </td>
                      <td style={{padding:'8px 6px',color:'var(--text2)',fontSize:11}}>{s.message||'—'}</td>
                      <td style={{padding:'8px 6px',color:'var(--text3)',fontSize:10}}>{s.created_at?.split(' ')[0]}</td>
                      <td style={{padding:'8px 6px'}}>
                        <button onClick={()=>deactivateAlert(s.id)}
                          style={{padding:'3px 8px',background:'transparent',border:'1px solid var(--border)',borderRadius:3,color:'var(--text3)',fontSize:10,cursor:'pointer'}}>
                          Remove
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          ) : (
            <div className="panel" style={{textAlign:'center',padding:20,color:'var(--text3)',fontSize:12}}>
              No active alert subscriptions
            </div>
          )}

          {/* Fired Alerts Log */}
          {firedAlerts.length > 0 && (
            <div className="panel" style={{overflowX:'auto'}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>FIRED ALERTS LOG</div>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    {['Type','Symbol','Message','Time',''].map(h =>
                      <th key={h} style={{padding:'8px 6px',textAlign:'left',fontSize:10,color:'var(--text3)',letterSpacing:1,fontFamily:'var(--font-mono)'}}>{h}</th>
                    )}
                  </tr>
                </thead>
                <tbody>
                  {firedAlerts.map(a => (
                    <tr key={a.id} style={{borderBottom:'1px solid var(--border)',opacity:a.acknowledged?0.5:1}}>
                      <td style={{padding:'8px 6px'}}>
                        <span style={{fontSize:14}}>{a.type==='stop_violation'?'🛑':a.type==='price_above'?'📈':'📉'}</span>
                        <span style={{fontSize:10,color:'var(--text3)',marginLeft:6}}>{a.type}</span>
                      </td>
                      <td style={{padding:'8px 6px',fontWeight:700,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>{a.symbol}</td>
                      <td style={{padding:'8px 6px',color:'var(--text2)',fontSize:11}}>{a.message}</td>
                      <td style={{padding:'8px 6px',color:'var(--text3)',fontSize:10,fontFamily:'var(--font-mono)'}}>{a.created_at}</td>
                      <td style={{padding:'8px 6px'}}>
                        {!a.acknowledged && (
                          <button onClick={()=>acknowledgeAlert(a.id)}
                            style={{padding:'2px 8px',background:'rgba(240,165,0,0.12)',border:'1px solid rgba(240,165,0,0.3)',borderRadius:3,color:'var(--amber)',fontSize:9,cursor:'pointer',fontWeight:700}}>ACK</button>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* ─── BROKER ORDERS ────────────────────────── */}
      {section==='orders' && (
        <div>
          {orders.length > 0 ? (
            <div className="panel" style={{overflowX:'auto'}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>ALPACA ORDERS</div>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    {['Symbol','Side','Type','Qty','Limit','Stop','Status','Created',''].map(h =>
                      <th key={h} style={{padding:'8px 6px',textAlign:'left',fontSize:10,color:'var(--text3)',letterSpacing:1,fontFamily:'var(--font-mono)'}}>{h}</th>
                    )}
                  </tr>
                </thead>
                <tbody>
                  {orders.map(o => (
                    <tr key={o.id} style={{borderBottom:'1px solid var(--border)'}}>
                      <td style={{padding:'8px 6px',fontWeight:700,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>{o.symbol}</td>
                      <td style={{padding:'8px 6px',color:o.side==='buy'?'var(--green)':'var(--red)',fontWeight:700}}>{o.side.toUpperCase()}</td>
                      <td style={{padding:'8px 6px',fontSize:11}}>{o.order_type||o.type}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>{o.qty} {o.filled_qty!=='0'&&o.filled_qty?`(${o.filled_qty} filled)`:''}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>{o.limit_price?'$'+o.limit_price:'—'}</td>
                      <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',color:'var(--red)'}}>{o.stop_price?'$'+o.stop_price:'—'}</td>
                      <td style={{padding:'8px 6px'}}>
                        <span style={{padding:'2px 8px',borderRadius:3,fontSize:10,fontWeight:700,
                          color:o.status==='filled'?'var(--green)':o.status==='new'||o.status==='accepted'?'var(--cyan)':'var(--text3)',
                          background:o.status==='filled'?'rgba(0,230,118,0.1)':o.status==='new'||o.status==='accepted'?'rgba(0,212,255,0.1)':'rgba(136,136,187,0.1)'}}>
                          {o.status.toUpperCase()}
                        </span>
                      </td>
                      <td style={{padding:'8px 6px',color:'var(--text3)',fontSize:10}}>{o.created_at?.split('T')[0]}</td>
                      <td style={{padding:'8px 6px'}}>
                        {(o.status==='new'||o.status==='accepted'||o.status==='pending_new') && (
                          <button onClick={()=>cancelOrder(o.id)}
                            style={{padding:'3px 8px',background:'transparent',border:'1px solid var(--border)',borderRadius:3,color:'var(--text3)',fontSize:10,cursor:'pointer'}}>
                            Cancel
                          </button>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          ) : (
            <div className="panel" style={{textAlign:'center',padding:30,color:'var(--text3)'}}>
              No open orders in Alpaca
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── PORTFOLIO TAB ────────────────────────────────────────────────────────
function PortfolioTab() {
  const [status, setStatus]   = useState(null);
  const [config, setConfig]   = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');
  const [sizing, setSizing]   = useState(null);
  const [sizeEntry, setSizeEntry] = useState('');
  const [sizeStop, setSizeStop]   = useState('');
  const [editConfig, setEditConfig] = useState(false);
  const [cfgForm, setCfgForm] = useState({});

  async function loadStatus() {
    setLoading(true); setError('');
    try {
      const [s, c] = await Promise.all([api('/api/portfolio/status'), api('/api/portfolio/config')]);
      setStatus(s); setConfig(c); setCfgForm(c);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  useEffect(() => {
    loadStatus();
    const interval = setInterval(loadStatus, 30000);
    return () => clearInterval(interval);
  }, []);

  async function calcSize() {
    if (!sizeEntry || !sizeStop) return;
    try {
      const d = await api('/api/portfolio/size', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ entryPrice: +sizeEntry, stopPrice: +sizeStop }),
      });
      setSizing(d);
    } catch(e) { setError(e.message); }
  }

  async function saveConfig() {
    try {
      const c = await api('/api/portfolio/config', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(cfgForm),
      });
      setConfig(c); setEditConfig(false); loadStatus();
    } catch(e) { setError(e.message); }
  }

  const heatColor = h => h >= 8 ? 'var(--red)' : h >= 5 ? 'var(--amber)' : 'var(--green)';
  const ddColor  = d => d >= 10 ? 'var(--red)' : d >= 5 ? 'var(--amber)' : 'var(--green)';

  return (
    <div>
      <div className="panel" style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            <div className="panel-title">Portfolio <span>Dashboard</span></div>
            <div className="panel-sub">Risk management hub — does NOT tell you WHAT to trade, tells you HOW MUCH to trade</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary" onClick={()=>setEditConfig(!editConfig)}>
              {editConfig ? '✕ Cancel' : '⚙ Config'}
            </button>
            <button className="btn btn-primary" onClick={loadStatus} disabled={loading}>⟳ Refresh</button>
          </div>
        </div>
        {error && <ErrorBox msg={error}/>}

        {/* How this tab works */}
        <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:4,padding:'10px 14px',marginTop:10}}>
          <div style={{fontSize:10,color:'var(--amber)',letterSpacing:1.5,fontFamily:'var(--font-mono)',fontWeight:700,marginBottom:6}}>HOW THIS TAB DRIVES TRADE DECISIONS</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:11,color:'var(--text2)',lineHeight:1.5}}>
            <div><strong style={{color:'var(--text)'}}>Position Sizer:</strong> Enter your entry price + stop price. The system calculates exact share count based on your account size and risk-per-trade %. Never guess position size again.</div>
            <div><strong style={{color:'var(--text)'}}>Portfolio Heat:</strong> Total $ at risk across all open trades ÷ account size. Green &lt;5%, amber 5-8%, red &gt;8%. When red, close weakest position before adding new ones.</div>
            <div><strong style={{color:'var(--text)'}}>Sector Exposure:</strong> $ allocated per sector. Warning if any sector &gt;25%. Prevents concentration risk — even the best sector can rotate out.</div>
            <div><strong style={{color:'var(--text)'}}>Market Regime:</strong> BULL = full size, CAUTION = 50% size, BEAR = no new longs. The position sizer auto-adjusts share count based on regime.</div>
          </div>
        </div>
      </div>

      {loading && <div className="panel"><Loader msg="Loading portfolio status..."/></div>}

      {/* Config Editor */}
      {editConfig && config && (
        <div className="panel" style={{marginBottom:14}}>
          <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>PORTFOLIO CONFIGURATION</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>
            {[
              {key:'accountSize',label:'Account Size ($)',type:'number'},
              {key:'riskPerTrade',label:'Risk Per Trade (%)',type:'number',step:'0.1'},
              {key:'maxPositionPct',label:'Max Position (%)',type:'number'},
              {key:'maxPortfolioHeat',label:'Max Portfolio Heat (%)',type:'number'},
              {key:'maxSectorPct',label:'Max Sector Exposure (%)',type:'number'},
              {key:'maxIndustryPositions',label:'Max Same-Industry',type:'number'},
            ].map(f => (
              <div key={f.key}>
                <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>{f.label}</label>
                <input type={f.type} step={f.step||'1'} value={cfgForm[f.key]||''} onChange={e=>setCfgForm({...cfgForm,[f.key]:+e.target.value})}
                  style={{width:'100%',padding:'6px 8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13,fontFamily:'var(--font-mono)'}}/>
              </div>
            ))}
          </div>
          <button className="btn btn-primary" onClick={saveConfig} style={{marginTop:10}}>Save Config</button>
        </div>
      )}

      {status && (
        <div>
          {/* Broker Account Summary — live from Alpaca */}
          {status.broker && (
            <div className="panel" style={{marginBottom:14,padding:14,borderLeft:'3px solid var(--cyan)'}}>
              <div style={{fontSize:10,color:'var(--cyan)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>BROKER ACCOUNT (LIVE)</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12}}>
                {[
                  {label:'Equity',val:'$'+Number(status.broker.equity).toLocaleString(undefined,{maximumFractionDigits:0}),color:'var(--text)'},
                  {label:'Portfolio Value',val:'$'+Number(status.broker.portfolioValue).toLocaleString(undefined,{maximumFractionDigits:0}),color:'var(--cyan)'},
                  {label:'Cash',val:'$'+Number(status.broker.cash).toLocaleString(undefined,{maximumFractionDigits:0}),color:'var(--green)'},
                  {label:'Buying Power',val:'$'+Number(status.broker.buyingPower).toLocaleString(undefined,{maximumFractionDigits:0}),color:'var(--amber)'},
                  {label:'Broker Positions',val:status.brokerPositions?.length||0,color:'var(--cyan)'},
                  {label:'Unrealized P&L',val:(()=>{const pl=(status.brokerPositions||[]).reduce((s,p)=>s+p.unrealizedPL,0);return (pl>=0?'+':'')+' $'+fmt(Math.abs(pl),0);})(),color:(status.brokerPositions||[]).reduce((s,p)=>s+p.unrealizedPL,0)>=0?'var(--green)':'var(--red)'},
                ].map(m => (
                  <div key={m.label} style={{textAlign:'center'}}>
                    <div style={{fontSize:10,color:'var(--text3)',marginBottom:3}}>{m.label}</div>
                    <div style={{fontSize:20,fontWeight:700,color:m.color,fontFamily:'var(--font-mono)'}}>{m.val}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Top Metrics Row */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12,marginBottom:14}}>
            {/* Portfolio Heat */}
            <div className="panel" style={{padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>PORTFOLIO HEAT</div>
              <div style={{fontSize:36,fontWeight:800,color:heatColor(status.heat?.totalHeatPct||0),fontFamily:'var(--font-mono)'}}>
                {fmt(status.heat?.totalHeatPct||0,1)}%
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>
                of {fmt(config?.maxPortfolioHeat||8,0)}% max · {status.heat?.positionsAtRisk||0} positions at risk
              </div>
              <div style={{marginTop:8,height:6,background:'var(--bg3)',borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${Math.min((status.heat?.totalHeatPct||0)/(config?.maxPortfolioHeat||8)*100,100)}%`,background:heatColor(status.heat?.totalHeatPct||0),borderRadius:3,transition:'width 0.3s'}}/>
              </div>
            </div>

            {/* Drawdown */}
            <div className="panel" style={{padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>DRAWDOWN STATUS</div>
              <div style={{fontSize:36,fontWeight:800,color:ddColor(Math.abs(status.drawdown?.drawdownPct||0)),fontFamily:'var(--font-mono)'}}>
                {fmt(status.drawdown?.drawdownPct||0,1)}%
              </div>
              <div style={{fontSize:11,color:ddColor(Math.abs(status.drawdown?.drawdownPct||0)),marginTop:4,fontWeight:700}}>
                {status.drawdown?.action || 'Normal'}
              </div>
            </div>

            {/* Regime */}
            <div className="panel" style={{padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>MARKET REGIME</div>
              <div style={{fontSize:20,fontWeight:800,color:status.regime?.mode==='BULL / RISK ON'?'var(--green)':status.regime?.mode==='NEUTRAL'?'var(--amber)':'var(--red)',fontFamily:'var(--font-mono)'}}>
                {status.regime?.mode || '—'}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>
                Size multiplier: <strong>{status.regime?.sizeMultiplier ?? 0}x</strong>
              </div>
            </div>

            {/* Open Positions — show broker count if available */}
            <div className="panel" style={{padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>OPEN POSITIONS</div>
              <div style={{fontSize:36,fontWeight:800,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>
                {status.brokerPositions?.length || status.openPositions || 0}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>
                {status.broker ? `Equity: $${Number(status.broker.equity).toLocaleString(undefined,{maximumFractionDigits:0})}` : `Account: $${(config?.accountSize||100000).toLocaleString()}`}
              </div>
              {status.brokerPositions && status.openPositions !== status.brokerPositions.length && (
                <div style={{fontSize:10,color:'var(--amber)',marginTop:4}}>
                  {status.brokerPositions.filter(p=>!p.inJournal).length} position(s) not in journal
                </div>
              )}
            </div>
          </div>

          {/* Broker Positions with P&L */}
          {status.brokerPositions && status.brokerPositions.length > 0 && (
            <div className="panel" style={{marginBottom:14,padding:14}}>
              <div style={{fontSize:10,color:'var(--cyan)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>LIVE POSITIONS</div>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    {['Symbol','Qty','Avg Entry','Current','Mkt Value','P&L $','P&L %','Today','Stop','Target','Journal'].map(h =>
                      <th key={h} style={{padding:'6px 5px',textAlign:'left',fontSize:10,color:'var(--text3)',letterSpacing:1,fontFamily:'var(--font-mono)'}}>{h}</th>
                    )}
                  </tr>
                </thead>
                <tbody>
                  {status.brokerPositions.map(p => (
                    <tr key={p.symbol} style={{borderBottom:'1px solid var(--border)'}}>
                      <td style={{padding:'6px 5px',fontWeight:700,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>{p.symbol}</td>
                      <td style={{padding:'6px 5px',fontFamily:'var(--font-mono)'}}>{p.qty}</td>
                      <td style={{padding:'6px 5px',fontFamily:'var(--font-mono)'}}>${fmt(p.avgEntryPrice)}</td>
                      <td style={{padding:'6px 5px',fontFamily:'var(--font-mono)'}}>${fmt(p.currentPrice)}</td>
                      <td style={{padding:'6px 5px',fontFamily:'var(--font-mono)'}}>${Number(p.marketValue).toLocaleString()}</td>
                      <td style={{padding:'6px 5px',fontFamily:'var(--font-mono)',fontWeight:700,color:p.unrealizedPL>=0?'var(--green)':'var(--red)'}}>
                        {p.unrealizedPL>=0?'+':''}${fmt(p.unrealizedPL,0)}
                      </td>
                      <td style={{padding:'6px 5px',fontFamily:'var(--font-mono)',fontWeight:700,color:p.unrealizedPLPct>=0?'var(--green)':'var(--red)'}}>
                        {p.unrealizedPLPct>=0?'+':''}{fmt(p.unrealizedPLPct,1)}%
                      </td>
                      <td style={{padding:'6px 5px',fontFamily:'var(--font-mono)',color:p.changeToday>=0?'var(--green)':'var(--red)'}}>
                        {p.changeToday>=0?'+':''}{fmt(p.changeToday,1)}%
                      </td>
                      <td style={{padding:'6px 5px',fontFamily:'var(--font-mono)',color:'var(--red)'}}>{p.localStop?'$'+fmt(p.localStop):'—'}</td>
                      <td style={{padding:'6px 5px',fontFamily:'var(--font-mono)',color:'var(--green)'}}>{p.localTarget1?'$'+fmt(p.localTarget1):'—'}</td>
                      <td style={{padding:'6px 5px'}}>
                        {p.inJournal
                          ? <span style={{color:'var(--green)',fontSize:10}}>Yes</span>
                          : <span style={{color:'var(--amber)',fontSize:10,fontWeight:700}}>MISSING</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* Sector Exposure */}
          <div className="panel" style={{marginBottom:14,padding:14}}>
            <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>SECTOR EXPOSURE</div>
            {status.exposure?.sectors && Object.keys(status.exposure.sectors).length > 0 ? (
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {Object.entries(status.exposure.sectors).sort((a,b)=>b[1].pct-a[1].pct).map(([sec,data]) => (
                  <div key={sec} style={{padding:'6px 12px',background:'var(--bg3)',border:`1px solid ${data.pct>25?'var(--red)':'var(--border)'}`,borderRadius:4,fontSize:12}}>
                    <span style={{color:'var(--text2)'}}>{sec}</span>
                    <span style={{color:data.pct>25?'var(--red)':'var(--cyan)',fontWeight:700,marginLeft:8,fontFamily:'var(--font-mono)'}}>{fmt(data.pct,1)}%</span>
                  </div>
                ))}
              </div>
            ) : (
              <div style={{fontSize:11,color:'var(--text3)'}}>No open positions — sector exposure will appear here once you have active trades.</div>
            )}
          </div>

          {/* Position Sizer */}
          <div className="panel" style={{padding:14}}>
            <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>POSITION SIZER</div>
            <div style={{display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap'}}>
              <div>
                <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Entry Price</label>
                <input type="number" value={sizeEntry} onChange={e=>setSizeEntry(e.target.value)} placeholder="0.00"
                  style={{width:120,padding:'6px 8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13,fontFamily:'var(--font-mono)'}}/>
              </div>
              <div>
                <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Stop Price</label>
                <input type="number" value={sizeStop} onChange={e=>setSizeStop(e.target.value)} placeholder="0.00"
                  style={{width:120,padding:'6px 8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13,fontFamily:'var(--font-mono)'}}/>
              </div>
              <button className="btn btn-primary" onClick={calcSize}>Calculate</button>
            </div>
            {sizing && (
              <div style={{marginTop:12,display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:8}}>
                {[
                  {label:'Shares',val:sizing.shares,color:'var(--cyan)'},
                  {label:'Position $',val:'$'+Number(sizing.positionValue||0).toLocaleString(),color:'var(--text)'},
                  {label:'Risk $',val:'$'+fmt(sizing.dollarRisk,0),color:'var(--red)'},
                  {label:'Portfolio %',val:fmt(sizing.portfolioPct,1)+'%',color:'var(--amber)'},
                  {label:'Risk/Trade %',val:fmt(sizing.riskPct,2)+'%',color:'var(--amber)'},
                  {label:'Regime',val:sizing.regime||'—',color:'var(--green)'},
                ].map(m => (
                  <div key={m.label} style={{padding:'8px',background:'var(--bg3)',borderRadius:3,textAlign:'center'}}>
                    <div style={{fontSize:10,color:'var(--text3)',marginBottom:3}}>{m.label}</div>
                    <div style={{fontSize:16,fontWeight:700,color:m.color,fontFamily:'var(--font-mono)'}}>{m.val}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TRADE JOURNAL TAB ─────────────────────────────────────────────────────
function TradeJournalTab() {
  const [trades, setTrades]     = useState([]);
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');
  const [filter, setFilter]     = useState('all');
  const [showEntry, setShowEntry] = useState(false);
  const [showExit, setShowExit] = useState(null);
  const [form, setForm]         = useState({symbol:'',entry_price:'',stop_price:'',target1:'',shares:'',side:'long',sector:'',notes:''});
  const [exitForm, setExitForm] = useState({exit_price:'',exit_reason:'stop',notes:''});
  const [syncing, setSyncing]   = useState(false);
  const [syncMsg, setSyncMsg]   = useState('');
  const [editNoteId, setEditNoteId] = useState(null);
  const [editNoteVal, setEditNoteVal] = useState('');

  const needsReviewCount = trades.filter(t => t.needs_review).length;

  async function syncBroker() {
    setSyncing(true); setSyncMsg('');
    try {
      const d = await api('/api/trades/sync', { method:'POST' });
      setSyncMsg(d.message);
      loadTrades();
    } catch(e) { setSyncMsg('Sync failed: ' + e.message); }
    setSyncing(false);
  }

  async function saveTradeNote(id) {
    try {
      await api(`/api/trades/${id}`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ notes: editNoteVal, needs_review: 0 }),
      });
      setEditNoteId(null);
      loadTrades();
    } catch(e) { setError(e.message); }
  }

  async function loadTrades() {
    setLoading(true); setError('');
    try {
      const d = await api(`/api/trades?status=${filter}&limit=100`);
      setTrades(d.trades || []);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  useEffect(() => { loadTrades(); }, [filter]);

  async function logEntry() {
    if (!form.symbol || !form.entry_price) return;
    try {
      await api('/api/trades', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({...form, entry_price:+form.entry_price, stop_price:+form.stop_price||undefined, target1:+form.target1||undefined, shares:+form.shares||undefined}),
      });
      setForm({symbol:'',entry_price:'',stop_price:'',target1:'',shares:'',side:'long',sector:'',notes:''});
      setShowEntry(false); loadTrades();
    } catch(e) { setError(e.message); }
  }

  async function logExit(id) {
    if (!exitForm.exit_price) return;
    try {
      await api(`/api/trades/${id}`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({...exitForm, exit_price:+exitForm.exit_price}),
      });
      setShowExit(null); setExitForm({exit_price:'',exit_reason:'stop',notes:''}); loadTrades();
    } catch(e) { setError(e.message); }
  }

  const pnlColor = v => v > 0 ? 'var(--green)' : v < 0 ? 'var(--red)' : 'var(--text3)';

  return (
    <div>
      <div className="panel" style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <div>
            <div className="panel-title">Trade <span>Journal</span></div>
            <div className="panel-sub">Log entries and exits — track R-multiples and P&L</div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            {needsReviewCount > 0 && (
              <span style={{padding:'4px 10px',background:'rgba(240,165,0,0.15)',border:'1px solid var(--amber)',borderRadius:4,fontSize:11,color:'var(--amber)',fontWeight:700}}>
                {needsReviewCount} need{needsReviewCount===1?'s':''} review
              </span>
            )}
            <button className="btn btn-primary" onClick={syncBroker} disabled={syncing} style={{fontSize:11}}>
              {syncing ? '⟳ Syncing...' : '⟳ Sync Broker'}
            </button>
            <div className="btn-group">
              {['all','open','closed'].map(f => (
                <button key={f} className={`mode-btn ${filter===f?'active':''}`} onClick={()=>setFilter(f)}>
                  {f.charAt(0).toUpperCase()+f.slice(1)}
                </button>
              ))}
            </div>
            <button className="btn btn-primary" onClick={()=>setShowEntry(!showEntry)}>
              {showEntry ? '✕ Cancel' : '+ New Trade'}
            </button>
          </div>
        </div>
        {error && <ErrorBox msg={error}/>}
        {syncMsg && <div style={{marginTop:8,padding:'8px 12px',background:'rgba(0,210,211,0.1)',border:'1px solid var(--cyan)',borderRadius:4,fontSize:11,color:'var(--cyan)'}}>{syncMsg}</div>}
      </div>

      {/* Entry Form */}
      {showEntry && (
        <div className="panel" style={{marginBottom:14}}>
          <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>LOG NEW ENTRY</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:8}}>
            {[
              {key:'symbol',label:'Symbol',ph:'NVDA'},
              {key:'entry_price',label:'Entry Price',ph:'0.00',type:'number'},
              {key:'stop_price',label:'Stop Price',ph:'0.00',type:'number'},
              {key:'target1',label:'Target 1',ph:'0.00',type:'number'},
              {key:'shares',label:'Shares',ph:'100',type:'number'},
              {key:'sector',label:'Sector',ph:'Technology'},
            ].map(f => (
              <div key={f.key}>
                <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>{f.label}</label>
                <input type={f.type||'text'} value={form[f.key]} onChange={e=>setForm({...form,[f.key]:e.target.value})} placeholder={f.ph}
                  style={{width:'100%',padding:'6px 8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13,fontFamily:'var(--font-mono)'}}/>
              </div>
            ))}
          </div>
          <div style={{marginTop:8}}>
            <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Notes</label>
            <input value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Trade thesis, setup type..."
              style={{width:'100%',padding:'6px 8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:13}}/>
          </div>
          <button className="btn btn-primary" onClick={logEntry} style={{marginTop:10}}>Log Entry</button>
        </div>
      )}

      {loading && <div className="panel"><Loader msg="Loading trades..."/></div>}

      {/* Trades Table */}
      {trades.length > 0 && (
        <div className="panel" style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr style={{borderBottom:'1px solid var(--border)'}}>
                {['Symbol','Side','Entry','Stop','Target','Shares','Entry Date','Exit','P&L %','R-Multiple','Reason','Notes',''].map(h =>
                  <th key={h} style={{padding:'8px 6px',textAlign:'left',fontSize:10,color:'var(--text3)',letterSpacing:1,fontFamily:'var(--font-mono)'}}>{h}</th>
                )}
              </tr>
            </thead>
            <tbody>
              {trades.map(t => (
                <tr key={t.id} style={{borderBottom:'1px solid var(--border)',background:t.needs_review?'rgba(240,165,0,0.06)':'transparent'}}>
                  <td style={{padding:'8px 6px',fontWeight:700,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>
                    {t.needs_review ? <span title="Needs review" style={{color:'var(--amber)',marginRight:4}}>●</span> : null}
                    {t.symbol}
                  </td>
                  <td style={{padding:'8px 6px',color:t.side==='long'?'var(--green)':'var(--red)'}}>{t.side}</td>
                  <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>${fmt(t.entry_price)}</td>
                  <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',color:'var(--red)'}}>{t.stop_price?'$'+fmt(t.stop_price):'—'}</td>
                  <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)',color:'var(--green)'}}>{t.target1?'$'+fmt(t.target1):'—'}</td>
                  <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>{t.shares||'—'}</td>
                  <td style={{padding:'8px 6px',color:'var(--text3)'}}>{t.entry_date}</td>
                  <td style={{padding:'8px 6px',fontFamily:'var(--font-mono)'}}>
                    {t.exit_price ? '$'+fmt(t.exit_price) : <span style={{color:'var(--cyan)'}}>OPEN</span>}
                  </td>
                  <td style={{padding:'8px 6px',fontWeight:700,color:pnlColor(t.pnl_percent),fontFamily:'var(--font-mono)'}}>
                    {t.pnl_percent != null ? (t.pnl_percent>0?'+':'')+fmt(t.pnl_percent,1)+'%' : '—'}
                  </td>
                  <td style={{padding:'8px 6px',fontWeight:700,color:pnlColor(t.r_multiple),fontFamily:'var(--font-mono)'}}>
                    {t.r_multiple != null ? (t.r_multiple>0?'+':'')+fmt(t.r_multiple,2)+'R' : '—'}
                  </td>
                  <td style={{padding:'8px 6px',color:'var(--text3)',fontSize:10}}>{t.exit_reason||''}</td>
                  <td style={{padding:'8px 6px',maxWidth:200}}>
                    {editNoteId === t.id ? (
                      <div style={{display:'flex',gap:4}}>
                        <textarea value={editNoteVal} onChange={e=>setEditNoteVal(e.target.value)} autoFocus rows={2}
                          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveTradeNote(t.id);}if(e.key==='Escape')setEditNoteId(null);}}
                          style={{flex:1,minWidth:120,background:'var(--bg)',border:`1px solid ${t.needs_review?'var(--amber)':'var(--border)'}`,borderRadius:3,color:'var(--text)',padding:'4px 6px',fontSize:11,outline:'none',resize:'vertical',fontFamily:'var(--font-sans)'}}/>
                        <button onClick={()=>saveTradeNote(t.id)} style={{padding:'2px 6px',background:'var(--amber)',border:'none',borderRadius:2,color:'#000',fontSize:10,cursor:'pointer',fontWeight:700}}>✓</button>
                      </div>
                    ) : (
                      <span onClick={()=>{setEditNoteId(t.id);setEditNoteVal(t.notes||'');}}
                        title="Click to edit notes"
                        style={{fontSize:11,color:t.needs_review?'var(--amber)':t.notes?'var(--text2)':'var(--text3)',cursor:'text',display:'block',
                                whiteSpace:'normal',wordBreak:'break-word',lineHeight:1.4,fontWeight:t.needs_review?600:400}}>
                        {t.needs_review ? (t.notes?.replace(/\[AUTO[^\]]*\]\s*/g,'') || 'Add trade thesis...') : (t.notes || <em style={{opacity:0.4}}>+ notes</em>)}
                      </span>
                    )}
                  </td>
                  <td style={{padding:'8px 6px'}}>
                    {!t.exit_date && (
                      showExit === t.id ? (
                        <div style={{display:'flex',gap:4,alignItems:'center'}}>
                          <input type="number" value={exitForm.exit_price} onChange={e=>setExitForm({...exitForm,exit_price:e.target.value})} placeholder="Exit $"
                            style={{width:80,padding:'3px 5px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:11,fontFamily:'var(--font-mono)'}}/>
                          <select value={exitForm.exit_reason} onChange={e=>setExitForm({...exitForm,exit_reason:e.target.value})}
                            style={{padding:'3px 5px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontSize:11}}>
                            {['stop','target1','target2','manual','regime_change'].map(r=><option key={r} value={r}>{r}</option>)}
                          </select>
                          <button onClick={()=>logExit(t.id)} style={{padding:'3px 8px',background:'var(--red)',border:'none',borderRadius:3,color:'#fff',fontSize:10,cursor:'pointer'}}>Exit</button>
                          <button onClick={()=>setShowExit(null)} style={{padding:'3px 6px',background:'transparent',border:'1px solid var(--border)',borderRadius:3,color:'var(--text3)',fontSize:10,cursor:'pointer'}}>x</button>
                        </div>
                      ) : (
                        <button onClick={()=>setShowExit(t.id)} style={{padding:'3px 8px',background:'rgba(255,61,87,0.15)',border:'1px solid rgba(255,61,87,0.3)',borderRadius:3,color:'var(--red)',fontSize:10,cursor:'pointer'}}>Close</button>
                      )
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {!loading && trades.length === 0 && (
        <div className="panel" style={{textAlign:'center',padding:30,color:'var(--text3)'}}>
          No trades yet — click <strong>+ New Trade</strong> to log your first entry
        </div>
      )}
    </div>
  );
}

// ─── SCHEDULER TAB (Tier 5 — Job Scheduler) ────────────────────────────────
function SchedulerTab() {
  const [jobs, setJobs]         = useState([]);
  const [types, setTypes]       = useState({});
  const [status, setStatus]     = useState(null);
  const [history, setHistory]   = useState([]);
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');
  const [showCreate, setShowCreate] = useState(false);
  const [selectedJob, setSelectedJob] = useState(null);
  const [jobHistory, setJobHistory]   = useState([]);
  const [form, setForm] = useState({ name:'', description:'', job_type:'', cron_expression:'', config:'{}', enabled:true });

  async function loadAll() {
    setLoading(true); setError('');
    try {
      const [j, t, s, h] = await Promise.all([
        api('/api/scheduler/jobs').catch(()=>({jobs:[]})),
        api('/api/scheduler/types').catch(()=>({types:{}})),
        api('/api/scheduler/status').catch(()=>null),
        api('/api/scheduler/history?limit=30').catch(()=>({history:[]})),
      ]);
      setJobs(j.jobs||[]); setTypes(t.types||{}); setStatus(s); setHistory(h.history||[]);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  useEffect(() => { loadAll(); }, []);

  async function seedDefaults() {
    try {
      await api('/api/scheduler/seed', {method:'POST'});
      loadAll();
    } catch(e) { setError(e.message); }
  }

  async function createNewJob() {
    if (!form.name || !form.job_type || !form.cron_expression) return;
    try {
      let config = {};
      try { config = JSON.parse(form.config); } catch(_) {}
      await api('/api/scheduler/jobs', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({...form, config, enabled:form.enabled}),
      });
      setForm({name:'',description:'',job_type:'',cron_expression:'',config:'{}',enabled:true});
      setShowCreate(false); loadAll();
    } catch(e) { setError(e.message); }
  }

  async function toggleEnabled(id, enabled) {
    try {
      await api(`/api/scheduler/jobs/${id}/toggle`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({enabled}),
      });
      loadAll();
    } catch(e) { setError(e.message); }
  }

  async function runNow(id) {
    try {
      setError('');
      const r = await api(`/api/scheduler/jobs/${id}/run`, {method:'POST'});
      if (r.error) setError(`Job failed: ${r.error}`);
      loadAll();
      if (selectedJob === id) loadJobHistory(id);
    } catch(e) { setError(e.message); }
  }

  async function deleteJobById(id) {
    try {
      await api(`/api/scheduler/jobs/${id}`, {method:'DELETE'});
      if (selectedJob === id) { setSelectedJob(null); setJobHistory([]); }
      loadAll();
    } catch(e) { setError(e.message); }
  }

  async function loadJobHistory(id) {
    setSelectedJob(id);
    try {
      const r = await api(`/api/scheduler/jobs/${id}/history?limit=20`);
      setJobHistory(r.history||[]);
    } catch(e) { setJobHistory([]); }
  }

  const cronDescriptions = {
    '*/5 * * * 1-5': 'Every 5 min (weekdays)',
    '0 * * * *': 'Every hour',
    '0 16 * * 1-5': 'Daily at 4:00 PM (weekdays)',
    '30 16 * * 1-5': 'Daily at 4:30 PM (weekdays)',
    '0 9 * * 1-5': 'Daily at 9:00 AM (weekdays)',
    '0 2 * * 0': 'Weekly (Sunday 2 AM)',
    '0 3 * * 0': 'Weekly (Sunday 3 AM)',
    '0 0 1 * *': 'Monthly (1st, midnight)',
  };

  function describeCron(expr) {
    return cronDescriptions[expr] || expr;
  }

  return (
    <div>
      {/* Header */}
      <div className="panel" style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <div>
          <div className="panel-title"><span>TIER 5</span> — JOB SCHEDULER</div>
          <div className="panel-sub">Automated cron jobs — RS scans, stop monitoring, cleanup, reconciliation</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {status && (
            <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text3)'}}>
              {status.running} active / {status.totalJobs} total
            </span>
          )}
          <button className="load-btn" onClick={loadAll} disabled={loading} style={{fontSize:10,padding:'6px 14px'}}>
            {loading ? 'LOADING...' : 'REFRESH'}
          </button>
          <button className="load-btn" onClick={seedDefaults} style={{fontSize:10,padding:'6px 14px',background:'var(--cyan)',color:'#000'}}>
            SEED DEFAULTS
          </button>
          <button className="load-btn" onClick={()=>setShowCreate(!showCreate)} style={{fontSize:10,padding:'6px 14px',background:'var(--green)',color:'#000'}}>
            + NEW JOB
          </button>
        </div>
      </div>

      {error && <div style={{padding:'8px 14px',background:'rgba(255,61,87,0.1)',border:'1px solid var(--red)',borderRadius:4,marginBottom:12,color:'var(--red)',fontSize:12,fontFamily:'var(--font-mono)'}}>{error}</div>}

      {/* Create Job Form */}
      {showCreate && (
        <div className="panel" style={{borderColor:'var(--green)'}}>
          <div className="section-label" style={{marginBottom:10}}>CREATE NEW JOB</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div>
              <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>NAME</label>
              <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}
                placeholder="e.g. Daily RS Scan"
                style={{width:'100%',padding:'7px 10px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontFamily:'var(--font-mono)',fontSize:12}} />
            </div>
            <div>
              <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>JOB TYPE</label>
              <select value={form.job_type} onChange={e=>setForm({...form,job_type:e.target.value})}
                style={{width:'100%',padding:'7px 10px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontFamily:'var(--font-mono)',fontSize:12}}>
                <option value="">Select type...</option>
                {Object.entries(types).map(([k,v])=>(
                  <option key={k} value={k}>{k} — {v.description}</option>
                ))}
              </select>
            </div>
            <div>
              <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>CRON EXPRESSION</label>
              <input value={form.cron_expression} onChange={e=>setForm({...form,cron_expression:e.target.value})}
                placeholder="*/5 * * * 1-5"
                style={{width:'100%',padding:'7px 10px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontFamily:'var(--font-mono)',fontSize:12}} />
              <div style={{fontSize:9,color:'var(--text3)',marginTop:2}}>min hour day month weekday (0=Sun)</div>
            </div>
            <div>
              <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>CONFIG (JSON)</label>
              <input value={form.config} onChange={e=>setForm({...form,config:e.target.value})}
                placeholder='{"persist": true}'
                style={{width:'100%',padding:'7px 10px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontFamily:'var(--font-mono)',fontSize:12}} />
            </div>
            <div style={{gridColumn:'span 2'}}>
              <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>DESCRIPTION</label>
              <input value={form.description} onChange={e=>setForm({...form,description:e.target.value})}
                placeholder="What does this job do?"
                style={{width:'100%',padding:'7px 10px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',fontFamily:'var(--font-mono)',fontSize:12}} />
            </div>
          </div>
          <div style={{display:'flex',gap:8,marginTop:10,alignItems:'center'}}>
            <label style={{fontSize:11,color:'var(--text2)',display:'flex',alignItems:'center',gap:4}}>
              <input type="checkbox" checked={form.enabled} onChange={e=>setForm({...form,enabled:e.target.checked})} /> Enabled on create
            </label>
            <div style={{marginLeft:'auto',display:'flex',gap:8}}>
              <button onClick={()=>setShowCreate(false)} style={{padding:'6px 16px',background:'transparent',border:'1px solid var(--border)',borderRadius:3,color:'var(--text3)',cursor:'pointer',fontSize:11}}>Cancel</button>
              <button onClick={createNewJob} className="load-btn" style={{fontSize:10,padding:'6px 16px',background:'var(--green)',color:'#000'}}>CREATE JOB</button>
            </div>
          </div>
        </div>
      )}

      {/* Jobs Table */}
      <div className="panel">
        <div className="section-label">SCHEDULED JOBS</div>
        {jobs.length === 0 ? (
          <div style={{textAlign:'center',padding:30,color:'var(--text3)',fontSize:13}}>
            No jobs configured. Click <strong>SEED DEFAULTS</strong> to create recommended jobs.
          </div>
        ) : (
          <table className="data-table">
            <thead>
              <tr>
                <th>Status</th>
                <th>Name</th>
                <th>Type</th>
                <th>Schedule</th>
                <th>Last Run</th>
                <th>Runs</th>
                <th>Duration</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {jobs.map(j => (
                <tr key={j.id} style={{cursor:'pointer',background:selectedJob===j.id?'var(--bg3)':'transparent'}}
                    onClick={()=>loadJobHistory(j.id)}>
                  <td>
                    <span className="status-dot" style={{background:j.enabled?'var(--green)':'var(--text3)'}} />
                    <span style={{fontSize:10,color:j.enabled?'var(--green)':'var(--text3)'}}>{j.enabled?'ON':'OFF'}</span>
                  </td>
                  <td>
                    <span style={{color:'var(--text)',fontWeight:600,fontFamily:'var(--font-sans)'}}>{j.name}</span>
                    {j.description && <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--font-sans)',whiteSpace:'normal',maxWidth:200}}>{j.description}</div>}
                  </td>
                  <td><span style={{fontSize:11,color:'var(--cyan)',background:'rgba(0,212,255,0.08)',padding:'2px 6px',borderRadius:3}}>{j.job_type}</span></td>
                  <td>
                    <span style={{fontSize:11}}>{describeCron(j.cron_expression)}</span>
                    <div style={{fontSize:9,color:'var(--text3)'}}>{j.cron_expression}</div>
                  </td>
                  <td>
                    {j.last_run_at ? (
                      <div>
                        <span style={{fontSize:11,color:j.last_run_status==='success'?'var(--green)':'var(--red)'}}>
                          {j.last_run_status==='success'?'OK':'ERR'}
                        </span>
                        <div style={{fontSize:9,color:'var(--text3)'}}>{new Date(j.last_run_at+'Z').toLocaleString()}</div>
                      </div>
                    ) : <span style={{color:'var(--text3)',fontSize:11}}>Never</span>}
                  </td>
                  <td style={{textAlign:'center'}}>{j.run_count}</td>
                  <td style={{fontSize:11}}>{j.last_run_duration_ms ? `${j.last_run_duration_ms}ms` : '—'}</td>
                  <td onClick={e=>e.stopPropagation()}>
                    <div style={{display:'flex',gap:4}}>
                      <button onClick={()=>runNow(j.id)} title="Run now"
                        style={{padding:'3px 8px',background:'rgba(240,165,0,0.15)',border:'1px solid var(--amber)',borderRadius:3,color:'var(--amber)',cursor:'pointer',fontSize:10,fontWeight:700}}>RUN</button>
                      <button onClick={()=>toggleEnabled(j.id,!j.enabled)} title={j.enabled?'Disable':'Enable'}
                        style={{padding:'3px 8px',background:j.enabled?'rgba(255,61,87,0.1)':'rgba(0,230,118,0.1)',border:`1px solid ${j.enabled?'var(--red)':'var(--green)'}`,borderRadius:3,color:j.enabled?'var(--red)':'var(--green)',cursor:'pointer',fontSize:10,fontWeight:700}}>
                        {j.enabled?'OFF':'ON'}
                      </button>
                      <button onClick={()=>deleteJobById(j.id)} title="Delete"
                        style={{padding:'3px 8px',background:'rgba(255,61,87,0.06)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text3)',cursor:'pointer',fontSize:10}}>DEL</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* Job History Detail */}
      {selectedJob && (
        <div className="panel" style={{borderColor:'var(--amber)'}}>
          <div className="section-label">EXECUTION HISTORY — {jobs.find(j=>j.id===selectedJob)?.name || `Job #${selectedJob}`}</div>
          {jobs.find(j=>j.id===selectedJob)?.last_error && (
            <div style={{padding:'6px 10px',background:'rgba(255,61,87,0.08)',borderRadius:3,marginBottom:10,fontSize:11,color:'var(--red)',fontFamily:'var(--font-mono)'}}>
              Last error: {jobs.find(j=>j.id===selectedJob).last_error}
            </div>
          )}
          {jobHistory.length === 0 ? (
            <div style={{color:'var(--text3)',fontSize:12,padding:10}}>No executions yet. Click <strong>RUN</strong> to test.</div>
          ) : (
            <table className="data-table">
              <thead><tr><th>Started</th><th>Status</th><th>Duration</th><th>Result</th></tr></thead>
              <tbody>
                {jobHistory.map(h => (
                  <tr key={h.id}>
                    <td style={{fontSize:11}}>{new Date(h.started_at+'Z').toLocaleString()}</td>
                    <td>
                      <span style={{fontSize:10,padding:'2px 6px',borderRadius:3,fontWeight:700,
                        background:h.status==='success'?'rgba(0,230,118,0.1)':h.status==='error'?'rgba(255,61,87,0.1)':'rgba(240,165,0,0.1)',
                        color:h.status==='success'?'var(--green)':h.status==='error'?'var(--red)':'var(--amber)'}}>
                        {h.status.toUpperCase()}
                      </span>
                    </td>
                    <td style={{fontSize:11}}>{h.duration_ms != null ? `${h.duration_ms}ms` : '...'}</td>
                    <td style={{fontSize:10,color:'var(--text3)',maxWidth:300,overflow:'hidden',textOverflow:'ellipsis'}}>
                      {h.error || (h.result ? JSON.stringify(h.result).slice(0,120) : '—')}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* Recent Global History */}
      <div className="panel">
        <div className="section-label">RECENT EXECUTION LOG (ALL JOBS)</div>
        {history.length === 0 ? (
          <div style={{color:'var(--text3)',fontSize:12,padding:10}}>No job executions yet.</div>
        ) : (
          <table className="data-table">
            <thead><tr><th>Time</th><th>Job</th><th>Status</th><th>Duration</th><th>Details</th></tr></thead>
            <tbody>
              {history.slice(0,20).map(h => (
                <tr key={h.id}>
                  <td style={{fontSize:10}}>{new Date(h.started_at+'Z').toLocaleString()}</td>
                  <td style={{color:'var(--cyan)',fontSize:11}}>{h.job_name}</td>
                  <td>
                    <span style={{fontSize:10,padding:'1px 5px',borderRadius:3,
                      background:h.status==='success'?'rgba(0,230,118,0.1)':h.status==='error'?'rgba(255,61,87,0.1)':'rgba(240,165,0,0.1)',
                      color:h.status==='success'?'var(--green)':h.status==='error'?'var(--red)':'var(--amber)'}}>
                      {h.status}
                    </span>
                  </td>
                  <td style={{fontSize:10}}>{h.duration_ms != null ? `${h.duration_ms}ms` : '—'}</td>
                  <td style={{fontSize:10,color:'var(--text3)',maxWidth:250,overflow:'hidden',textOverflow:'ellipsis'}}>
                    {h.error || (h.result ? JSON.stringify(h.result).slice(0,80) : '')}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* Available Job Types Reference */}
      <div className="panel">
        <div className="section-label">AVAILABLE JOB TYPES</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:8}}>
          {Object.entries(types).map(([type, info]) => (
            <div key={type} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:4,padding:'10px 12px'}}>
              <div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--cyan)',fontWeight:600}}>{type}</div>
              <div style={{fontSize:11,color:'var(--text2)',marginTop:3,lineHeight:1.4}}>{info.description}</div>
              {info.defaultConfig && Object.keys(info.defaultConfig).length > 0 && (
                <div style={{fontSize:9,color:'var(--text3)',marginTop:4,fontFamily:'var(--font-mono)'}}>
                  defaults: {JSON.stringify(info.defaultConfig)}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── PERFORMANCE TAB ───────────────────────────────────────────────────────
function PerformanceTab() {
  const [perf, setPerf]       = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');

  async function loadPerf() {
    setLoading(true); setError('');
    try {
      const d = await api('/api/trades/performance');
      setPerf(d);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  useEffect(() => { loadPerf(); }, []);

  return (
    <div>
      <div className="panel" style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            <div className="panel-title">Trading <span>Performance</span></div>
            <div className="panel-sub">Win rate, profit factor, R-multiples, Kelly criterion — track your edge</div>
          </div>
          <button className="btn btn-primary" onClick={loadPerf} disabled={loading}>⟳ Refresh</button>
        </div>
        {error && <ErrorBox msg={error}/>}
      </div>

      {loading && <div className="panel"><Loader msg="Loading performance data..."/></div>}

      {perf && !perf.totalTrades && (
        <div className="panel" style={{textAlign:'center',padding:40,color:'var(--text3)'}}>
          <div style={{fontSize:18,marginBottom:8}}>No closed trades yet</div>
