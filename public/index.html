    </div>
  );
}

  async function load() {
    setLoading(true);
    try {
      const [rd, md] = await Promise.all([api('/api/regime'), api('/api/macro')]);
      setRegime(rd);
      setMacro(md.macro || []);
      setSpread(md.yieldSpread);
    } catch(_) {}
    setLoading(false);
    // Load leaders/laggards separately (slower — full RS scan)
    setLlLoad(true);
    try {
      const ld = await api('/api/leaders-laggards');
      setLeaders(ld.leaders || []);
      setLaggards(ld.laggards || []);
    } catch(_) {}
    setLlLoad(false);
  }

  async function interpret() {
    setAiLoad(true); setAiText('');
    const rows = macro.map(m => `${m.name}: ${m.price?.toFixed?.(m.symbol?.includes('TNX')||m.symbol?.includes('IRX')?2:1)||m.price} (${fmtP(m.chg1d)})`).join(' | ');
    const t = await askClaude(
      `Market data: ${rows}. Yield spread: ${spread}%. Regime: ${regime?.regime}.

## TODAY'S TRADING PLAN
Is today a swing-long day, defensive day, or avoid day? Why in 2 sentences.

## 3 SECTORS TO FOCUS ON
Based on current regime, where should I be looking?

## 3 SECTORS TO AVOID
Where is risk highest today?

## KEY RISK TODAY
One specific thing that could change regime in next 48 hours.`,
      'Elite trading strategist. ## headers, - bullets. Max 400 words.', true
    );
    setAiText(t); setAiLoad(false);
  }

// ─── WATCHLIST TAB ────────────────────────────────────────────────────────────
function WatchlistTab({ rsData }) {
  const [list,      setList]    = useState([]);
  const [ticker,    setTicker]  = useState('');
  const [note,      setNote]    = useState('');
  const [stage,     setStage]   = useState('watching');
  const [loading,   setLoading] = useState(false);
  const [editNote,  setEditNote] = useState(null);   // ticker being edited
  const [editVal,   setEditVal]  = useState('');     // current edit value
  const { sortData: sortWL, SH: WLSH } = useSortTable('addedAt', -1);

  useEffect(() => { loadWL(); }, []);

  async function loadWL() {
    try { const d = await api('/api/watchlist'); setList(d.watchlist || []); } catch(_) {}
  }

  async function add() {
    if (!ticker.trim()) return;
    setLoading(true);
    try {
      await api('/api/watchlist', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: ticker.toUpperCase(), note, stage }) });
      setTicker(''); setNote('');
      await loadWL();
    } catch(_) {}
    setLoading(false);
  }

  async function remove(t) {
    await api(`/api/watchlist/${t}`, { method:'DELETE' });
    await loadWL();
  }

  async function saveNote(w) {
    try {
      await api('/api/watchlist', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: w.ticker, note: editVal, stage: w.stage }) });
      setEditNote(null);
      await loadWL();
    } catch(_) {}
  }

  async function updateStage(w, newStage) {
    try {
      await api('/api/watchlist', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: w.ticker, note: w.note, stage: newStage }) });
      await loadWL();
    } catch(_) {}
  }

  const stageColor = s => s==='active'?'var(--green)':s==='candidate'?'var(--amber)':'var(--text3)';
  const stageLabel = s => s==='active'?'ACTIVE TRADE':s==='candidate'?'CANDIDATE':'WATCHING';

  return (
    <div>
      <div className="panel">
        <div className="panel-title" style={{marginBottom:4}}>⭐ <span>Watchlist</span></div>
        <div className="panel-sub">Track stocks from idea → candidate → active trade. Persisted to disk.</div>

        <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
          <input value={ticker} onChange={e=>setTicker(e.target.value.toUpperCase())} placeholder="TICKER"
            style={{width:90,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'8px 10px',fontFamily:'var(--font-mono)',fontSize:13,outline:'none',letterSpacing:2}}/>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Note (optional)"
            style={{flex:1,minWidth:120,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'8px 10px',fontSize:12,outline:'none'}}/>
          <select value={stage} onChange={e=>setStage(e.target.value)}
            style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'8px 10px',fontSize:12,outline:'none'}}>
            <option value="watching">Watching</option>
            <option value="candidate">Candidate</option>
            <option value="active">Active Trade</option>
          </select>
          <button className="btn btn-primary btn-sm" onClick={add} disabled={loading||!ticker}>+ Add</button>
        </div>

        {list.length === 0 && (
          <div className="empty">No stocks in watchlist yet. Add tickers above.</div>
        )}

        {list.length > 0 && (
          <table className="data-table">
            <thead>
              <tr>
                <th title="Trade lifecycle stage: Watching (idea), Candidate (setup forming), Active Trade (position open)">Stage</th>
                <th title="Ticker symbol">Ticker</th>
                <WLSH k="price"  label="Price"   title="Current market price"/>
                <WLSH k="chg1d"  label="1D"      title="Today's % price change"/>
                <WLSH k="chg1w"  label="1W"      title="5-day price return"/>
                <WLSH k="chg1m"  label="1M"      title="21-day price return"/>
                <WLSH k="rsRank" label="IBD RS"  title="IBD RS percentile rank 1-99. Updates each time you run the RS Scanner."/>
                <th title="RS direction: rising/flat/falling based on 7-day rank change. Arrow shows the arc.">RS Trend</th>
                <WLSH k="swingMomentum" label="SwingMom" title="Absolute price velocity (5/10/21-day ROC). ≥60=moving fast now. NOT relative to peers."/>
                <th title="Your personal notes on this position — thesis, entry level, what you're watching for">Note</th>
                <WLSH k="addedAt" label="Added"  title="Date you added this to the watchlist"/>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {sortWL(list.map(w => {
                const s2 = rsData?.find(r => r.ticker === w.ticker);
                return {...w, price:s2?.price, chg1d:s2?.chg1d, chg1w:s2?.chg1w, chg1m:s2?.chg1m,
                        rsRank:s2?.rsRank, swingMomentum:s2?.swingMomentum};
              })).map(w => {
                const s = w; // merged via sortWL map above
                return (
                  <tr key={w.ticker}>
                    <td>
                      <select value={w.stage} onChange={e=>updateStage(w,e.target.value)}
                        style={{fontSize:10,padding:'2px 6px',borderRadius:3,
                          background:stageColor(w.stage)+'22',color:stageColor(w.stage),
                          border:'1px solid '+stageColor(w.stage)+'44',
                          fontFamily:'var(--font-mono)',cursor:'pointer',outline:'none'}}>
                        <option value="watching">WATCHING</option>
                        <option value="candidate">CANDIDATE</option>
                        <option value="active">ACTIVE TRADE</option>
                      </select>
                    </td>
                    <td><span className="td-ticker">{w.ticker}</span></td>
                    <td>{s ? `$${fmt(s.price)}` : '—'}</td>
                    <td className={fmtC(s?.chg1d)}>{fmtP(s?.chg1d)}</td>
                    <td className={fmtC(s?.chg1w)}>{fmtP(s?.chg1w)}</td>
                    <td className={fmtC(s?.chg1m)}>{fmtP(s?.chg1m)}</td>
                    <td>{s ? <RSBar rs={s.rsRank}/> : '—'}</td>
                    <td>{s ? <RSTrendBadge trend={s.rsTrend} rs={s.rsRank}/> : '—'}</td>
                    <td>
                      {s?.swingMomentum != null ? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:s.swingMomentum>=60?'var(--green)':s.swingMomentum>=45?'var(--amber)':'var(--red)'}}>{s.swingMomentum}</span> : '—'}
                    </td>
                    <td style={{maxWidth:180}}>
                      {editNote === w.ticker ? (
                        <div style={{display:'flex',gap:4}}>
                          <textarea value={editVal} onChange={e=>setEditVal(e.target.value)}
                            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveNote(w);}if(e.key==='Escape')setEditNote(null);}}
                            autoFocus rows={2}
                            placeholder="Enter note (Enter to save, Shift+Enter for newline)"
                            style={{flex:1,minWidth:100,background:'var(--bg)',border:'1px solid var(--amber)',borderRadius:3,color:'var(--text)',padding:'4px 6px',fontSize:11,outline:'none',resize:'vertical',fontFamily:'var(--font-sans)',lineHeight:1.4}}/>
                          <button onClick={()=>saveNote(w)} style={{padding:'2px 6px',background:'var(--amber)',border:'none',borderRadius:2,color:'#000',fontSize:10,cursor:'pointer',fontWeight:700}}>✓</button>
                          <button onClick={()=>setEditNote(null)} style={{padding:'2px 6px',background:'transparent',border:'1px solid var(--border)',borderRadius:2,color:'var(--text3)',fontSize:10,cursor:'pointer'}}>✕</button>
                        </div>
                      ) : (
                        <span onClick={()=>{setEditNote(w.ticker);setEditVal(w.note||'');}}
                          title="Click to edit note"
                          style={{fontSize:11,color:w.note?'var(--text2)':'var(--text3)',cursor:'text',display:'block',
                                  minWidth:60,whiteSpace:'normal',wordBreak:'break-word',lineHeight:1.4}}>
                          {w.note || <em style={{opacity:0.4}}>+ add note</em>}
                        </span>
                      )}
                    </td>
                    <td className="muted" style={{fontSize:10}}>{w.addedAt?.split('T')[0]}</td>
                    <td><button className="btn btn-sm" onClick={()=>remove(w.ticker)} style={{padding:'3px 8px',fontSize:10,color:'var(--red)',borderColor:'rgba(255,61,87,0.3)'}}>✕</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}

        <div style={{marginTop:16,padding:'12px 16px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:5,fontSize:12,color:'var(--text3)',lineHeight:1.9}}>
          <strong style={{color:'var(--amber)'}}>Workflow:</strong><br/>
          <strong style={{color:'var(--text)'}}>Watching</strong> → Found via Thematic Hunt or tip. Monitoring RS trend.<br/>
          <strong style={{color:'var(--text)'}}>Candidate</strong> → RS ≥ 75 and rising. Waiting for swing momentum to confirm.<br/>
          <strong style={{color:'var(--text)'}}>Active Trade</strong> → Position open. Track until exit.
        </div>
      </div>
    </div>
  );
}

  const [history,  setHistory]  = useState(null);

  const [page, setPage] = useState(0);
  const PAGE_SIZE = 60;
  const allTrends = (history?.trends||[]).filter(t => filter==='all' || t.direction===filter);

  return (

            RS Today = current percentile rank (85 = beats 85% of universe).
            +/- 1W = how many RS points gained or lost vs 7 days ago.
            +/- 4W = gained/lost vs 28 days ago (1 month of accumulation signal).<br/>
            +/- 3M = RS change over 90 days — positive means sustained outperformance for a full quarter.<br/>
            <strong style={{color:'var(--amber)'}}>Best setup: RS 65-79 today AND +/- 4W is +5 or more = emerging leader, entry zone.</strong>

          </div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['rising','flat','falling','all'].map(f => (
            <button key={f} className={`mode-btn ${filter===f?'active':''}`}
              style={{fontSize:10,padding:'4px 10px',
                      borderColor:filter===f?dirColor(f):undefined,
                      color:filter===f?dirColor(f):undefined}}
              onClick={()=>setFilter(f)}>
              {dirIcon(f)} {f} ({(history?.trends||[]).filter(t=>f==='all'||t.direction===f).length})
            </button>
          ))}
        </div>
      </div>

      {history?.totalDays === 0 && (
        <div className="info-box">ℹ No history yet — pre-generated on first RS scan. Run ⟳ Scan above.</div>
      )}

      {loading ? <Loader msg="Loading RS history..."/> : trends.length > 0 && (
        <table className="data-table">
          <thead>
            <tr>
              <th title="Ticker symbol">Ticker</th>
              <TrendSH k="current"   label="RS Today" title="Current IBD RS rank (1-99, percentile vs universe). Click to sort."/>
              <TrendSH k="direction" label="Trend"    title="Direction based on 7-day RS change. Click to group rising/falling."/>
              <TrendSH k="vs1w"  label="+/- 1W"  title="RS rank change vs 7 days ago. +8 = gained 8 percentile points this week."/>
              <TrendSH k="vs2w"  label="+/- 2W"  title="RS rank change vs 14 days ago"/>
              <TrendSH k="vs4w"  label="+/- 4W"  title="RS rank change vs 28 days ago. Key: rising 4W = sustained accumulation."/>
              <TrendSH k="vs3m"  label="+/- 3M"  title="RS rank change vs 90 days ago. Full quarterly arc — most reliable signal."/>
              <th title="Actionable: ✓ SWING (RS≥70 rising), 👁 WATCH (RS≥55 rising), ✗ AVOID (RS falling below 50), ✗ FADE (falling), → HOLD (stable leader)">Signal</th>
            </tr>
          </thead>
          <tbody>
            {sortTrend(trends).map(t => {
              const interp =
                t.direction==='rising' && t.current>=80 ? '✓ SWING/POSITION — institutions accumulating' :
                t.direction==='rising' && t.current>=70 ? '✓ SWING candidate — RS entering actionable zone' :
                t.direction==='rising' && t.current>=55 ? '👁 WATCH — add to watchlist, RS approaching 70' :
                t.direction==='rising'                  ? '— Low base rising (RS below 55) — not actionable yet' :
                t.direction==='falling' && t.current<50 ? '✗ AVOID — distribution, RS weakening below 50' :
                t.direction==='falling'                 ? '✗ FADE — once-leader losing strength, avoid' :
                t.current>=75                           ? '→ HOLD — maintaining leadership, ok for positions' :
                                                          '— Neutral — monitor';
              return (
                <tr key={t.ticker}>
                  <td><span className="td-ticker">{t.ticker}</span></td>
                  <td><RSBar rs={t.current}/></td>
                  <td style={{color:dirColor(t.direction),fontFamily:'var(--font-mono)',fontWeight:700}}>
                    {dirIcon(t.direction)} {t.direction}
                  </td>
                  <td className={t.vs1w>0?'up':t.vs1w<0?'dn':''}>{t.vs1w!=null?(t.vs1w>0?'+':'')+t.vs1w:'—'}</td>
                  <td className={t.vs1m>0?'up':t.vs1m<0?'dn':''}>{t.vs1m!=null?(t.vs1m>0?'+':'')+t.vs1m:'—'}</td>
                  <td className={t.vs2m>0?'up':t.vs2m<0?'dn':''}>{t.vs2m!=null?(t.vs2m>0?'+':'')+t.vs2m:'—'}</td>
                  <td className={t.vs3m>0?'up':t.vs3m<0?'dn':''}>{t.vs3m!=null?(t.vs3m>0?'+':'')+t.vs3m:'—'}</td>
                  <td style={{fontSize:11,color:'var(--text3)'}}>{interp}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
    </div>
  );
}

function SectorIndustryRSTrend({ type, title, api: apiPath }) {
  const [history,  setHistory]  = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [open,     setOpen]     = useState(false);
  const { sortData: sortSI, SH: SISH } = useSortTable('current', -1);

  async function load() {
    if (history) return; // already loaded
    setLoading(true);
    try { const d = await api(apiPath); setHistory(d); } catch(_) {}
    setLoading(false);
  }

  function handleOpen() {
    setOpen(o => !o);
    if (!open && !history) load();
  }

  const dirColor = d => d==='rising'?'var(--green)':d==='falling'?'var(--red)':'var(--text3)';
  const dirIcon  = d => d==='rising'?'▲':d==='falling'?'▼':'→';
  const trends   = history?.trends || [];

  return (
    <div style={{marginTop:20}}>
      <hr style={{border:'none',borderTop:'1px solid var(--border)',margin:'20px 0'}}/>
      <button className="btn btn-sm" onClick={handleOpen} style={{marginBottom:10}}>
        {open?'▼':'▶'} {title} ({trends.length > 0 ? `${trends.length} items, ${history?.totalDays||0} snapshots` : 'click to load'})
      </button>
      {open && (
        <div>
          {loading && <Loader msg={`Loading ${type} RS history...`}/>}
          {history?.totalDays === 0 && (
            <div className="info-box">ℹ No {type} RS history yet. Load the {type} tab to start building history.</div>
          )}
          {trends.length > 0 && (
            <table className="data-table">
              <thead>
                <tr>
                  <th title="Sector or industry ETF ticker symbol">Name</th>
                  <SISH k="current"   label="IBD RS" title="Current RS percentile rank (1-99) within its universe — sectors vs sectors, industries vs industries"/>
                  <SISH k="direction" label="Trend"  title="Direction: rising >+3 pts in 7 days, falling <-3 pts, flat otherwise"/>
                  <SISH k="vs1w"      label="vs 1W"  title="RS rank change vs 7 days ago. Positive = gaining ground this week."/>
                  <SISH k="vs1m"      label="vs 1M"  title="RS rank change vs 30 days ago. Shows 1-month momentum arc."/>
                  <SISH k="vs2m"      label="vs 2M"  title="RS rank change vs 60 days ago. Distinguishes new vs sustained trends."/>
                  <SISH k="vs3m"      label="vs 3M"  title="RS rank change vs 90 days ago. Full quarterly arc — most reliable signal."/>
                  <th title="Actionable label derived from RS level + direction. Leading=RS≥80 rising (rotate in), Improving=RS≥60 rising (watch), Fading=falling (reduce), Lagging=RS<50 falling (avoid).">Signal</th>
                </tr>
              </thead>
              <tbody>
                {sortSI(trends).map(t => {
                  const signal =
                    t.direction==='rising'  && t.current>=80 ? 'Leading — rotate in' :
                    t.direction==='rising'  && t.current>=60 ? 'Improving — watch' :
                    t.direction==='falling' && t.current<50  ? 'Lagging — avoid' :
                    t.direction==='falling'                  ? 'Fading — reduce' :
                                                               'Neutral — hold';
                  return (
                    <tr key={t.ticker}>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--cyan)'}}>{t.ticker}</td>
                      <td><RSBar rs={t.current}/></td>
                      <td style={{color:dirColor(t.direction),fontFamily:'var(--font-mono)',fontWeight:700}}>
                        {dirIcon(t.direction)} {t.direction}
                      </td>
                      <td className={t.vs1w>0?'up':t.vs1w<0?'dn':''}>{t.vs1w!=null?(t.vs1w>0?'+':'')+t.vs1w:'—'}</td>
                      <td className={t.vs1m>0?'up':t.vs1m<0?'dn':''}>{t.vs1m!=null?(t.vs1m>0?'+':'')+t.vs1m:'—'}</td>
                      <td className={t.vs2m>0?'up':t.vs2m<0?'dn':''}>{t.vs2m!=null?(t.vs2m>0?'+':'')+t.vs2m:'—'}</td>
                      <td className={t.vs3m>0?'up':t.vs3m<0?'dn':''}>{t.vs3m!=null?(t.vs3m>0?'+':'')+t.vs3m:'—'}</td>
                      <td style={{fontSize:12,color:'var(--text2)'}}>{signal}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      )}
    </div>
  );
}

function CycleEngineTab({ rsData, rsLoaded }) {
  const [state,      setState]    = useState(null);
  const [loading,    setLoading]  = useState(true);
  const [saving,     setSaving]   = useState(false);
  const [autoData,   setAutoData] = useState(null);   // auto-detection result
  const [autoLoad,   setAutoLoad] = useState(false);
  const [bqData,     setBqData]   = useState([]);
  const [bqLoading,  setBqLoading]= useState(false);
  const [wlTickers,  setWlTickers]= useState([]);
  const [posForm,    setPosForm]  = useState({ ticker:'', entryPrice:'', stopPrice:'', wave:'WAVE1', exogenousFlag:false });
  const [addingPos,  setAddingPos]= useState(false);
  const [noteEdit,   setNoteEdit] = useState(false);
  const [noteDraft,  setNoteDraft]= useState('');

  useEffect(() => {
    loadState();
    loadWL();
    runAutoDetect(); // auto-run on mount
  }, []);

  async function loadState() {
    setLoading(true);
    try { const d = await api('/api/cycle-state'); setState(d); setNoteDraft(d.notes||''); } catch(_){}
    setLoading(false);
  }

  async function loadWL() {
    try { const d = await api('/api/watchlist'); setWlTickers((d.watchlist||[]).map(w=>w.ticker)); } catch(_){}
  }

  async function runAutoDetect() {
    setAutoLoad(true);
    try {
      const d = await api('/api/cycle-auto-detect');
      setAutoData(d);
      // If auto-applied, reload state
      if (d.autoApplied) await loadState();
    } catch(_) {}
    setAutoLoad(false);
  }

  async function applyAutoDetection() {
    if (!autoData) return;
    setSaving(true);
    try {
      const patch = {
        mode: autoData.mode,
        source: 'manual', // user explicitly clicked apply
        autoConfidence: autoData.confidence,
        autoSignals: autoData.signals,
      };
      if (autoData.mode === 'RALLY_ATTEMPT' && autoData.recentLowDate) {
        patch.rallyAttemptStartDate = autoData.recentLowDate;
        patch.rallyAttemptDay = autoData.rallyAttemptDay;
      }
      if (autoData.mode === 'FTD_CONFIRMED' && autoData.recentFTDday) {
        patch.ftdDate = autoData.recentFTDday;
        patch.waveDeployment = state?.waveDeployment || 'wave1';
      }
      const d = await api('/api/cycle-state', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ...state, ...patch }) });
      setState(d);
    } catch(_) {}
    setSaving(false);
  }

  async function save(patch) {
    setSaving(true);
    try {
      const d = await api('/api/cycle-state', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ...state, ...patch, source:'manual' }) });
      setState(d);
    } catch(_){}
    setSaving(false);
  }

  async function scoreWatchlist() {
    if (!wlTickers.length) return;
    setBqLoading(true);
    try {
      const d = await api('/api/base-quality', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ tickers: wlTickers }) });
      setBqData(d.scores || []);
    } catch(_){}
    setBqLoading(false);
  }

  function startRallyAttempt() {
    save({ mode:'RALLY_ATTEMPT', rallyAttemptStartDate: new Date().toISOString(), rallyAttemptDay: 1,
           ftdDate: null, ftdFailed: false, ftdConfirmWeek: false, waveDeployment:'none' });
  }
  function confirmFTD() {
    save({ mode:'FTD_CONFIRMED', ftdDate: new Date().toISOString(), ftdFailed: false,
           waveDeployment:'wave1', rallyAttemptDay: 0 });
  }
  function ftdFail() {
    save({ mode:'CORRECTION', ftdFailed: true, ftdDate: null, ftdConfirmWeek: false,
           waveDeployment:'none', rallyAttemptDay: 0, rallyAttemptStartDate: null });
  }
  function confirmFTDWeek() { save({ ftdConfirmWeek: true }); }

  function addPosition() {
    if (!posForm.ticker || !posForm.entryPrice || !posForm.stopPrice) return;
    const pos = { ticker:posForm.ticker.toUpperCase(), entryPrice:parseFloat(posForm.entryPrice),
      stopPrice:parseFloat(posForm.stopPrice), wave:posForm.wave, exogenousFlag:posForm.exogenousFlag,
      entryDate:new Date().toISOString().split('T')[0] };
    save({ activePositions: [...(state?.activePositions||[]), pos] });
    setPosForm({ ticker:'', entryPrice:'', stopPrice:'', wave:'WAVE1', exogenousFlag:false });
    setAddingPos(false);
  }
  function removePosition(ticker) {
    save({ activePositions: (state?.activePositions||[]).filter(p=>p.ticker!==ticker) });
  }
  function setMode(mode) {
    const patch = { mode, source:'manual' };
    if (['CORRECTION','BEAR','CHOPPY'].includes(mode)) {
      patch.rallyAttemptDay = 0; patch.rallyAttemptStartDate = null;
      patch.ftdDate = null; patch.waveDeployment = 'none'; patch.ftdFailed = false;

  const MODE_CONFIG = {

  const flagBadge = (flags=[]) => (

        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        {/* ── WATCHLIST BASE QUALITY SCORES ──────────────────────────────── */}
        <div className="panel">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div>
              <div className="panel-title">Base Quality Scores <span>— Watchlist</span></div>
              <div style={{fontSize:11,color:'var(--text3)'}}>Score 0-100 · RS line + vol dry-up + VCP + Stage 2 · hover ℹ for breakdown</div>
            </div>
            <button className="btn btn-sm btn-primary" onClick={scoreWatchlist} disabled={bqLoading||!wlTickers.length}>
              {bqLoading?'⏳':'↻'} Score All
            </button>
          </div>
          {wlTickers.length===0 && <div className="info-box">Add stocks to your Watchlist tab first — they'll appear here for scoring.</div>}
          {bqLoading && <div className="loader"><div className="spinner"/>Scoring watchlist stocks...</div>}
          {!bqLoading && bqData.length>0 && (
            <table className="data-table">
              <thead><tr>
                <th title="Ticker">Ticker</th>
                <th title="Base Quality Score 0-100. Higher = better base during the correction. Hover ℹ for breakdown.">BQ Score</th>
                <th title="Wave 1/2/3 assignment based on BQ score + RS rank + flags">Wave</th>
                <th title="IBD RS rank">RS</th>
                <th title="Weinstein Stage">Stage</th>
                <th title="EXOG = war-premium RS. RS÷P = RS rising while price fell (best signal).">Flags</th>
              </tr></thead>
              <tbody>
                {[...bqData].sort((a,b)=>(b.score||0)-(a.score||0)).map(b => {
                  const wCfg = {WAVE1:{...WAVE_CONFIG.wave1},WAVE2:{...WAVE_CONFIG.wave2},WAVE3:{...WAVE_CONFIG.wave3},WATCH:{label:'WATCH',color:'var(--amber)'},AVOID:{label:'AVOID',color:'var(--red)'}};
                  const wc2 = wCfg[b.wave]||wCfg.WATCH;
                  return (
                    <tr key={b.ticker}>
                      <td><span className="td-ticker">{b.ticker}</span></td>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          <div style={{width:36,height:4,background:'var(--border2)',borderRadius:2}}>
                            <div style={{width:`${b.score||0}%`,height:'100%',borderRadius:2,background:bqColor(b.score||0)}}/>
                          </div>
                          <span style={{fontFamily:'var(--font-mono)',fontSize:12,fontWeight:700,color:bqColor(b.score||0)}}>{b.score??'—'}</span>
                        </div>
                        <div style={{fontSize:9,color:'var(--text3)',marginTop:1,cursor:'help'}}
                          title={`RS↑:+${b.breakdown?.rsLineUp||0} | Vol:+${b.breakdown?.volumeDryup||0} | VCP:+${b.breakdown?.vcpForming||0} | S2:+${b.breakdown?.stage2||0} | RShi:+${b.breakdown?.rsLineNewHigh||0} | Stage pen:${b.breakdown?.stagePenalty||0} | RSfall:${b.breakdown?.rsFalling||0}`}>
                          ℹ breakdown
                        </div>
                      </td>
                      <td>
                        <span style={{fontSize:10,fontWeight:700,fontFamily:'var(--font-mono)',color:wc2.color,padding:'2px 6px',borderRadius:2,border:`1px solid ${wc2.color}44`,background:`${wc2.color}11`}}>
                          {b.wave}
                        </span>
                      </td>
                      <td><RSBar rs={b.rsRank}/></td>
                      <td style={{fontSize:11,color:b.stage===2?'var(--green)':b.stage===4?'var(--red)':'var(--amber)'}}>{b.stageName||'—'}</td>
                      <td>{flagBadge(b.flags||[])}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>

        {/* ── WAVE ASSIGNMENT PANEL ───────────────────────────────────────── */}
        <div className="panel">
          <div className="panel-title" style={{marginBottom:4}}>Wave Assignment <span>— After FTD Confirmed</span></div>
          <div style={{fontSize:11,color:'var(--text3)',marginBottom:12,lineHeight:1.8}}>
            Score your watchlist first. Stocks auto-sort by BQ score, RS rank, and flags.
            {mode!=='FTD_CONFIRMED' && <span style={{color:'var(--amber)'}}>{' '}Wave deployment active after FTD confirmed.</span>}
          </div>
          {bqData.length===0
            ? <div className="info-box">Score your Watchlist to populate Wave assignments.</div>
            : <>
                {[{title:'WAVE 1 — First Strike',color:'var(--green)',bg:'rgba(0,230,118,0.05)',border:'rgba(0,230,118,0.15)',items:wave1,desc:'BQ≥80, RS≥90, no EXOG, at pivot. Half position.'},
                  {title:'WAVE 2 — Quality Expansion',color:'var(--cyan)',bg:'rgba(0,212,255,0.05)',border:'rgba(0,212,255,0.15)',items:wave2,desc:'BQ 60-79, Stage 2, earnings confirming. Full size.'},
                  {title:'WAVE 3 — Swing Momentum',color:'var(--purple)',bg:'rgba(196,77,255,0.05)',border:'rgba(196,77,255,0.15)',items:wave3,desc:'RS≥90, 3-5wk base. Smaller size, tighter stops.'},
                ].map(({title,color,bg,border,items,desc})=>(
                  <div key={title} style={{marginBottom:12}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                      <span style={{fontFamily:'var(--font-mono)',fontSize:10,fontWeight:700,color,letterSpacing:1}}>{title}</span>
                      <span style={{fontSize:10,color:'var(--text3)'}}>{desc}</span>
                    </div>
                    {items.length===0
                      ? <div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic',paddingLeft:4}}>None qualifying yet.</div>
                      : items.map(b=>(
                          <div key={b.ticker} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 8px',background:bg,borderRadius:3,marginBottom:2,border:`1px solid ${border}`}}>
                            <span className="td-ticker" style={{minWidth:48}}>{b.ticker}</span>
                            <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:bqColor(b.score),fontWeight:700,minWidth:24}}>{b.score}</span>
                            <RSBar rs={b.rsRank}/>
                            <span style={{fontSize:10,color:'var(--text3)',flex:1}}>{b.stageName}</span>
                            {flagBadge(b.flags)}
                          </div>
                        ))
                    }
                  </div>
                ))}
                {exogen.length>0 && (
                  <div style={{padding:'8px 12px',background:'rgba(255,61,87,0.06)',borderRadius:4,border:'1px solid rgba(255,61,87,0.25)'}}>
                    <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--red)',fontWeight:700,marginBottom:4}}>⚠ EXOGENOUS RS — NOT Wave 1 buys</div>
                    <div style={{fontSize:10,color:'var(--text3)',marginBottom:5}}>War-premium RS (energy/defense). Reversal risk on ceasefire. Monitor only.</div>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      {exogen.map(b=><span key={b.ticker} style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--red)',fontWeight:700}}>{b.ticker}</span>)}
                    </div>
                  </div>
                )}
              </>
          }
        </div>
      </div>

      {/* ── POSITION RISK MONITOR ──────────────────────────────────────────── */}
      <div className="panel">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div>
            <div className="panel-title">Position Risk Monitor <span>— Active Trades</span></div>
            <div style={{fontSize:11,color:'var(--text3)'}}>Stop proximity alerts. FTD failure triggers full review banner.</div>
          </div>
          <button className="btn btn-sm" onClick={()=>setAddingPos(v=>!v)} style={{borderColor:'var(--cyan)',color:'var(--cyan)'}}>
            {addingPos?'✕ Cancel':'+ Add Position'}
          </button>
        </div>
        {state?.ftdFailed && positions.length>0 && (
          <div style={{padding:'10px 14px',background:'rgba(255,61,87,0.1)',border:'1px solid rgba(255,61,87,0.4)',borderRadius:5,marginBottom:12,fontFamily:'var(--font-mono)',fontSize:11,color:'var(--red)',fontWeight:700}}>
            ⚠ FTD FAILED — Any position ≥7% below entry: SELL TODAY. No exceptions.
          </div>
        )}
        {addingPos && (
          <div style={{padding:'12px 14px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:5,marginBottom:12,display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end'}}>
            {[{key:'ticker',placeholder:'TICKER',width:80,mono:true,upper:true},{key:'entryPrice',placeholder:'Entry $',width:90,mono:true},{key:'stopPrice',placeholder:'Stop $',width:90,mono:true}].map(f=>(
              <div key={f.key}>
                <div style={{fontSize:9,color:'var(--text3)',marginBottom:3,letterSpacing:1,textTransform:'uppercase'}}>{f.placeholder}</div>
                <input value={posForm[f.key]} onChange={e=>setPosForm(p=>({...p,[f.key]:f.upper?e.target.value.toUpperCase():e.target.value}))}
                  style={{width:f.width,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'6px 8px',fontFamily:f.mono?'var(--font-mono)':'var(--font-sans)',fontSize:12,outline:'none'}}/>
              </div>
            ))}
            <div>
              <div style={{fontSize:9,color:'var(--text3)',marginBottom:3}}>WAVE</div>
              <select value={posForm.wave} onChange={e=>setPosForm(p=>({...p,wave:e.target.value}))}
                style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'6px 8px',fontSize:11,outline:'none'}}>
                <option value="WAVE1">Wave 1</option><option value="WAVE2">Wave 2</option><option value="WAVE3">Wave 3</option>
              </select>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:5,paddingBottom:2}}>
              <input type="checkbox" id="exogChk" checked={posForm.exogenousFlag} onChange={e=>setPosForm(p=>({...p,exogenousFlag:e.target.checked}))}/>
              <label htmlFor="exogChk" style={{fontSize:11,color:'var(--red)',cursor:'pointer'}}>⚠ Exogenous</label>
            </div>
            <button className="btn btn-sm btn-primary" onClick={addPosition} disabled={!posForm.ticker||!posForm.entryPrice||!posForm.stopPrice}>Add</button>
          </div>
        )}
        {positions.length===0 && !addingPos && <div className="empty" style={{padding:'16px'}}>No active positions. Add them above after opening a trade.</div>}
        {positions.length>0 && (
          <table className="data-table">
            <thead><tr>
              <th>Ticker</th><th>Wave</th><th>Entry</th><th>Stop</th>
              <th title="Risk per share (entry - stop)">Risk/Sh</th>
              <th>Current</th><th>P&amp;L%</th>
              <th title="% distance from stop. Red = within 1% of stop.">vs Stop</th>
              <th>Status</th><th></th>
            </tr></thead>
            <tbody>
              {positions.map(pos => {
                const rs = rsData?.find(s=>s.ticker===pos.ticker);
                const cur = rs?.price ?? null;
                const pnlPct = cur ? +((cur-pos.entryPrice)/pos.entryPrice*100).toFixed(2) : null;
                const vsStop = cur ? +((cur-pos.stopPrice)/pos.stopPrice*100).toFixed(2) : null;
                const riskSh = +(pos.entryPrice-pos.stopPrice).toFixed(2);
                const stopPct = +((pos.entryPrice-pos.stopPrice)/pos.entryPrice*100).toFixed(1);
                let status='—', statusCol='var(--text3)', statusBg='transparent';
                if (vsStop!==null) {
                  if (cur<=pos.stopPrice)  { status='🔴 AT STOP — SELL';  statusCol='var(--red)';  statusBg='rgba(255,61,87,0.15)'; }
                  else if (vsStop<1)       { status='🟠 NEAR STOP';        statusCol='#ff8c00';     statusBg='rgba(255,140,0,0.10)'; }
                  else if (vsStop<3)       { status='🟡 Caution';          statusCol='var(--amber)'; }
                  else if (pnlPct>=20)     { status='🟢 Eval Trim';        statusCol='var(--green)'; }
                  else                     { status='✓ Safe';              statusCol='var(--green)'; }
                }
                if (state?.ftdFailed && pnlPct!==null && pnlPct<=-7) {
                  status='⚠ FTD EXIT'; statusCol='var(--red)'; statusBg='rgba(255,61,87,0.2)';
                }
                const wCol = {WAVE1:'var(--green)',WAVE2:'var(--cyan)',WAVE3:'var(--purple)'};
                return (
                  <tr key={pos.ticker} style={{background:statusBg}}>
                    <td><span className="td-ticker">{pos.ticker}</span>{pos.exogenousFlag&&<span style={{fontSize:9,marginLeft:3,color:'var(--red)'}}>⚠EXOG</span>}<div style={{fontSize:9,color:'var(--text3)'}}>{pos.entryDate}</div></td>
                    <td><span style={{fontSize:10,fontWeight:700,color:wCol[pos.wave]||'var(--text3)'}}>{pos.wave}</span></td>
                    <td style={{fontFamily:'var(--font-mono)'}}>${pos.entryPrice.toFixed(2)}</td>
                    <td style={{fontFamily:'var(--font-mono)',color:'var(--red)'}}>${pos.stopPrice.toFixed(2)}</td>
                    <td style={{fontFamily:'var(--font-mono)',color:'var(--red)'}}>${Math.abs(riskSh).toFixed(2)}<div style={{fontSize:9,color:'var(--text3)'}}>{stopPct}%</div></td>
                    <td style={{fontFamily:'var(--font-mono)'}}>{cur?`$${cur.toFixed(2)}`:'—'}</td>
                    <td className={pnlPct!=null?(pnlPct>=0?'up':'dn'):''}>{pnlPct!=null?`${pnlPct>0?'+':''}${pnlPct}%`:'—'}</td>
                    <td style={{fontFamily:'var(--font-mono)',color:vsStop!=null&&vsStop<3?'var(--red)':'var(--text2)'}}>{vsStop!=null?`${vsStop>0?'+':''}${vsStop}%`:'—'}</td>
                    <td style={{fontSize:11,fontWeight:700,color:statusCol}}>{status}</td>
                    <td><button onClick={()=>removePosition(pos.ticker)} style={{padding:'2px 8px',background:'transparent',border:'1px solid rgba(255,61,87,0.3)',borderRadius:2,color:'var(--red)',fontSize:10,cursor:'pointer'}}>✕</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {/* ── STRATEGY NOTES ─────────────────────────────────────────────────── */}
      <div className="panel">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div className="panel-title">Cycle Notes <span>— Persisted</span></div>
          {!noteEdit
            ? <button className="btn btn-sm" onClick={()=>setNoteEdit(true)}>✏ Edit</button>
            : <div style={{display:'flex',gap:6}}>
                <button className="btn btn-sm btn-primary" onClick={()=>{save({notes:noteDraft});setNoteEdit(false);}}>✓ Save</button>
                <button className="btn btn-sm" onClick={()=>setNoteEdit(false)}>✕</button>
              </div>
          }
        </div>
        {noteEdit
          ? <textarea value={noteDraft} onChange={e=>setNoteDraft(e.target.value)} rows={4}
              placeholder="E.g. FTD Day 5 on 2026-04-08. SPY +1.4% on vol above prior day. Wave 1 targets: XYZ, ABC. Watching for 10wk pullback on MNST..."
              style={{width:'100%',background:'var(--bg2)',border:'1px solid var(--amber)',borderRadius:4,color:'var(--text)',padding:'10px',fontSize:12,fontFamily:'var(--font-sans)',outline:'none',resize:'vertical',lineHeight:1.8}}/>
          : <div style={{fontSize:12,color:state?.notes?'var(--text2)':'var(--text3)',lineHeight:1.9,whiteSpace:'pre-wrap',minHeight:32}}>
              {state?.notes || <em>No notes. Click Edit to log your cycle observations.</em>}
            </div>
        }
        {state?.updatedAt && <div style={{fontSize:10,color:'var(--text3)',marginTop:5}}>Last saved: {new Date(state.updatedAt).toLocaleString()}</div>}
      </div>
    </div>
  );
}
ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
