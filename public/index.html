              </span>
            ))}
            <span style={{color:'var(--text3)'}}>· Showing stocks in these sectors only.</span>
            <button onClick={()=>setSelectedSectors(new Set())} style={{marginLeft:'auto',padding:'2px 8px',fontSize:10,border:'1px solid var(--border)',borderRadius:3,background:'transparent',color:'var(--text3)',cursor:'pointer'}}>
              ✕ Show all sectors
            </button>
          </div>
        )}

        {error && <ErrorBox msg={error}/>}
        {loading ? <Loader msg={`Scanning ${rsData.length||150}+ stocks...`}/> : (
          <>
            <div style={{overflowX:'auto'}}>
              <table className="data-table" style={{tableLayout:'fixed',width:'100%',minWidth:920}}>
                <colgroup>
                  <col style={{width:'100px'}}/>{/* IBD RS */}
                  <col style={{width:'48px'}}/>{/* Mom */}
                  <col style={{width:'50px'}}/>{/* Accel */}
                  <col style={{width:'92px'}}/>{/* Signals */}
                  <col style={{width:'58px'}}/>{/* Ticker */}
                  <col style={{width:'88px'}}/>{/* Name */}
                  <col style={{width:'58px'}}/>{/* Price */}
                  <col style={{width:'52px'}}/>{/* 1D */}
                  <col style={{width:'52px'}}/>{/* 1W */}
                  <col style={{width:'64px'}}/>{/* vs 50MA */}
                  <col style={{width:'58px'}}/>{/* 52wkH% */}
                  <col style={{width:'72px'}}/>{/* Vol */}
                  <col style={{width:'48px'}}/>{/* Earn */}
                  <col style={{width:'56px'}}/>{/* Levels */}
                </colgroup>
                <thead>
                  <tr>
                    <SH k="rsRank"        label="IBD RS"    title="Percentile rank 1-99 vs universe (12M weighted). ≥ 70 = top 30% institutional quality."/>
                    <SH k="swingMomentum" label="Mom"       title="Raw price velocity NOW — NOT vs peers. Base 50+(5d%×3)+(10d%×1.5)+(21d%×0.5)+5 if above MA10. Score 94≈13% in 5d. Score 50=flat. ≥60=fast, ≥45=ok, <40=stalling."/>
                    <SH k="rsTrend.vs4w"  label="Accel"     title="RS Accel: percentile rank change vs 28 days ago. +12=passed 12% of peers. Sort ↓ to find fastest institutional accumulation."/>
                    <th title="Signals: ★=Triple (RS>70+Accel+Mom>60). ⭐=RS Line 52wk high. ↗=Emerging RS55-70. VCP=coiling setup. S2=Stage2 uptrend. SEPA/8=Minervini score.">Signals</th>
                    <th title="Ticker symbol. Hover for company name.">Ticker</th>
                    <th title="Company name (truncated)">Name</th>
                    <SH k="price"         label="Price"     title="Current market price"/>
                    <SH k="chg1d"         label="1D"        title="Today's price change %"/>
                    <SH k="chg1w"         label="1W"        title="5-day price return"/>
                    <SH k="vsMA50"        label="vs 50MA"   title="% above/below 50-day MA. 0-5% above = buyable pullback zone. >5% = extended. Negative = caution."/>
                    <SH k="distFromHigh"  label="52wkH%"    title="% below 52-week high. <5% = near breakout. Sort ascending to find stocks nearest highs."/>
                    <SH k="volumeRatio"   label="Vol"       title="Today's volume ÷ 3M avg. ⚡=surge ≥2x near highs. ACC=above 50MA+vol>1.2x. DIST=below 50MA+vol>1.2x."/>
                    <th title="Days until next earnings. ⚠ red=7d, amber=14d. Never hold swings into earnings.">Earn</th>
                    <th style={{width:55}}></th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(s => (
                    <React.Fragment key={s.ticker}>
                    <tr ref={el => rowRefs.current[s.ticker] = el}
                      style={{
                        background:expandedTicker===s.ticker?'rgba(240,165,0,0.12)':'',
                        borderLeft:expandedTicker===s.ticker?'3px solid var(--amber)':'3px solid transparent',
                        transition:'background 0.15s',
                      }}>
                      <td><RSBar rs={s.rsRank}/></td>
                      <td>
                        {s.swingMomentum != null
                          ? <span style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:700,color:s.swingMomentum>=60?'var(--green)':s.swingMomentum>=45?'var(--amber)':'var(--red)'}}>{s.swingMomentum}</span>
                          : <span className="muted">—</span>}
                      </td>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:12}}>
                        {s.rsTrend?.vs4w != null
                          ? (s.rsRank >= 98 && Math.abs(s.rsTrend.vs4w) <= 2
                              ? <span style={{color:'var(--gold)',fontSize:9,fontWeight:700}} title="Sustained top RS">★PEAK</span>
                              : s.rsRank <= 3 && Math.abs(s.rsTrend.vs4w) <= 2
                              ? <span style={{color:'var(--red)',fontSize:9}} title="Sustained bottom">FLOOR</span>
                              : <span className={s.rsTrend.vs4w>3?'up':s.rsTrend.vs4w<-3?'dn':''}>{s.rsTrend.vs4w>0?'+':''}{s.rsTrend.vs4w}</span>)
                          : <span className="muted">—</span>}
                      </td>
                      <td style={{whiteSpace:'nowrap',fontSize:10}}>
                        {(s.rsRank>=70 && (s.rsTrend?.vs4w||0)>0 && s.swingMomentum>=60) && (
                          <span title="Triple: RS>70+Accel>0+Mom>60" style={{color:'var(--green)',fontWeight:700,marginRight:3}}>★</span>
                        )}
                        {s.rsLineNewHigh && (
                          <span title="RS Line at 52wk high — stock outperforming SPY. IBD #1 signal." style={{color:'var(--gold)',fontWeight:700,marginRight:3}}>⭐</span>
                        )}
                        {(s.rsTrend?.vs4w>5 && s.rsRank>=55 && s.rsRank<70) && (
                          <span title="Emerging: RS 55-70 rising fast. Watch for >70." style={{color:'var(--cyan)',fontWeight:700,marginRight:3}}>↗</span>
                        )}
                        {s.vcpForming && (
                          <span title={`VCP ${s.vcpCount}× contractions. Pivot $${s.vcpPivot}. Stop $${s.vcpStop}. Best with S2.`} style={{color:'var(--purple)',fontWeight:700,marginRight:3}}>VCP</span>
                        )}
                        {s.stage===2 && <span title="S2: price above rising 150MA. Required for all long setups." style={{color:'var(--green)',fontWeight:700,marginRight:3}}>S2</span>}
                        {s.stage===4 && <span title="S4: Downtrend. Avoid all longs." style={{color:'var(--red)',fontWeight:700,marginRight:3}}>S4</span>}
                        {s.sepaScore!=null && <span title={s.sepa?Object.entries(s.sepa).map(([k,v])=>`${k}:${v===true?'✓':v===false?'✗':'?'}`).join(' '):'SEPA score'} style={{color:s.sepaScore>=6?'var(--green)':s.sepaScore>=4?'var(--amber)':'var(--text3)',fontWeight:700}}>{s.sepaScore}/8</span>}
                      </td>
                      <td><span className="td-ticker" title={s.name}>{s.ticker}</span></td>
                      <td className="td-name" style={{maxWidth:90,overflow:'hidden',textOverflow:'ellipsis'}}>{s.name}</td>
                      <td style={{fontWeight:600}}>${fmt(s.price)}</td>
                      <td className={fmtC(s.chg1d)}>{fmtP(s.chg1d)}</td>
                      <td className={fmtC(s.chg1w)}>{fmtP(s.chg1w)}</td>
                      <td className={s.vsMA50>0?'up':'dn'}>{fmt(s.vsMA50,1)}%</td>
                      <td title={s.distFromHigh!=null?`${(s.distFromHigh*100).toFixed(1)}% below $${s.w52h?.toFixed(2)}`:''}>{
                        s.distFromHigh!=null && s.distFromHigh<=0.005
                          ? <span style={{color:'var(--green)',fontWeight:700,fontSize:10}}>🔥</span>
                          : <span style={{color:s.distFromHigh<=0.03?'var(--green)':s.distFromHigh<=0.07?'var(--amber)':'var(--text3)'}}>
                              {s.distFromHigh!=null?`-${(s.distFromHigh*100).toFixed(1)}%`:'—'}
                            </span>
                      }</td>
                      <td className={s.volumeRatio>1.5?'up':s.volumeRatio<0.7?'dn':''}>
                        {fmt(s.volumeRatio,2)}x
                        {s.volumeSurge && <span title="Vol surge ≥2x near highs" style={{color:'var(--amber)',marginLeft:3}}>⚡</span>}
                        {s.volumeTrend==='accumulating' && <span style={{color:'var(--green)',fontSize:9,marginLeft:3}}>ACC</span>}
                        {s.volumeTrend==='distributing' && <span style={{color:'var(--red)',fontSize:9,marginLeft:3}}>DIST</span>}
                      </td>
                      <td style={{fontSize:11}}>
                        {s.earningsDate && (
                          <span style={{color:s.daysToEarnings<=7?'var(--red)':s.daysToEarnings<=14?'var(--amber)':'var(--text3)',fontFamily:'var(--font-mono)',fontWeight:s.daysToEarnings<=14?700:400}} title={`Next earnings: ${s.earningsDate}`}>
                            ⚠{s.daysToEarnings}d
                          </span>
                        )}
                      </td>
                      <td>
                        <button className="btn btn-sm" style={{padding:'2px 8px',fontSize:9,background:expandedTicker===s.ticker?'var(--amber)':'transparent',color:expandedTicker===s.ticker?'#000':'var(--text2)',borderColor:expandedTicker===s.ticker?'var(--amber)':'var(--border)'}}
                          onClick={()=> expandedTicker===s.ticker ? closeLevels() : setExpandedTicker(s.ticker)}>
                          {expandedTicker===s.ticker?'▲ Close':'Levels'}
                        </button>
                      </td>
                    </tr>
                    {expandedTicker===s.ticker && (
                      <tr ref={levelsRef}>
                        <td colSpan={14} style={{padding:0,background:'var(--bg)',borderLeft:'3px solid var(--amber)',borderBottom:'2px solid var(--amber)'}}>
                          <div style={{padding:'16px 20px',animation:'fadeUp 0.2s ease'}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                                <span style={{fontFamily:'var(--font-mono)',fontSize:16,fontWeight:700,color:'var(--amber)'}}>▶ {s.ticker}</span>
                                <span style={{fontSize:13,color:'var(--text2)'}}>{s.name}</span>
                                <span style={{fontFamily:'var(--font-mono)',fontSize:14,color:'var(--text)',fontWeight:600}}>${fmt(s.price)}</span>
                                {s.sector && <span style={{fontSize:11,padding:'2px 8px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text2)'}}>{s.sector}</span>}
                              </div>
                              <button onClick={closeLevels} style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',cursor:'pointer',fontSize:13,padding:'3px 10px',borderRadius:4,fontWeight:700}}>✕ Close</button>
                            </div>
                            <InlineLevels stock={s}/>
                          </div>
                        </td>
                      </tr>
                    )}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        )}

        {/* ── RS TREND HISTORY (merged) ── */}
        {rsLoaded && (
          <RSTrendSection rsData={rsData} />
        )}
      </div>
    </div>
  );
}

// ─── TRADE SETUPS (unified: conviction-ranked picks + ATR levels + regime gate) ──
function TradeSetupsTab({ rsData, rsLoaded, results, setResults, regime, setRegime, scanned, setScanned, summary, setSummary }) {
  const [mode,    setMode]   = useState('swing');
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState('');
  const [picks,   setPicks]   = useState(null);
  const [picksLoad, setPicksLoad] = useState(false);

  useEffect(() => { loadPicks(); }, []);

  async function loadPicks() {
    setPicksLoad(true);
    try {
      const d = await api('/api/daily-picks');
      setPicks(d.picks || []);
      if (d.regime) setRegime(d.regime);
    } catch(_) {}
    setPicksLoad(false);
  }

  async function runScan() {
    if (!rsLoaded || !rsData.length) {
      setError('Load RS data first — click "↻ REFRESH ALL" in the header');
      return;
    }
    setLoading(true); setError(''); setResults([]);
    try {
      const d = await api('/api/swing-lab/scan', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ stocks: rsData, mode }),
      });
      setResults(d.results || []);
      setRegime(d.regime || null);
      setScanned(d.scannedCount || 0);
      setSummary(d.message || '');
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  const scoreColor = s => s >= 75 ? 'var(--green)' : s >= 55 ? 'var(--amber)' : 'var(--text3)';
  const noLongs = regime && (regime.regime === 'HIGH RISK / BEAR' || regime.sizeMultiplier === 0);

  return (
    <div>
      {/* Regime gate — a pro doesn't buy longs in a bear market */}
      {noLongs && (
        <div style={{padding:'16px 20px',background:'rgba(255,61,87,0.12)',border:'2px solid rgba(255,61,87,0.5)',borderRadius:6,marginBottom:14}}>
          <div style={{fontFamily:'var(--font-mono)',fontSize:18,fontWeight:800,color:'var(--red)',letterSpacing:2}}>NO NEW LONGS</div>
          <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>
            Market regime is <strong style={{color:'var(--red)'}}>{regime.regime}</strong> — size multiplier 0x.
            A professional trader preserves capital in hostile environments. Setups below are for watchlist only.
          </div>
        </div>
      )}

      {regime && !noLongs && <RegimeBanner regime={regime} />}

      <div className="panel" style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <div>
            <div className="panel-title">Trade <span>Setups</span></div>
            <div className="panel-sub">Conviction-ranked candidates with ATR-based levels. Run RS Scanner first.</div>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <div className="btn-group">
              {['swing','position','both'].map(m => (
                <button key={m} className={`mode-btn ${mode===m?'active':''}`}
                  onClick={() => setMode(m)}>
                  {m === 'swing' ? '⚡ Swing' : m === 'position' ? '📈 Position' : 'Both'}
                </button>
              ))}
            </div>
            <button className="btn btn-primary" onClick={runScan} disabled={loading}>
              {loading ? '⟳ Scanning...' : '⟳ Scan Levels'}
            </button>
            <button className="btn btn-sm" onClick={loadPicks} disabled={picksLoad}>
              {picksLoad ? '⟳...' : '⟳ Refresh Picks'}
            </button>
          </div>
        </div>
        {error && <ErrorBox msg={error}/>}
      </div>

      {(loading || picksLoad) && <div className="panel"><Loader msg="Scanning universe..."/></div>}

      {/* Conviction-ranked picks */}
      {picks && picks.length > 0 && (
        <div style={{marginBottom:20}}>
          <div style={{display:'grid',gap:10}}>
            {picks.map((s, rank) => {
              const atr = s.atr || (s.price * 0.02);
              const ma50buf = s.ma50 && s.ma50 > s.price * 0.85 ? s.ma50 : null;
              // Position entry: pullback to 50MA area, not current price
              const posEntry = ma50buf ? +(ma50buf * 1.002).toFixed(2) : +(s.price * 0.97).toFixed(2);
              const swStop = ma50buf ? +(ma50buf - 0.5*atr).toFixed(2) : +(s.price - 1.5*atr).toFixed(2);
              const posStop = ma50buf ? +(ma50buf * 0.975).toFixed(2) : +(s.price - 2*atr).toFixed(2);
              const swRisk = +(s.price - swStop).toFixed(2);
              const t1 = +(s.price + 2.5*atr).toFixed(2);
              const posT1 = +(posEntry + 3*atr).toFixed(2);
              const rr = swRisk > 0 ? +((t1-s.price)/swRisk).toFixed(1) : 0;
              const posRR = (posEntry - posStop) > 0 ? +((posT1-posEntry)/(posEntry-posStop)).toFixed(1) : 0;
              return (
                <div key={s.ticker} style={{
                  background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,padding:'14px 16px',
                  borderLeft:`3px solid ${rank===0?'var(--green)':rank<=2?'var(--amber)':'var(--border)'}`,
                  opacity: noLongs ? 0.6 : 1,
                }}>
                  <div style={{display:'flex',alignItems:'flex-start',gap:14,flexWrap:'wrap',marginBottom:8}}>
                    <div style={{minWidth:30,textAlign:'center'}}>
                      <div style={{fontFamily:'var(--font-mono)',fontSize:18,color:rank===0?'var(--green)':rank<=2?'var(--amber)':'var(--text3)',fontWeight:700}}>#{rank+1}</div>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:6}}>
                        <span className="td-ticker" style={{fontSize:18}}>{s.ticker}</span>
                        <span style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--text)'}}>${s.price?.toFixed(2)}</span>
                        <span style={{fontSize:10,color:'var(--text3)'}}>{s.sector}</span>
                        {s.rsLineNewHigh && <span style={{color:'var(--gold)',fontWeight:700,fontSize:11}}>⭐ RS Line High</span>}
                        {s.vcpForming && <span style={{color:'var(--purple)',fontWeight:700,fontSize:11}}>VCP {s.vcpCount}x</span>}
                        {s.earningsRisk && <span style={{color:'var(--red)',fontWeight:700,fontSize:11}}>⚠ Earnings {s.daysToEarnings}d</span>}
                      </div>
                      <div style={{display:'flex',gap:16,flexWrap:'wrap',fontSize:12}}>
                        <div><span style={{color:'var(--text3)',fontSize:9,letterSpacing:1}}>RS </span><span style={{fontFamily:'var(--font-mono)',fontWeight:700,color:rsColor(s.rsRank)}}>{s.rsRank}</span></div>
                        <div><span style={{color:'var(--text3)',fontSize:9,letterSpacing:1}}>ACCEL </span><span style={{fontFamily:'var(--font-mono)',fontWeight:700,color:s.rsTrend?.vs4w>5?'var(--green)':'var(--amber)'}}>{s.rsTrend?.vs4w>0?'+':''}{s.rsTrend?.vs4w||0}</span></div>
                        <div><span style={{color:'var(--text3)',fontSize:9,letterSpacing:1}}>MOM </span><span style={{fontFamily:'var(--font-mono)',fontWeight:700,color:s.swingMomentum>=60?'var(--green)':'var(--amber)'}}>{s.swingMomentum}</span></div>
                        <div><span style={{color:'var(--text3)',fontSize:9,letterSpacing:1}}>SEPA </span><span style={{fontFamily:'var(--font-mono)',fontWeight:700,color:s.sepaScore>=5?'var(--green)':'var(--amber)'}}>{s.sepaScore}/8</span></div>
                        <div><span style={{color:'var(--text3)',fontSize:9,letterSpacing:1}}>CONV </span><span style={{fontFamily:'var(--font-mono)',fontWeight:700,color:scoreColor(s.convictionScore)}}>{s.convictionScore}</span></div>
                      </div>
                    </div>
                  </div>

                  {/* Trade levels */}
                  <div style={{display:'grid',gridTemplateColumns:mode==='both'?'1fr 1fr':'1fr',gap:10,marginTop:8}}>
                    {(mode==='swing' || mode==='both') && (
                      <div style={{background:'var(--bg2)',borderRadius:4,padding:10,border:'1px solid rgba(0,212,255,0.2)'}}>
                        <div style={{fontSize:9,color:'var(--cyan)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:6}}>SWING (2-10d)</div>
                        <div style={{display:'flex',gap:12,flexWrap:'wrap',fontSize:12}}>
                          <div><span style={{color:'var(--text3)'}}>Entry </span><span style={{color:'var(--green)',fontWeight:700,fontFamily:'var(--font-mono)'}}>${s.price?.toFixed(2)}</span></div>
                          <div><span style={{color:'var(--text3)'}}>Stop </span><span style={{color:'var(--red)',fontWeight:700,fontFamily:'var(--font-mono)'}}>${swStop}</span></div>
                          <div><span style={{color:'var(--text3)'}}>T1 </span><span style={{color:'var(--cyan)',fontWeight:700,fontFamily:'var(--font-mono)'}}>${t1}</span></div>
                          <div><span style={{color:'var(--text3)'}}>R/R </span><span style={{color:'var(--green)',fontWeight:700,fontFamily:'var(--font-mono)'}}>{rr}:1</span></div>
                        </div>
                      </div>
                    )}
                    {(mode==='position' || mode==='both') && (
                      <div style={{background:'var(--bg2)',borderRadius:4,padding:10,border:'1px solid rgba(0,230,118,0.2)'}}>
                        <div style={{fontSize:9,color:'var(--green)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:6}}>POSITION (3-8w) — pullback to 50MA</div>
                        <div style={{display:'flex',gap:12,flexWrap:'wrap',fontSize:12}}>
                          <div><span style={{color:'var(--text3)'}}>Entry </span><span style={{color:'var(--green)',fontWeight:700,fontFamily:'var(--font-mono)'}}>${posEntry}</span></div>
                          <div><span style={{color:'var(--text3)'}}>Stop </span><span style={{color:'var(--red)',fontWeight:700,fontFamily:'var(--font-mono)'}}>${posStop}</span></div>
                          <div><span style={{color:'var(--text3)'}}>T1 </span><span style={{color:'var(--cyan)',fontWeight:700,fontFamily:'var(--font-mono)'}}>${posT1}</span></div>
                          <div><span style={{color:'var(--text3)'}}>R/R </span><span style={{color:'var(--green)',fontWeight:700,fontFamily:'var(--font-mono)'}}>{posRR}:1</span></div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Detailed swing lab results (when scan is run) */}
      {results.length > 0 && (
        <div>
          <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>DETAILED SCAN RESULTS ({scanned} candidates)</div>
          <div className="sl-grid">
            {results.map(s => {
              const b = s.brief || {};
              return (
                <div className="sl-card anim-in" key={s.ticker} style={{opacity:noLongs?0.6:1}}>
                  <div className="sl-card-header">
                    <div className="sl-card-title">
                      <div>
                        <span className="sl-ticker">{s.ticker}</span>
                        <span style={{fontSize:11,color:'var(--text3)',marginLeft:8}}>${fmt(s.price)}</span>
                      </div>
                    </div>
                    <div className="sl-name">{s.name} · {s.sector}</div>
                    <div className="sl-metrics">
                      <div className="sl-metric">
                        <div className="sl-metric-label">RS</div>
                        <div className="sl-metric-val" style={{color:rsColor(s.rsRank)}}>{s.rsRank}</div>
                      </div>
                      <div className="sl-metric">
                        <div className="sl-metric-label">Mom</div>
                        <div className="sl-metric-val" style={{color:s.swingMomentum>=60?'var(--green)':'var(--amber)'}}>{s.swingMomentum||'—'}</div>
                      </div>
                      <div className="sl-metric">
                        <div className="sl-metric-label">Vol</div>
                        <div className={`sl-metric-val ${s.volumeRatio>1.5?'up':''}`}>{fmt(s.volumeRatio,2)}x</div>
                      </div>
                    </div>
                  </div>
                  <div className="sl-card-body">
                    {s.algoSetup && (
                      <div style={{marginBottom:8}}>
                        <div className="sl-levels">
                          <div className="sl-level"><div className="sl-level-label">Entry</div><div className="sl-level-val up">{s.algoSetup.entryZone||'—'}</div></div>
                          <div className="sl-level"><div className="sl-level-label">Stop</div><div className="sl-level-val dn">{s.algoSetup.stopLevel||'—'}</div></div>
                          <div className="sl-level"><div className="sl-level-label">T1 ({s.algoSetup.riskReward})</div><div className="sl-level-val" style={{color:'var(--cyan)'}}>{s.algoSetup.target1||'—'}</div></div>
                        </div>
                        <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>ATR: ${s.algoSetup.atrUsed} · Stop: {s.algoSetup.stopPct}%</div>
                      </div>
                    )}
                    {(s.earningsDate || b?.earningsDate) && (
                      <div className="sl-earnings" style={{background:(s.daysToEarnings||99)<=7?'rgba(255,61,87,0.15)':'rgba(240,165,0,0.08)',borderColor:(s.daysToEarnings||99)<=7?'rgba(255,61,87,0.5)':'rgba(240,165,0,0.3)'}}>
                        ⚠ Earnings: <strong>{s.earningsDate||b?.earningsDate}</strong>
                        {s.daysToEarnings!=null && ` — ${s.daysToEarnings}d`}
                        {(s.daysToEarnings!=null && s.daysToEarnings<=14) && <strong style={{color:'var(--red)',marginLeft:4}}>DO NOT HOLD</strong>}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {!picks?.length && !results.length && !loading && !picksLoad && (
        <div className="panel" style={{textAlign:'center',padding:30,color:'var(--text3)'}}>
          Run <strong>RS Scanner</strong> first (RS Dashboard tab), then refresh picks here.
        </div>
      )}
    </div>
  );
}

// ─── MARKET PULSE TAB (regime + cycle + macro — the ONE place a pro checks first) ─
function MarketPulseTab() {
  const [regime,   setRegime]   = useState(null);
  const [cycle,    setCycle]    = useState(null);
  const [macro,    setMacro]    = useState([]);
  const [loading,  setLoading]  = useState(false);
  const [spread,   setSpread]   = useState(null);
  const [leaders,  setLeaders]  = useState([]);
  const [laggards, setLaggards] = useState([]);
  const [llLoad,   setLlLoad]   = useState(false);

  useEffect(() => { load(); }, []);

  async function load() {
    setLoading(true);
    try {
      const [rd, md, cd] = await Promise.all([
        api('/api/regime'), api('/api/macro'), api('/api/cycle-auto-detect').catch(()=>null),
      ]);
      setRegime(rd);
      setMacro(md.macro || []);
      setSpread(md.yieldSpread);
      setCycle(cd);
    } catch(_) {}
    setLoading(false);
    setLlLoad(true);
    try {
      const ld = await api('/api/leaders-laggards');
      setLeaders(ld.leaders || []);
      setLaggards(ld.laggards || []);
    } catch(_) {}
    setLlLoad(false);
  }

  const modeColor = m => ({
    UPTREND:'#00e676', UPTREND_PRESSURE:'#f0a500', FTD_CONFIRMED:'#69f0ae',
    RALLY_ATTEMPT:'#80d8ff', CORRECTION:'#ff8c00', BEAR:'#ff3d57', CHOPPY:'#888',
  }[m] || '#888');

  const actionLabel = a => ({
    FULL_DEPLOY: {text:'FULL DEPLOY',color:'#00e676',desc:'Full position sizing'},
    TIGHTEN:     {text:'TIGHTEN',color:'#f0a500',desc:'Tighten stops, reduce new entries'},
    WATCH_ONLY:  {text:'WATCH ONLY',color:'#ff8c00',desc:'No new entries — observe'},
    CASH:        {text:'GO TO CASH',color:'#ff3d57',desc:'Exit longs, preserve capital'},
  }[a] || {text:a||'—',color:'#888',desc:''});

  const g = sym => macro.find(m => m.symbol === sym);
  const spy = g('SPY'), vix = g('^VIX'), qqq = g('QQQ'), iwm = g('IWM');
  const t10 = g('^TNX'), t3m = g('^IRX'), gld = g('GLD'), tlt = g('TLT');

  if (loading) return <div className="panel"><Loader msg="Loading market pulse..."/></div>;

  return (
    <div>
      {/* REGIME BANNER — most prominent element on the page */}
      {regime && (
        <div style={{padding:'20px 24px',background:regime.color+'18',border:`2px solid ${regime.color}55`,borderRadius:8,marginBottom:18}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
            <div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:22,fontWeight:700,color:regime.color,letterSpacing:3}}>{regime.regime}</div>
              {regime.warning && <div style={{fontSize:13,color:'var(--text2)',marginTop:6}}>{regime.warning}</div>}
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--text3)'}}>Position size multiplier</div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:28,color:regime.color,fontWeight:700}}>{regime.sizeMultiplier}x</div>
            </div>
          </div>
          <div style={{display:'flex',gap:8,marginTop:14,flexWrap:'wrap'}}>
            {(regime.riskOnSignals||[]).map(s => <span key={s} style={{fontSize:11,padding:'3px 10px',background:'rgba(0,230,118,0.12)',border:'1px solid rgba(0,230,118,0.3)',borderRadius:3,color:'var(--green)'}}>{s}</span>)}
            {(regime.riskOffSignals||[]).map(s => <span key={s} style={{fontSize:11,padding:'3px 10px',background:'rgba(255,61,87,0.12)',border:'1px solid rgba(255,61,87,0.3)',borderRadius:3,color:'var(--red)'}}>{s}</span>)}
          </div>
        </div>
      )}

      {/* Key market levels */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:10,marginBottom:18}}>
        {[
          {l:'S&P 500',  q:spy,  big:true,  col:'var(--cyan)'},
          {l:'Nasdaq',   q:qqq,  big:false, col:'var(--purple)'},
          {l:'Russell',  q:iwm,  big:false, col:'var(--amber)'},
          {l:'VIX',      q:vix,  big:true,  col: vix?.price<15?'var(--green)':vix?.price<25?'var(--amber)':'var(--red)'},
          {l:'10Y Yield',q:t10,  big:false, col:'var(--cyan)', pct:false, sfx:'%'},
          {l:'Yield Curve', q:null, big:false, col:spread&&spread<0?'var(--red)':'var(--green)',
            customVal: spread!=null ? (spread > 0 ? `+${spread}%` : `${spread}%`) : '—',
            customSub: spread&&spread<0 ? '⚠ INVERTED (10Y < 3M)' : spread&&spread===0 ? 'Flat' : `10Y minus 3M = ${spread}%`,
            title: 'Yield Curve = 10Y Treasury minus 3M Treasury. Normal: +100 to +250bps. 0 to +100bps = late-cycle caution. Negative = INVERTED: historically 80% recession signal within 12-18 months. Markets often rally 12-18 months after first inversion — do not short on inversion alone. Sustained -50bps for 3+ months = high conviction recession signal.'},
          {l:'Gold',     q:gld,  big:false, col:'var(--gold)'},
          {l:'Bonds TLT',q:tlt,  big:false, col:'var(--text2)'},
          {l:'US Dollar', q:g('UUP'), big:false, col:'var(--cyan)',   title:'UUP ETF tracks US Dollar Index'},
          {l:'Crude Oil',  q:g('USO'), big:false, col:'var(--amber)',  title:'USO ETF tracks WTI crude'},
        ].map(({l,q,big,col,customVal,customSub,sfx,title}) => (
          <div key={l} title={title||''} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:5,padding:12}}>
            <div style={{fontSize:8,color:'var(--text3)',letterSpacing:2,textTransform:'uppercase',marginBottom:5}}>{l}</div>
            <div style={{fontFamily:'var(--font-mono)',fontSize:big?18:15,color:col,fontWeight:big?700:400}}>
              {customVal || (q ? (sfx ? `${fmt(q.price,2)}${sfx}` : q.price>1000?`$${fmt(q.price,0)}`:`$${fmt(q.price,2)}`) : '—')}
            </div>
            <div style={{fontSize:10,color:q?.chg1d>=0?'var(--green)':'var(--red)',fontFamily:'var(--font-mono)',marginTop:3}}>
              {customSub || (q ? fmtP(q.chg1d) : '')}
            </div>
          </div>
        ))}
      </div>

      {/* SPY MA status */}
      {regime && spy && (
        <div className="panel" style={{marginBottom:14}}>
          <div className="section-label" style={{marginBottom:10}}>SPY TREND STATUS</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            <div style={{textAlign:'center',padding:'10px',background:'var(--bg)',borderRadius:4,border:`1px solid ${regime.above50?'rgba(0,230,118,0.3)':'rgba(255,61,87,0.3)'}`}}>
              <div style={{fontSize:10,color:'var(--text3)',marginBottom:6}}>vs 50-DAY MA</div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:14,color:regime.above50?'var(--green)':'var(--red)',fontWeight:700}}>{regime.above50?'ABOVE ✓':'BELOW ✗'}</div>
              {regime.spy50 && <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>MA: ${regime.spy50?.toFixed(1)}</div>}
            </div>
            <div style={{textAlign:'center',padding:'10px',background:'var(--bg)',borderRadius:4,border:`1px solid ${regime.above200?'rgba(0,230,118,0.3)':'rgba(255,61,87,0.3)'}`}}>
              <div style={{fontSize:10,color:'var(--text3)',marginBottom:6}}>vs 200-DAY MA</div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:14,color:regime.above200?'var(--green)':'var(--red)',fontWeight:700}}>{regime.above200?'ABOVE ✓':'BELOW ✗'}</div>
              {regime.spy200 && <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>MA: ${regime.spy200?.toFixed(1)}</div>}
            </div>
            <div style={{textAlign:'center',padding:'10px',background:'var(--bg)',borderRadius:4,border:`1px solid ${regime.vixLevel<20?'rgba(0,230,118,0.3)':regime.vixLevel<28?'rgba(240,165,0,0.3)':'rgba(255,61,87,0.3)'}`}}>
              <div style={{fontSize:10,color:'var(--text3)',marginBottom:6}}>VIX REGIME</div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:14,fontWeight:700,color:regime.vixLevel<20?'var(--green)':regime.vixLevel<28?'var(--amber)':'var(--red)'}}>
                {regime.vixLevel<15?'CALM':regime.vixLevel<20?'NORMAL':regime.vixLevel<28?'ELEVATED':'FEAR'}
              </div>
              <div style={{fontSize:13,color:'var(--text)',fontFamily:'var(--font-mono)',marginTop:4}}>{regime.vixLevel?.toFixed(1)}</div>
            </div>
          </div>
        </div>
      )}

      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button className="btn btn-sm" onClick={load}>↻ Refresh</button>
      </div>

      {/* O'Neil Cycle Engine — distribution days, FTD, rally attempt */}
      {cycle && (
        <div className="panel" style={{marginBottom:14}}>
          <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>O'NEIL MARKET CYCLE</div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,marginBottom:14}}>
            <div>
              <div style={{fontSize:22,fontWeight:800,color:modeColor(cycle.mode),fontFamily:'var(--font-mono)',letterSpacing:2}}>
                {cycle.mode?.replace(/_/g,' ')}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>
                Confidence: <strong style={{color:cycle.confidence>=80?'var(--green)':cycle.confidence>=60?'var(--amber)':'var(--red)'}}>{cycle.confidence}%</strong>
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              {(() => { const a = actionLabel(cycle.action); return (
                <div>
                  <div style={{fontSize:16,fontWeight:800,color:a.color,fontFamily:'var(--font-mono)',letterSpacing:2}}>{a.text}</div>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{a.desc}</div>
                </div>
              );})()}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>
            <div style={{background:'var(--bg)',borderRadius:4,padding:12,textAlign:'center',border:'1px solid var(--border)'}}>
              <div style={{fontSize:9,color:'var(--text3)',letterSpacing:1,marginBottom:4}}>DISTRIBUTION DAYS (25-SESSION)</div>
              <div style={{fontSize:28,fontWeight:800,color:cycle.distributionDays?.count>=4?'var(--red)':cycle.distributionDays?.count>=3?'var(--amber)':'var(--green)',fontFamily:'var(--font-mono)'}}>{cycle.distributionDays?.count ?? '—'}</div>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>
                {cycle.distributionDays?.count>=5 ? 'DANGER — correction likely' :
                 cycle.distributionDays?.count>=4 ? 'Elevated — tighten stops' :
                 cycle.distributionDays?.count>=3 ? 'Watch closely' : 'Healthy market'}
              </div>
              {cycle.distributionDays?.dates?.length > 0 && (
                <div style={{marginTop:6,fontSize:9,color:'var(--text3)',textAlign:'left'}}>
                  {cycle.distributionDays.dates.slice(-5).map((d,i) => (
                    <div key={i} style={{padding:'1px 0'}}>{typeof d === 'object' ? `${d.date} ${d.chg}%` : d}</div>
                  ))}
                </div>
              )}
            </div>
            <div style={{background:'var(--bg)',borderRadius:4,padding:12,textAlign:'center',border:'1px solid var(--border)'}}>
              <div style={{fontSize:9,color:'var(--text3)',letterSpacing:1,marginBottom:4}}>FOLLOW-THROUGH DAY</div>
              <div style={{fontSize:16,fontWeight:800,color:cycle.ftd?.confirmed?'var(--green)':cycle.ftd?.fired?'var(--amber)':'var(--text3)',fontFamily:'var(--font-mono)'}}>
                {cycle.ftd?.confirmed ? 'CONFIRMED' : cycle.ftd?.fired ? 'FIRED (unconfirmed)' : 'NOT DETECTED'}
              </div>
              {cycle.ftd?.date && <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Date: {cycle.ftd.date}</div>}
              <div style={{fontSize:9,color:'var(--text3)',marginTop:4}}>
                FTD = 1.25%+ gain on higher vol, days 4-7 of rally
              </div>
            </div>
            <div style={{background:'var(--bg)',borderRadius:4,padding:12,textAlign:'center',border:'1px solid var(--border)'}}>
              <div style={{fontSize:9,color:'var(--text3)',letterSpacing:1,marginBottom:4}}>RALLY ATTEMPT</div>
              <div style={{fontSize:28,fontWeight:800,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>{cycle.rallyAttempt?.day != null ? `Day ${cycle.rallyAttempt.day}` : '—'}</div>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>
                {cycle.rallyAttempt?.startDate ? `From low on ${cycle.rallyAttempt.startDate}` : ''}
              </div>
              <div style={{fontSize:9,color:'var(--text3)',marginTop:2}}>
                {cycle.rallyAttempt?.day >= 4 && cycle.rallyAttempt?.day <= 7 ? 'FTD WINDOW — watch for confirmation' :
                 cycle.rallyAttempt?.day > 7 ? 'Past FTD window' : 'Too early for FTD'}
              </div>
            </div>
            <div style={{background:'var(--bg)',borderRadius:4,padding:12,textAlign:'center',border:'1px solid var(--border)'}}>
              <div style={{fontSize:9,color:'var(--text3)',letterSpacing:1,marginBottom:4}}>BREADTH</div>
              <div style={{fontSize:28,fontWeight:800,color:cycle.breadth?.upDaysPct>=55?'var(--green)':'var(--red)',fontFamily:'var(--font-mono)'}}>{cycle.breadth?.upDaysPct ?? '—'}%</div>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Up days in last 25 sessions</div>
            </div>
          </div>
          {cycle.signals?.length > 0 && (
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:10}}>
              {cycle.signals.map((s,i) => (
                <span key={i} style={{padding:'3px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:3,fontSize:10,color:'var(--text2)'}}>{s}</span>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Leaders / Laggards inline */}
      <div style={{marginTop:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            <div className="panel-title" style={{fontSize:15}}>Leaders <span>/</span> Laggards</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>Top/bottom RS stocks · sorted by IBD RS rank · click for AI analysis</div>
          </div>
        </div>
        {llLoad ? <Loader msg="Loading RS ranks..."/> : (
          <div className="grid-2">
            <div>
              <div className="section-label" style={{color:'var(--green)',marginBottom:8}}>
                ⬆ LEADERS — Highest IBD RS, above 50MA
              </div>
              {leaders.length===0 && <div className="muted" style={{fontSize:12,padding:'10px 0'}}>Run RS Scanner first to populate</div>}
              <table className="data-table">
                <thead><tr><th>RS</th><th>Trend</th><th>Ticker</th><th>1D</th><th>1W</th><th>1M</th><th>vs 50MA</th></tr></thead>
                <tbody>
                  {leaders.slice(0,12).map(s => (
                    <tr key={s.ticker}>
                      <td>
                        <RSBar rs={s.rsRank}/>
                        {(s.rsRank>=70 && s.rsTrend?.direction==='rising' && s.swingMomentum>=55) && (

// ─── WATCHLIST TAB ────────────────────────────────────────────────────────────
function WatchlistTab({ rsData }) {
  const [list,      setList]    = useState([]);
  const [ticker,    setTicker]  = useState('');
  const [note,      setNote]    = useState('');
  const [stage,     setStage]   = useState('watching');
  const [loading,   setLoading] = useState(false);
  const [editNote,  setEditNote] = useState(null);   // ticker being edited
  const [editVal,   setEditVal]  = useState('');     // current edit value
  const { sortData: sortWL, SH: WLSH } = useSortTable('addedAt', -1);

  useEffect(() => { loadWL(); }, []);

  async function loadWL() {
    try { const d = await api('/api/watchlist'); setList(d.watchlist || []); } catch(_) {}
  }

  async function add() {
    if (!ticker.trim()) return;
    setLoading(true);
    try {
      await api('/api/watchlist', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: ticker.toUpperCase(), note, stage }) });
      setTicker(''); setNote('');
      await loadWL();
    } catch(_) {}
    setLoading(false);
  }

  async function remove(t) {
    await api(`/api/watchlist/${t}`, { method:'DELETE' });
    await loadWL();
  }

  async function saveNote(w) {
    try {
      await api('/api/watchlist', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: w.ticker, note: editVal, stage: w.stage }) });
      setEditNote(null);
      await loadWL();
    } catch(_) {}
  }

  async function updateStage(w, newStage) {
    try {
      await api('/api/watchlist', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: w.ticker, note: w.note, stage: newStage }) });
      await loadWL();
    } catch(_) {}
  }

  const stageColor = s => s==='active'?'var(--green)':s==='candidate'?'var(--amber)':'var(--text3)';
  const stageLabel = s => s==='active'?'ACTIVE TRADE':s==='candidate'?'CANDIDATE':'WATCHING';

  return (
    <div>
      <div className="panel">
        <div className="panel-title" style={{marginBottom:4}}>⭐ <span>Watchlist</span></div>
        <div className="panel-sub">Track stocks from idea → candidate → active trade. Persisted to disk.</div>

        <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
          <input value={ticker} onChange={e=>setTicker(e.target.value.toUpperCase())} placeholder="TICKER"
            style={{width:90,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'8px 10px',fontFamily:'var(--font-mono)',fontSize:13,outline:'none',letterSpacing:2}}/>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Note (optional)"
            style={{flex:1,minWidth:120,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'8px 10px',fontSize:12,outline:'none'}}/>
          <select value={stage} onChange={e=>setStage(e.target.value)}
            style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'8px 10px',fontSize:12,outline:'none'}}>
            <option value="watching">Watching</option>
            <option value="candidate">Candidate</option>
            <option value="active">Active Trade</option>
          </select>
          <button className="btn btn-primary btn-sm" onClick={add} disabled={loading||!ticker}>+ Add</button>
        </div>

        {list.length === 0 && (
          <div className="empty">No stocks in watchlist yet. Add tickers above.</div>
        )}

        {list.length > 0 && (
          <table className="data-table">
            <thead>
              <tr>
                <th title="Trade lifecycle stage: Watching (idea), Candidate (setup forming), Active Trade (position open)">Stage</th>
                <th title="Ticker symbol">Ticker</th>
                <WLSH k="price"  label="Price"   title="Current market price"/>
                <WLSH k="chg1d"  label="1D"      title="Today's % price change"/>
                <WLSH k="chg1w"  label="1W"      title="5-day price return"/>
                <WLSH k="chg1m"  label="1M"      title="21-day price return"/>
                <WLSH k="rsRank" label="IBD RS"  title="IBD RS percentile rank 1-99. Updates each time you run the RS Scanner."/>
                <th title="RS direction: rising/flat/falling based on 7-day rank change. Arrow shows the arc.">RS Trend</th>
                <WLSH k="swingMomentum" label="SwingMom" title="Absolute price velocity (5/10/21-day ROC). ≥60=moving fast now. NOT relative to peers."/>
                <th title="Your personal notes on this position — thesis, entry level, what you're watching for">Note</th>
                <WLSH k="addedAt" label="Added"  title="Date you added this to the watchlist"/>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {sortWL(list.map(w => {
                const s2 = rsData?.find(r => r.ticker === w.ticker);
                return {...w, price:s2?.price, chg1d:s2?.chg1d, chg1w:s2?.chg1w, chg1m:s2?.chg1m,
                        rsRank:s2?.rsRank, swingMomentum:s2?.swingMomentum};
              })).map(w => {
                const s = w; // merged via sortWL map above
                return (
                  <tr key={w.ticker}>
                    <td>
                      <select value={w.stage} onChange={e=>updateStage(w,e.target.value)}
                        style={{fontSize:10,padding:'2px 6px',borderRadius:3,
                          background:stageColor(w.stage)+'22',color:stageColor(w.stage),
                          border:'1px solid '+stageColor(w.stage)+'44',
                          fontFamily:'var(--font-mono)',cursor:'pointer',outline:'none'}}>
                        <option value="watching">WATCHING</option>
                        <option value="candidate">CANDIDATE</option>
                        <option value="active">ACTIVE TRADE</option>
                      </select>
                    </td>
                    <td><span className="td-ticker">{w.ticker}</span></td>
                    <td>{s ? `$${fmt(s.price)}` : '—'}</td>
                    <td className={fmtC(s?.chg1d)}>{fmtP(s?.chg1d)}</td>
                    <td className={fmtC(s?.chg1w)}>{fmtP(s?.chg1w)}</td>
                    <td className={fmtC(s?.chg1m)}>{fmtP(s?.chg1m)}</td>
                    <td>{s ? <RSBar rs={s.rsRank}/> : '—'}</td>
                    <td>{s ? <RSTrendBadge trend={s.rsTrend} rs={s.rsRank}/> : '—'}</td>
                    <td>
                      {s?.swingMomentum != null ? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:s.swingMomentum>=60?'var(--green)':s.swingMomentum>=45?'var(--amber)':'var(--red)'}}>{s.swingMomentum}</span> : '—'}
                    </td>
                    <td style={{maxWidth:180}}>
                      {editNote === w.ticker ? (
                        <div style={{display:'flex',gap:4}}>
                          <textarea value={editVal} onChange={e=>setEditVal(e.target.value)}
                            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveNote(w);}if(e.key==='Escape')setEditNote(null);}}
                            autoFocus rows={2}
                            placeholder="Enter note (Enter to save, Shift+Enter for newline)"
                            style={{flex:1,minWidth:100,background:'var(--bg)',border:'1px solid var(--amber)',borderRadius:3,color:'var(--text)',padding:'4px 6px',fontSize:11,outline:'none',resize:'vertical',fontFamily:'var(--font-sans)',lineHeight:1.4}}/>
                          <button onClick={()=>saveNote(w)} style={{padding:'2px 6px',background:'var(--amber)',border:'none',borderRadius:2,color:'#000',fontSize:10,cursor:'pointer',fontWeight:700}}>✓</button>
                          <button onClick={()=>setEditNote(null)} style={{padding:'2px 6px',background:'transparent',border:'1px solid var(--border)',borderRadius:2,color:'var(--text3)',fontSize:10,cursor:'pointer'}}>✕</button>
                        </div>
                      ) : (
                        <span onClick={()=>{setEditNote(w.ticker);setEditVal(w.note||'');}}
                          title="Click to edit note"
                          style={{fontSize:11,color:w.note?'var(--text2)':'var(--text3)',cursor:'text',display:'block',
                                  minWidth:60,whiteSpace:'normal',wordBreak:'break-word',lineHeight:1.4}}>
                          {w.note || <em style={{opacity:0.4}}>+ add note</em>}
                        </span>
                      )}
                    </td>
                    <td className="muted" style={{fontSize:10}}>{w.addedAt?.split('T')[0]}</td>
                    <td><button className="btn btn-sm" onClick={()=>remove(w.ticker)} style={{padding:'3px 8px',fontSize:10,color:'var(--red)',borderColor:'rgba(255,61,87,0.3)'}}>✕</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}

        <div style={{marginTop:16,padding:'12px 16px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:5,fontSize:12,color:'var(--text3)',lineHeight:1.9}}>
          <strong style={{color:'var(--amber)'}}>Workflow:</strong><br/>
          <strong style={{color:'var(--text)'}}>Watching</strong> → Found via Thematic Hunt or tip. Monitoring RS trend.<br/>
          <strong style={{color:'var(--text)'}}>Candidate</strong> → RS ≥ 75 and rising. Waiting for swing momentum to confirm.<br/>
          <strong style={{color:'var(--text)'}}>Active Trade</strong> → Position open. Track until exit.
        </div>
      </div>
    </div>
  );
}


// ─── RS TREND SECTION (embedded in RS Dashboard) ─────────────────────────────
function RSTrendSection({ rsData }) {
  const [history,  setHistory]  = useState(null);
  const [filter,   setFilter]   = useState('rising');
  const [loading,  setLoading]  = useState(false);
  const { sortData: sortTrend, SH: TrendSH } = useSortTable('current', -1);

  useEffect(() => { loadH(); }, []);

  async function loadH() {
    setLoading(true);
    try { const d = await api('/api/rs-history'); setHistory(d); } catch(_) {}
    setLoading(false);
  }

  const dirColor = d => d==='rising'?'var(--green)':d==='falling'?'var(--red)':'var(--text3)';
  const dirIcon  = d => d==='rising'?'▲':d==='falling'?'▼':'→';

  const [page, setPage] = useState(0);
  const PAGE_SIZE = 60;
  const allTrends = (history?.trends||[]).filter(t => filter==='all' || t.direction===filter);
  const trends    = allTrends; // full list for sorting, sliced in render

  return (
    <div style={{marginTop:20}}>
      <hr style={{border:'none',borderTop:'1px solid var(--border)',margin:'20px 0'}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
        <div>
          <div className="panel-title" style={{fontSize:15}}>RS <span>Trend History</span></div>
          <div style={{fontSize:11,color:'var(--text3)',lineHeight:1.8}}>
            <strong style={{color:'var(--text)'}}>What these columns mean:</strong><br/>
            RS Today = current percentile rank (85 = beats 85% of universe).
            +/- 1W = how many RS points gained or lost vs 7 days ago.
            +/- 4W = gained/lost vs 28 days ago (1 month of accumulation signal).<br/>
            +/- 3M = RS change over 90 days — positive means sustained outperformance for a full quarter.<br/>
            <strong style={{color:'var(--amber)'}}>Best setup: RS 65-79 today AND +/- 4W is +5 or more = emerging leader, entry zone.</strong>
            &nbsp;{history?.totalDays||0} days of snapshots saved.
          </div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['rising','flat','falling','all'].map(f => (
            <button key={f} className={`mode-btn ${filter===f?'active':''}`}
              style={{fontSize:10,padding:'4px 10px',
                      borderColor:filter===f?dirColor(f):undefined,
                      color:filter===f?dirColor(f):undefined}}
              onClick={()=>setFilter(f)}>
              {dirIcon(f)} {f} ({(history?.trends||[]).filter(t=>f==='all'||t.direction===f).length})
            </button>
          ))}
        </div>
      </div>

      {history?.totalDays === 0 && (
        <div className="info-box">ℹ No history yet — pre-generated on first RS scan. Run ⟳ Scan above.</div>
      )}

      {loading ? <Loader msg="Loading RS history..."/> : trends.length > 0 && (
        <table className="data-table">
          <thead>
            <tr>
              <th title="Ticker symbol">Ticker</th>
              <TrendSH k="current"   label="RS Today" title="Current IBD RS rank (1-99, percentile vs universe). Click to sort."/>
              <TrendSH k="direction" label="Trend"    title="Direction based on 7-day RS change. Click to group rising/falling."/>
              <TrendSH k="vs1w"  label="+/- 1W"  title="RS rank change vs 7 days ago. +8 = gained 8 percentile points this week."/>
              <TrendSH k="vs2w"  label="+/- 2W"  title="RS rank change vs 14 days ago"/>
              <TrendSH k="vs4w"  label="+/- 4W"  title="RS rank change vs 28 days ago. Key: rising 4W = sustained accumulation."/>
              <TrendSH k="vs3m"  label="+/- 3M"  title="RS rank change vs 90 days ago. Full quarterly arc — most reliable signal."/>
              <th title="Actionable: ✓ SWING (RS≥70 rising), 👁 WATCH (RS≥55 rising), ✗ AVOID (RS falling below 50), ✗ FADE (falling), → HOLD (stable leader)">Signal</th>
            </tr>
          </thead>
          <tbody>
            {sortTrend(trends).map(t => {
              const interp =
                t.direction==='rising' && t.current>=80 ? '✓ SWING/POSITION — institutions accumulating' :
                t.direction==='rising' && t.current>=70 ? '✓ SWING candidate — RS entering actionable zone' :
                t.direction==='rising' && t.current>=55 ? '👁 WATCH — add to watchlist, RS approaching 70' :
                t.direction==='rising'                  ? '— Low base rising (RS below 55) — not actionable yet' :
                t.direction==='falling' && t.current<50 ? '✗ AVOID — distribution, RS weakening below 50' :
                t.direction==='falling'                 ? '✗ FADE — once-leader losing strength, avoid' :
                t.current>=75                           ? '→ HOLD — maintaining leadership, ok for positions' :
                                                          '— Neutral — monitor';
              return (
                <tr key={t.ticker}>
                  <td><span className="td-ticker">{t.ticker}</span></td>
                  <td><RSBar rs={t.current}/></td>
                  <td style={{color:dirColor(t.direction),fontFamily:'var(--font-mono)',fontWeight:700}}>
                    {dirIcon(t.direction)} {t.direction}
                  </td>
                  <td className={t.vs1w>0?'up':t.vs1w<0?'dn':''}>{t.vs1w!=null?(t.vs1w>0?'+':'')+t.vs1w:'—'}</td>
                  <td className={t.vs1m>0?'up':t.vs1m<0?'dn':''}>{t.vs1m!=null?(t.vs1m>0?'+':'')+t.vs1m:'—'}</td>
                  <td className={t.vs2m>0?'up':t.vs2m<0?'dn':''}>{t.vs2m!=null?(t.vs2m>0?'+':'')+t.vs2m:'—'}</td>
                  <td className={t.vs3m>0?'up':t.vs3m<0?'dn':''}>{t.vs3m!=null?(t.vs3m>0?'+':'')+t.vs3m:'—'}</td>
                  <td style={{fontSize:11,color:'var(--text3)'}}>{interp}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
    </div>
  );
}

// ─── SECTOR / INDUSTRY RS TREND HISTORY ────────────────────────────────────
function SectorIndustryRSTrend({ type, title, api: apiPath }) {
  const [history,  setHistory]  = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [open,     setOpen]     = useState(false);
  const { sortData: sortSI, SH: SISH } = useSortTable('current', -1);

  async function load() {
    if (history) return;
    setLoading(true);
    try { const d = await api(apiPath); setHistory(d); } catch(_) {}
    setLoading(false);
  }

  function handleOpen() {
    setOpen(o => !o);
    if (!open && !history) load();
  }

  const dirColor = d => d==='rising'?'var(--green)':d==='falling'?'var(--red)':'var(--text3)';
  const dirIcon  = d => d==='rising'?'▲':d==='falling'?'▼':'→';

  return (
    <div style={{marginTop:20}}>
      <hr style={{border:'none',borderTop:'1px solid var(--border)',margin:'20px 0'}}/>
      <button className="btn btn-sm" onClick={handleOpen} style={{marginBottom:10}}>
        {open?'▼':'▶'} {title} ({trends.length > 0 ? `${trends.length} items, ${history?.totalDays||0} snapshots` : 'click to load'})
      </button>
      {open && (
        <div>
          {loading && <Loader msg={`Loading ${type} RS history...`}/>}
          {history?.totalDays === 0 && (
            <div className="info-box">ℹ No {type} RS history yet. Load the {type} tab to start building history.</div>
          )}
          {trends.length > 0 && (
            <table className="data-table">
              <thead>
                <tr>
                  <th title="Sector or industry ETF ticker symbol">Name</th>
                  <SISH k="current"   label="IBD RS" title="Current RS percentile rank (1-99) within its universe"/>
                  <SISH k="direction" label="Trend"  title="Direction: rising >+3 pts in 7 days, falling <-3 pts, flat otherwise"/>
                  <SISH k="vs1w"      label="vs 1W"  title="RS rank change vs 7 days ago"/>
                  <SISH k="vs1m"      label="vs 1M"  title="RS rank change vs 30 days ago"/>
                  <SISH k="vs2m"      label="vs 2M"  title="RS rank change vs 60 days ago"/>
                  <SISH k="vs3m"      label="vs 3M"  title="RS rank change vs 90 days ago"/>
                  <th title="Signal derived from RS level + direction">Signal</th>
                </tr>
              </thead>
              <tbody>
                {sortSI(trends).map(t => {
                  const signal =
                    t.direction==='rising'  && t.current>=80 ? 'Leading — rotate in' :
                    t.direction==='rising'  && t.current>=60 ? 'Improving — watch' :
                    t.direction==='falling' && t.current<50  ? 'Lagging — avoid' :
                    t.direction==='falling'                  ? 'Fading — reduce' :
                                                               'Neutral — hold';
                  return (
                    <tr key={t.ticker}>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--cyan)'}}>{t.ticker}</td>
                      <td><RSBar rs={t.current}/></td>
                      <td style={{color:dirColor(t.direction),fontFamily:'var(--font-mono)',fontWeight:700}}>
                        {dirIcon(t.direction)} {t.direction}
                      </td>
                      <td className={t.vs1w>0?'up':t.vs1w<0?'dn':''}>{t.vs1w!=null?(t.vs1w>0?'+':'')+t.vs1w:'—'}</td>
                      <td className={t.vs1m>0?'up':t.vs1m<0?'dn':''}>{t.vs1m!=null?(t.vs1m>0?'+':'')+t.vs1m:'—'}</td>
                      <td className={t.vs2m>0?'up':t.vs2m<0?'dn':''}>{t.vs2m!=null?(t.vs2m>0?'+':'')+t.vs2m:'—'}</td>
                      <td className={t.vs3m>0?'up':t.vs3m<0?'dn':''}>{t.vs3m!=null?(t.vs3m>0?'+':'')+t.vs3m:'—'}</td>
                      <td style={{fontSize:12,color:'var(--text2)'}}>{signal}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      )}
    </div>
  );
}

function PortfolioTab() {

  const [error, setError]     = useState('');

  const [sizeEntry, setSizeEntry] = useState('');
  const [sizeStop, setSizeStop]   = useState('');
  const [editConfig, setEditConfig] = useState(false);
  const [cfgForm, setCfgForm] = useState({});
