                  <td className="td-name">{e.name}</td>
                  <td className="muted" style={{fontSize:11}}>{e.sector}</td>
                  <td style={{whiteSpace:'nowrap',fontSize:10}}>
                    {e.rsLineNewHigh && <span title="RS Line at 52wk high vs SPY — industry ETF outperforming market" style={{color:'var(--gold)',fontWeight:700,marginRight:4}}>⭐RS↑H</span>}
                    {e.vcpForming && <span title={`VCP ${e.vcpCount}× contractions on ETF. Price coiling = tightening before breakout. Best when combined with S2.`} style={{color:'var(--purple)',fontWeight:700,marginRight:4}}>VCP{e.vcpCount}×</span>}
                    {e.stage===2 && <span title="Stage 2 Uptrend (Weinstein): ETF above rising 150MA. The context for longs. VCP within S2 = ideal." style={{color:'var(--green)',fontWeight:700,marginRight:4}}>S2</span>}
                    {e.stage===4 && <span title="Stage 4 Downtrend: ETF below declining 150MA. Avoid all longs in this industry." style={{color:'var(--red)',fontWeight:700}}>S4</span>}
                    {!e.rsLineNewHigh && !e.vcpForming && e.stage!==2 && e.stage!==4 && <span className="muted">—</span>}
                  </td>
                  <td>${fmt(e.price)}</td>
                  <td className={fmtC(e.chg1d)}>{fmtP(e.chg1d)}</td>
                  <td className={fmtC(e.chg1w)}>{fmtP(e.chg1w)}</td>
                  <td className={fmtC(e.chg1m)}>{fmtP(e.chg1m)}</td>
                  <td className={fmtC(e.chg3m)}>{fmtP(e.chg3m)}</td>
                  <td className={e.vsMA50>0?'up':'dn'}>{fmt(e.vsMA50,1)}%</td>
                  <td className={e.vsMA200>0?'up':'dn'}>{fmt(e.vsMA200,1)}%</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}

        {selInd2 && (
          <IndustryStockDrill etf={selInd2} etfName={data.find(d=>d.symbol===selInd2)?.name} rsData={rsData} onClose={()=>setSelInd2(null)}/>
        )}
        <SectorIndustryRSTrend type="industries" title="Industry RS Trend History" api="/api/rs-history/industries"/>
      </div>
    </div>
  );
}

// ─── RS SCANNER TAB ───────────────────────────────────────────────────────────
function RSTab({ rsData, rsLoaded, setRsData, setRsLoaded, minRS, setMinRS, selectedSectors, setSelectedSectors, sigFilters, setSigFilters, quickFilter, setQuickFilter }) {
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState('');
  const [rsStaging, setRsStaging] = useState(null);
  const [rsStageMode, setRsStageMode] = useState('swing');
  // minRS/setMinRS now from App props — persists across tab switches
  const [expandedTicker, setExpandedTicker] = useState(null);

  async function stageFromRS(ticker, mode) {
    setRsStaging(ticker);
    try {
      const r = await api('/api/staging/from-setup', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker, mode: mode || rsStageMode }),
      });
      alert(`Staged ${r.staged?.symbol} (${mode || rsStageMode}): ${r.sizing?.shares} shares, $${r.sizing?.dollarRisk?.toFixed(0)} risk. Go to Trading tab to submit.`);
    } catch(e) { alert(`Stage failed: ${e.message}`); }
    setRsStaging(null);
  }
  const levelsRef = useRef(null);
  const rowRefs = useRef({});
  useEffect(() => {
    if (expandedTicker && levelsRef.current) {
      levelsRef.current.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }, [expandedTicker]);

  function closeLevels() {
    const ticker = expandedTicker;
    setExpandedTicker(null);
    setTimeout(() => {
      rowRefs.current[ticker]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  }
  const { sortData: sortRS, SH } = useSortTable('rsRank');
  // Signal filter chips — from App props, persists across tab switches
  const toggleSig = key => setSigFilters(prev => {
    const next = new Set(prev);
    next.has(key) ? next.delete(key) : next.add(key);
    return next;
  });

  async function load() {
    setLoading(true); setError('');
    try {
      const d = await api('/api/rs-scan');
      setRsData((d.stocks || []).filter(s => s.ticker !== 'SPY'));
      setRsLoaded(true);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  useEffect(() => { if (!rsLoaded) load(); }, []);

  // Quick filters — preset combinations for fastest workflow
  // When sector focus is active, bypass minRS on "all" filter so you see every stock in that sector
  // quickFilter from App props, persists across tab switches
  const hasSectorFocus = selectedSectors && selectedSectors.size > 0;
  const quickFilters = {
    all:      s => hasSectorFocus ? true : s.rsRank >= minRS,
    triple:   s => s.rsRank >= 70 && (s.rsTrend?.vs4w||0) > 0 && s.swingMomentum >= 60,
    s2triple: s => s.rsRank >= 70 && (s.rsTrend?.vs4w||0) > 0 && s.swingMomentum >= 60 && s.stage === 2,
    s2vcp:    s => s.rsRank >= 70 && s.stage === 2 && s.vcpForming,
    rsline:   s => s.rsLineNewHigh && s.rsRank >= 65,
  };

  // Signal chip filter — if any chips active, stock must pass ALL of them
  const sigChecks = {
    '★':   s => s.rsRank>=70 && (s.rsTrend?.vs4w||0)>0 && s.swingMomentum>=60,
    '⭐':   s => s.rsLineNewHigh,
    '↗':   s => s.rsTrend?.vs4w>5 && s.rsRank>=55 && s.rsRank<70,
    'VCP': s => s.vcpForming,
    'S2':  s => s.stage===2,
    'S4':  s => s.stage===4,
    'ACC': s => s.volumeTrend==='accumulating',
    '🔥':  s => s.distFromHigh!=null && s.distFromHigh<=0.005,
    '⚡':  s => s.volumeSurge,
  };

  const filtered = sortRS(rsData.filter(s => {
    if (!(quickFilters[quickFilter] || quickFilters.all)(s)) return false;
    // Sector filter
    if (selectedSectors && selectedSectors.size > 0 && !selectedSectors.has(s.sector)) return false;
    // Signal chips (AND logic — stock must have ALL active chips)
    for (const key of sigFilters) {
      if (sigChecks[key] && !sigChecks[key](s)) return false;
    }
    return true;
  }));

  return (
    <div>
      <div className="panel">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:8}}>
          <div>
            <div className="panel-title">RS <span>Scanner</span></div>
            <div className="panel-sub">IBD RS (12M relative rank) · Accel (28d rank change) · Mom (absolute velocity) · <strong style={{color:'var(--amber)'}}>Bottom-up by default</strong> — the best stocks surface regardless of sector. Use 🎯 Sector Focus (from Sectors tab) to optionally narrow by sector after top-down confirmation.</div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <label style={{fontSize:11,color:'var(--text3)'}}>Min RS</label>
            <input type="number" value={minRS} onChange={e=>setMinRS(+e.target.value)} min={1} max={99}
              style={{width:60,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'5px 8px',fontSize:12,fontFamily:'var(--font-mono)'}}/>
            <button className="btn btn-primary btn-sm" onClick={load} disabled={loading}>
              {loading ? 'Scanning...' : '⟳ Scan'}
            </button>
          </div>
        </div>
        {/* Quick filter bar */}
        <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:10,color:'var(--text3)',letterSpacing:1,textTransform:'uppercase',marginRight:4}}>Filter</span>
          {[
            {id:'all',      label:'All',
              title:'Show all stocks at or above the Min RS threshold'},
            {id:'triple',   label:'★ Triple (RS>70+Accel+Mom>60)',
              title:'STEP 1 — Your daily candidate list: institutional quality (RS>70) + gaining ground vs peers (Accel>0) + moving NOW (Mom>60). ~15-25 stocks. Start here every morning.'},
            {id:'s2triple', label:'★★ Triple + S2',
              title:'STEP 2 — Add Stage 2 context: stock is above a RISING 150MA (confirmed uptrend). Eliminates stocks bouncing in Stage 3/4 distribution. Highest quality setups. ~8-15 stocks.'},
            {id:'s2vcp',    label:'★★★ S2 + VCP',
              title:'STEP 3 — Ideal entry timing: Stage 2 uptrend context (S2) + Volatility Contraction Pattern (price coiling). S2 = right context. VCP = right timing. This is the complete Minervini setup. Tightest stops, best R/R.'},
            {id:'rsline',   label:'⭐ RS Line highs',
              title:'RS Line (price÷SPY) at 52-week high — stock outperforming the market itself, not just peers. IBD\'s earliest institutional accumulation signal. Often leads the sector.'},
          ].map(f => (
            <button key={f.id} title={f.title}
              onClick={()=>setQuickFilter(f.id)}
              className="btn btn-sm"
              style={{fontSize:10,padding:'3px 10px',
                background:quickFilter===f.id?'var(--amber)':'transparent',
                color:quickFilter===f.id?'#000':'var(--text3)',
                border:`1px solid ${quickFilter===f.id?'var(--amber)':'var(--border)'}`,
                fontWeight:quickFilter===f.id?700:400}}>
              {f.label}
            </button>
          ))}
          <span style={{fontSize:11,color:'var(--text3)',marginLeft:4}}>{filtered.length} shown</span>
        </div>

        {/* Signal chip filters */}
        <div style={{display:'flex',gap:5,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:10,color:'var(--text3)',letterSpacing:1,textTransform:'uppercase',marginRight:2}}>Signals</span>
          {[
            {key:'★',   label:'★ Triple',      title:'RS≥70 + Accel>0 + Mom≥60 (same as Triple filter, combinable with others)',col:'var(--green)'},
            {key:'⭐',   label:'⭐ RS Line High', title:'RS Line at 52wk high — stock outperforming SPY itself',col:'var(--gold)'},
            {key:'↗',   label:'↗ Emerging',     title:'RS 55-70 rising fast (Accel>+5) — catch leaders early',col:'var(--cyan)'},
            {key:'VCP', label:'VCP',             title:'Volatility Contraction Pattern — coiling setup',col:'var(--purple)'},
            {key:'S2',  label:'S2 Uptrend',      title:'Stage 2: price above rising 150MA',col:'var(--green)'},
            {key:'ACC', label:'ACC',              title:'Accumulation: above 50MA + vol >1.2x (institutional buying)',col:'var(--green)'},
            {key:'🔥',  label:'🔥 At High',      title:'Within 0.5% of 52wk high right now',col:'var(--amber)'},
            {key:'⚡',  label:'⚡ Vol Surge',     title:'Volume surge ≥2× average near highs',col:'var(--amber)'},
          ].map(({key,label,title,col})=>(
            <button key={key} title={title}
              onClick={()=>toggleSig(key)}
              style={{padding:'2px 9px',fontSize:10,border:`1px solid ${sigFilters.has(key)?col:'var(--border)'}`,borderRadius:3,background:sigFilters.has(key)?col+'22':'transparent',color:sigFilters.has(key)?col:'var(--text3)',cursor:'pointer',fontWeight:sigFilters.has(key)?700:400,transition:'all 0.12s'}}>
              {label}
            </button>
          ))}
          {sigFilters.size>0 && (
            <button onClick={()=>setSigFilters(new Set())} style={{padding:'2px 8px',fontSize:10,border:'1px solid var(--border)',borderRadius:3,background:'transparent',color:'var(--text3)',cursor:'pointer'}}>
              ✕ Clear signals
            </button>
          )}
        </div>

        {/* Sector focus filter */}
        {selectedSectors && selectedSectors.size > 0 && (
          <div style={{marginBottom:10,padding:'6px 12px',background:'rgba(240,165,0,0.07)',border:'1px solid rgba(240,165,0,0.25)',borderRadius:4,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',fontSize:11}}>
            <span style={{color:'var(--amber)',fontWeight:700}}>🎯 Sector focus:</span>
            {[...selectedSectors].map(sec=>(
              <span key={sec} style={{padding:'2px 8px',background:'rgba(240,165,0,0.12)',border:'1px solid rgba(240,165,0,0.3)',borderRadius:3,color:'var(--amber)',fontSize:10}}>
                {sec}
              </span>
            ))}
            <span style={{color:'var(--text3)'}}>· Showing ALL stocks in these sectors (Min RS bypassed).</span>
            <button onClick={()=>setSelectedSectors(new Set())} style={{marginLeft:'auto',padding:'2px 8px',fontSize:10,border:'1px solid var(--border)',borderRadius:3,background:'transparent',color:'var(--text3)',cursor:'pointer'}}>
              ✕ Show all sectors
            </button>
          </div>
        )}

        {error && <ErrorBox msg={error}/>}
        {loading ? <Loader msg={`Scanning ${rsData.length||150}+ stocks...`}/> : (
          <>
            <div style={{overflowX:'auto'}}>
              <table className="data-table" style={{tableLayout:'fixed',width:'100%',minWidth:920}}>
                <colgroup>
                  <col style={{width:'100px'}}/>{/* IBD RS */}
                  <col style={{width:'48px'}}/>{/* Mom */}
                  <col style={{width:'50px'}}/>{/* Accel */}
                  <col style={{width:'92px'}}/>{/* Signals */}
                  <col style={{width:'58px'}}/>{/* Ticker */}
                  <col style={{width:'88px'}}/>{/* Name */}
                  <col style={{width:'58px'}}/>{/* Price */}
                  <col style={{width:'52px'}}/>{/* 1D */}
                  <col style={{width:'52px'}}/>{/* 1W */}
                  <col style={{width:'64px'}}/>{/* vs 50MA */}
                  <col style={{width:'58px'}}/>{/* 52wkH% */}
                  <col style={{width:'72px'}}/>{/* Vol */}
                  <col style={{width:'48px'}}/>{/* Earn */}
                  <col style={{width:'56px'}}/>{/* Levels */}
                </colgroup>
                <thead>
                  <tr>
                    <SH k="rsRank"        label="IBD RS"    title="Percentile rank 1-99 vs universe (12M weighted). ≥ 70 = top 30% institutional quality."/>
                    <SH k="swingMomentum" label="Mom"       title="Raw price velocity NOW — NOT vs peers. Base 50+(5d%×3)+(10d%×1.5)+(21d%×0.5)+5 if above MA10. Score 94≈13% in 5d. Score 50=flat. ≥60=fast, ≥45=ok, <40=stalling."/>
                    <SH k="rsTrend.vs4w"  label="Accel"     title="RS Accel: percentile rank change vs 28 days ago. +12=passed 12% of peers. Sort ↓ to find fastest institutional accumulation."/>
                    <th title="Signals: ★=Triple (RS>70+Accel+Mom>60). ⭐=RS Line 52wk high. ↗=Emerging RS55-70. VCP=coiling setup. S2=Stage2 uptrend. SEPA/8=Minervini score.">Signals</th>
                    <th title="Ticker symbol. Hover for company name.">Ticker</th>
                    <th title="Company name (truncated)">Name</th>
                    <SH k="price"         label="Price"     title="Current market price"/>
                    <SH k="chg1d"         label="1D"        title="Today's price change %"/>
                    <SH k="chg1w"         label="1W"        title="5-day price return"/>
                    <SH k="vsMA50"        label="vs 50MA"   title="% above/below 50-day MA. 0-5% above = buyable pullback zone. >5% = extended. Negative = caution."/>
                    <SH k="distFromHigh"  label="52wkH%"    title="% below 52-week high. <5% = near breakout. Sort ascending to find stocks nearest highs."/>
                    <SH k="volumeRatio"   label="Vol"       title="Today's volume ÷ 3M avg. ⚡=surge ≥2x near highs. ACC=above 50MA+vol>1.2x. DIST=below 50MA+vol>1.2x."/>
                    <th title="Days until next earnings. ⚠ red=7d, amber=14d. Never hold swings into earnings.">Earn</th>
                    <th style={{width:55}}></th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(s => (
                    <React.Fragment key={s.ticker}>
                    <tr ref={el => rowRefs.current[s.ticker] = el}
                      style={{
                        background:expandedTicker===s.ticker?'rgba(240,165,0,0.12)':'',
                        borderLeft:expandedTicker===s.ticker?'3px solid var(--amber)':'3px solid transparent',
                        transition:'background 0.15s',
                      }}>
                      <td><RSBar rs={s.rsRank}/></td>
                      <td>
                        {s.swingMomentum != null
                          ? <span style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:700,color:s.swingMomentum>=60?'var(--green)':s.swingMomentum>=45?'var(--amber)':'var(--red)'}}>{s.swingMomentum}</span>
                          : <span className="muted">—</span>}
                      </td>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:12}}>
                        {s.rsTrend?.vs4w != null
                          ? (s.rsRank >= 98 && Math.abs(s.rsTrend.vs4w) <= 2
                              ? <span style={{color:'var(--gold)',fontSize:9,fontWeight:700}} title="Sustained top RS">★PEAK</span>
                              : s.rsRank <= 3 && Math.abs(s.rsTrend.vs4w) <= 2
                              ? <span style={{color:'var(--red)',fontSize:9}} title="Sustained bottom">FLOOR</span>
                              : <span className={s.rsTrend.vs4w>3?'up':s.rsTrend.vs4w<-3?'dn':''}>{s.rsTrend.vs4w>0?'+':''}{s.rsTrend.vs4w}</span>)
                          : <span className="muted">—</span>}
                      </td>
                      <td style={{whiteSpace:'nowrap',fontSize:10}}>
                        {(s.rsRank>=70 && (s.rsTrend?.vs4w||0)>0 && s.swingMomentum>=60) && (
                          <span title="Triple: RS>70+Accel>0+Mom>60" style={{color:'var(--green)',fontWeight:700,marginRight:3}}>★</span>
                        )}
                        {s.rsLineNewHigh && (
                          <span title="RS Line at 52wk high — stock outperforming SPY. IBD #1 signal." style={{color:'var(--gold)',fontWeight:700,marginRight:3}}>⭐</span>
                        )}
                        {(s.rsTrend?.vs4w>5 && s.rsRank>=55 && s.rsRank<70) && (
                          <span title="Emerging: RS 55-70 rising fast. Watch for >70." style={{color:'var(--cyan)',fontWeight:700,marginRight:3}}>↗</span>
                        )}
                        {s.vcpForming && (
                          <span title={`VCP ${s.vcpCount}× contractions. Pivot $${s.vcpPivot}. Stop $${s.vcpStop}. Best with S2.`} style={{color:'var(--purple)',fontWeight:700,marginRight:3}}>VCP</span>
                        )}
                        {s.stage===2 && <span title="S2: price above rising 150MA. Required for all long setups." style={{color:'var(--green)',fontWeight:700,marginRight:3}}>S2</span>}
                        {s.stage===4 && <span title="S4: Downtrend. Avoid all longs." style={{color:'var(--red)',fontWeight:700,marginRight:3}}>S4</span>}
                        {s.sepaScore!=null && <span title={s.sepa?Object.entries(s.sepa).map(([k,v])=>`${k}:${v===true?'✓':v===false?'✗':'?'}`).join(' '):'SEPA score'} style={{color:s.sepaScore>=6?'var(--green)':s.sepaScore>=4?'var(--amber)':'var(--text3)',fontWeight:700}}>{s.sepaScore}/8</span>}
                      </td>
                      <td><span className="td-ticker" title={s.name}>{s.ticker}</span></td>
                      <td className="td-name" style={{maxWidth:90,overflow:'hidden',textOverflow:'ellipsis'}}>{s.name}</td>
                      <td style={{fontWeight:600}}>${fmt(s.price)}</td>
                      <td className={fmtC(s.chg1d)}>{fmtP(s.chg1d)}</td>
                      <td className={fmtC(s.chg1w)}>{fmtP(s.chg1w)}</td>
                      <td className={s.vsMA50>0?'up':'dn'}>{fmt(s.vsMA50,1)}%</td>
                      <td title={s.distFromHigh!=null?`${(s.distFromHigh*100).toFixed(1)}% below $${s.w52h?.toFixed(2)}`:''}>{
                        s.distFromHigh!=null && s.distFromHigh<=0.005
                          ? <span style={{color:'var(--green)',fontWeight:700,fontSize:10}}>🔥</span>
                          : <span style={{color:s.distFromHigh<=0.03?'var(--green)':s.distFromHigh<=0.07?'var(--amber)':'var(--text3)'}}>
                              {s.distFromHigh!=null?`-${(s.distFromHigh*100).toFixed(1)}%`:'—'}
                            </span>
                      }</td>
                      <td className={s.volumeRatio>1.5?'up':s.volumeRatio<0.7?'dn':''}>
                        {fmt(s.volumeRatio,2)}x
                        {s.volumeSurge && <span title="Vol surge ≥2x near highs" style={{color:'var(--amber)',marginLeft:3}}>⚡</span>}
                        {s.volumeTrend==='accumulating' && <span style={{color:'var(--green)',fontSize:9,marginLeft:3}}>ACC</span>}
                        {s.volumeTrend==='distributing' && <span style={{color:'var(--red)',fontSize:9,marginLeft:3}}>DIST</span>}
                      </td>
                      <td style={{fontSize:11}}>
                        {s.earningsDate && (
                          <span style={{color:s.daysToEarnings<=7?'var(--red)':s.daysToEarnings<=14?'var(--amber)':'var(--text3)',fontFamily:'var(--font-mono)',fontWeight:s.daysToEarnings<=14?700:400}} title={`Next earnings: ${s.earningsDate}`}>
                            ⚠{s.daysToEarnings}d
                          </span>
                        )}
                      </td>
                      <td>
                        <button className="btn btn-sm" style={{padding:'2px 8px',fontSize:9,background:expandedTicker===s.ticker?'var(--amber)':'transparent',color:expandedTicker===s.ticker?'#000':'var(--text2)',borderColor:expandedTicker===s.ticker?'var(--amber)':'var(--border)'}}
                          onClick={()=> expandedTicker===s.ticker ? closeLevels() : setExpandedTicker(s.ticker)}>
                          {expandedTicker===s.ticker?'▲ Close':'Levels'}
                        </button>
                      </td>
                    </tr>
                    {expandedTicker===s.ticker && (
                      <tr ref={levelsRef}>
                        <td colSpan={14} style={{padding:0,background:'var(--bg)',borderLeft:'3px solid var(--amber)',borderBottom:'2px solid var(--amber)'}}>
                          <div style={{padding:'16px 20px',animation:'fadeUp 0.2s ease'}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                                <span style={{fontFamily:'var(--font-mono)',fontSize:16,fontWeight:700,color:'var(--amber)'}}>▶ {s.ticker}</span>
                                <span style={{fontSize:13,color:'var(--text2)'}}>{s.name}</span>
                                <span style={{fontFamily:'var(--font-mono)',fontSize:14,color:'var(--text)',fontWeight:600}}>${fmt(s.price)}</span>
                                {s.sector && <span style={{fontSize:11,padding:'2px 8px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text2)'}}>{s.sector}</span>}
                              </div>
                              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                                <div className="btn-group">
                                  {['swing','position'].map(m => (
                                    <button key={m} className={`mode-btn ${rsStageMode===m?'active':''}`}
                                      style={{padding:'3px 10px',fontSize:10}}
                                      onClick={() => setRsStageMode(m)}>
                                      {m === 'swing' ? '⚡ Swing' : '📈 Position'}
                                    </button>
                                  ))}
                                </div>
                                <button disabled={rsStaging===s.ticker} onClick={()=>stageFromRS(s.ticker)}
                                  style={{padding:'5px 14px',background:'var(--green)',border:'1px solid var(--green)',borderRadius:4,color:'#000',fontSize:11,fontWeight:800,cursor:'pointer',letterSpacing:1,fontFamily:'var(--font-mono)'}}>
                                  {rsStaging===s.ticker ? 'STAGING...' : 'STAGE'}
                                </button>
                                <button onClick={closeLevels} style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',cursor:'pointer',fontSize:13,padding:'3px 10px',borderRadius:4,fontWeight:700}}>✕ Close</button>
                              </div>
                            </div>
                            <InlineLevels stock={s}/>
                          </div>
                        </td>
                      </tr>
                    )}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        )}

        {/* ── RS TREND HISTORY (merged) ── */}
        {rsLoaded && (
          <RSTrendSection rsData={rsData} />
        )}
      </div>
    </div>
  );
}

// ─── TRADE SETUPS (unified: conviction-ranked picks + ATR levels + regime gate) ──
function TradeSetupsTab({ rsData, rsLoaded, results, setResults, regime, setRegime, scanned, setScanned, summary, setSummary, setupSigFilters, setSetupSigFilters, mode, setMode }) {
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState('');
  const [picks,   setPicks]   = useState(null);
  const [picksLoad, setPicksLoad] = useState(false);
  const [staging, setStaging] = useState(null); // ticker currently staging

  // Signal filters from App props — persists across tab switches
  const toggleSetupSig = key => setSetupSigFilters(prev => {
    const next = new Set(prev);
    next.has(key) ? next.delete(key) : next.add(key);
    return next;
  });
  const [picksLimit, setPicksLimit] = useState(7);

  const filteredPicks = useMemo(() => {
    if (!picks || !picks.length) return [];
    const sigChecks = {
      '★':   s => s.rsRank>=70 && (s.rsTrend?.vs4w||0)>0 && s.swingMomentum>=60,
      '⭐':   s => s.rsLineNewHigh,
      'VCP': s => s.vcpForming,
      'S2':  s => s.stage===2,
    };
    return picks.filter(s => {
      if (setupSigFilters.size === 0) return true;
      for (const key of setupSigFilters) {
        if (sigChecks[key] && !sigChecks[key](s)) return false;
      }
      return true;
    }).slice(0, picksLimit);
  }, [picks, setupSigFilters, picksLimit]);

  // Pending pullback: strong stocks too extended for position entry — watch for pullback to 50MA
  const pendingPullback = useMemo(() => {
    if (!rsLoaded || !rsData.length) return [];
    return rsData.filter(s =>
      s.rsRank >= 70 &&                           // Strong RS
      (s.rsTrend?.vs1m > 0 || s.rsTrend?.vs4w > 0) && // RS still rising
      s.vsMA200 > 0 &&                            // Above 200MA
      s.vsMA50 > 5 && s.vsMA50 <= 20 &&           // 5-20% above 50MA (too extended for position, not absurdly extended)
      (s.sepaScore >= 4 || s.vcpForming || s.stage === 2) // Has quality structure
    ).sort((a, b) => a.vsMA50 - b.vsMA50)          // Sort by closest to pullback zone first
     .slice(0, 15);
  }, [rsData, rsLoaded]);

  useEffect(() => { loadPicks(); }, []);

  async function stageFromSetup(ticker, stageMode) {
    setStaging(ticker);
    try {
      const r = await api('/api/staging/from-setup', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker, mode: stageMode || mode }),
      });
      alert(`Staged ${r.staged?.symbol}: ${r.sizing?.shares} shares, $${r.sizing?.dollarRisk?.toFixed(0)} risk. Go to Trading tab to submit.`);
    } catch(e) { alert(`Stage failed: ${e.message}`); }
    setStaging(null);
  }

  async function loadPicks() {
    setPicksLoad(true);
    try {
      const d = await api('/api/daily-picks?limit=50');
      setPicks(d.picks || []);
      if (d.regime) setRegime(d.regime);
    } catch(_) {}
    setPicksLoad(false);
  }

  async function runScan() {
    if (!rsLoaded || !rsData.length) {
      setError('Load RS data first — click "↻ REFRESH ALL" in the header');
      return;
    }
    setLoading(true); setError(''); setResults([]);
    try {
      const d = await api('/api/swing-lab/scan', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ stocks: rsData, mode }),
      });
      setResults(d.results || []);
      setRegime(d.regime || null);
      setScanned(d.scannedCount || 0);
      setSummary(d.message || '');
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  const scoreColor = s => s >= 75 ? 'var(--green)' : s >= 55 ? 'var(--amber)' : 'var(--text3)';
  const noLongs = regime && (regime.regime === 'HIGH RISK / BEAR' || regime.sizeMultiplier === 0);

  return (
    <div>
      {/* Regime gate — a pro doesn't buy longs in a bear market */}
      {noLongs && (
        <div style={{padding:'16px 20px',background:'rgba(255,61,87,0.12)',border:'2px solid rgba(255,61,87,0.5)',borderRadius:6,marginBottom:14}}>
          <div style={{fontFamily:'var(--font-mono)',fontSize:18,fontWeight:800,color:'var(--red)',letterSpacing:2}}>NO NEW LONGS</div>
          <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>
            Market regime is <strong style={{color:'var(--red)'}}>{regime.regime}</strong> — size multiplier 0x.
            A professional trader preserves capital in hostile environments. Setups below are for watchlist only.
          </div>
        </div>
      )}

      {regime && !noLongs && <RegimeBanner regime={regime} />}

      {/* Exposure ramp indicator — O'Neil graduated exposure */}
      {regime?.exposureRamp && (
        <div style={{padding:'8px 14px',background:'rgba(0,212,255,0.06)',border:'1px solid rgba(0,212,255,0.2)',borderRadius:5,marginBottom:14,display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
          <div style={{fontFamily:'var(--font-mono)',fontSize:10,letterSpacing:2,color:'var(--cyan)',fontWeight:700}}>EXPOSURE RAMP</div>
          <div style={{display:'flex',gap:4}}>
            {['PILOT','HALF','THREE_QUARTER','FULL'].map((lvl, i) => {
              const active = ['PILOT','HALF','THREE_QUARTER','FULL'].indexOf(regime.exposureRamp.exposureLevel) >= i;
              const reduced = regime.exposureRamp.exposureLevel === 'REDUCED';
              return (
                <div key={lvl} style={{
                  width:40, height:6, borderRadius:3,
                  background: reduced ? (i===0||i===1 ? 'var(--amber)' : 'var(--bg3)') : active ? 'var(--cyan)' : 'var(--bg3)',
                  border:'1px solid var(--border)',
                }} title={`${lvl}: ${[2,4,6,8][i]}% max heat`}/>
              );
            })}
          </div>
          <span style={{fontSize:11,color:'var(--text2)',fontFamily:'var(--font-mono)'}}>
            {regime.exposureRamp.exposureLevel} — max heat {regime.exposureRamp.maxHeatPct}% · rally day {regime.exposureRamp.rallyDay}
            {regime.exposureRamp.ftdConfirmed && ' · FTD confirmed'}
            {regime.exposureRamp.distDays > 0 && ` · ${regime.exposureRamp.distDays} dist days`}
          </span>
        </div>
      )}

      <div className="panel" style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <div>
            <div className="panel-title">Trade <span>Setups</span></div>
            <div className="panel-sub">Conviction-ranked candidates with ATR-based levels. Run RS Scanner first.</div>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <div className="btn-group">
              {['swing','position','both'].map(m => (
                <button key={m} className={`mode-btn ${mode===m?'active':''}`}
                  onClick={() => setMode(m)}>
                  {m === 'swing' ? '⚡ Swing' : m === 'position' ? '📈 Position' : 'Both'}
                </button>
              ))}
            </div>
            <button className="btn btn-primary" onClick={runScan} disabled={loading}>
              {loading ? '⟳ Scanning...' : '⟳ Scan Levels'}
            </button>
            <button className="btn btn-sm" onClick={loadPicks} disabled={picksLoad}>
              {picksLoad ? '⟳...' : '⟳ Refresh Picks'}
            </button>
          </div>
        </div>
        {error && <ErrorBox msg={error}/>}
      </div>

      {(loading || picksLoad) && <div className="panel"><Loader msg="Scanning universe..."/></div>}

      {/* Conviction-ranked picks */}
      {picks && picks.length > 0 && (
        <div style={{marginBottom:20}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10,paddingLeft:2,flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)'}}>
              CONVICTION PICKS — {filteredPicks.length}{picks.length !== filteredPicks.length ? ` of ${picks.length}`:''} ranked by RS + Momentum + SEPA
            </span>
            <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
              {[
                {key:'★',   label:'★ Triple',  col:'var(--green)'},
                {key:'⭐',   label:'⭐ RS High', col:'var(--gold)'},
                {key:'VCP', label:'VCP',        col:'var(--purple)'},
                {key:'S2',  label:'S2',         col:'var(--green)'},
              ].map(c => (
                <button key={c.key} onClick={()=>toggleSetupSig(c.key)}
                  style={{padding:'2px 8px',fontSize:9,fontWeight:700,fontFamily:'var(--font-mono)',
                    background:setupSigFilters.has(c.key)?`${c.col}22`:'transparent',
                    color:setupSigFilters.has(c.key)?c.col:'var(--text3)',
                    border:`1px solid ${setupSigFilters.has(c.key)?c.col:'var(--border)'}`,
                    borderRadius:3,cursor:'pointer',letterSpacing:.5}}>
                  {c.label}
                </button>
              ))}
              {setupSigFilters.size > 0 && (
                <button onClick={()=>setSetupSigFilters(new Set())}
                  style={{padding:'2px 6px',fontSize:9,background:'transparent',color:'var(--text3)',border:'1px solid var(--border)',borderRadius:3,cursor:'pointer'}}>
                  Clear
                </button>
              )}
            </div>
          </div>
          <div style={{display:'grid',gap:10}}>
            {filteredPicks.map((s, rank) => {
              const sw = s.swingSetup || {};
              const pos = s.positionSetup || {};
              // Extract just the price from stopLevel (strip the parenthetical note)
              const swStop = sw.stopLevel?.split(' (')[0] || '—';
              const posStop = pos.stopLevel?.split(' (')[0] || '—';
              // Extract the low end of entry zone for cleaner display
              const swEntry = sw.entryZone?.split(' – ')[0] || '—';
              const posEntry = pos.entryZone?.split(' – ')[0] || '—';
              const rankColor = rank===0?'var(--green)':rank<=2?'var(--amber)':'var(--text3)';
              return (
                <div key={s.ticker} style={{
                  background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,
                  borderLeft:`3px solid ${rankColor}`,
                  opacity: noLongs ? 0.6 : 1,
                  overflow:'hidden',
                }}>
                  {/* Card header */}
                  <div style={{padding:'12px 16px',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',borderBottom:'1px solid var(--border)'}}>
                    <div style={{fontFamily:'var(--font-mono)',fontSize:13,color:rankColor,fontWeight:700,minWidth:24}}>#{rank+1}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:4}}>
                        <span className="td-ticker" style={{fontSize:17}}>{s.ticker}</span>
                        <span style={{fontFamily:'var(--font-mono)',fontSize:14,color:'var(--text)',fontWeight:600}}>${s.price?.toFixed(2)}</span>
                        {s.rsLineNewHigh && <span style={{background:'rgba(255,215,0,0.12)',color:'var(--gold)',fontWeight:700,fontSize:10,padding:'1px 6px',borderRadius:3,border:'1px solid rgba(255,215,0,0.3)'}}>⭐ RS Line High</span>}
                        {s.vcpForming && <span style={{background:'rgba(196,77,255,0.1)',color:'var(--purple)',fontWeight:700,fontSize:10,padding:'1px 6px',borderRadius:3,border:'1px solid rgba(196,77,255,0.3)'}}>VCP {s.vcpCount}x</span>}
                        {s.earningsRisk && <span style={{background:'rgba(255,61,87,0.1)',color:'var(--red)',fontWeight:700,fontSize:10,padding:'1px 6px',borderRadius:3,border:'1px solid rgba(255,61,87,0.3)'}}>⚠ Earnings {s.daysToEarnings}d</span>}
                        <span style={{fontSize:10,color:'var(--text3)',marginLeft:'auto'}}>{s.sector}</span>
                        <button disabled={noLongs || staging===s.ticker} onClick={()=>stageFromSetup(s.ticker)}
                          style={{padding:'5px 14px',background:noLongs?'var(--bg3)':'var(--green)',border:`1px solid ${noLongs?'var(--border)':'var(--green)'}`,borderRadius:4,color:noLongs?'var(--text3)':'#000',fontSize:11,fontWeight:800,cursor:noLongs?'not-allowed':'pointer',letterSpacing:1,fontFamily:'var(--font-mono)'}}>
                          {staging===s.ticker ? 'STAGING...' : 'STAGE'}
                        </button>
                      </div>
                      {/* Metrics row */}
                      <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
                        {[
                          {label:'RS',    val:s.rsRank,                color:rsColor(s.rsRank)},
                          {label:'ACCEL', val:`${s.rsTrend?.vs4w>0?'+':''}${s.rsTrend?.vs4w||0}`, color:s.rsTrend?.vs4w>5?'var(--green)':'var(--amber)'},
                          {label:'MOM',   val:s.swingMomentum,         color:s.swingMomentum>=60?'var(--green)':'var(--amber)'},
                          {label:'SEPA',  val:`${s.sepaScore||0}/8`,   color:s.sepaScore>=5?'var(--green)':'var(--amber)'},
                          {label:'CONV',  val:s.convictionScore,       color:scoreColor(s.convictionScore)},
                        ].map(m => (
                          <div key={m.label} style={{display:'flex',alignItems:'baseline',gap:4}}>
                            <span style={{fontSize:9,color:'var(--text3)',letterSpacing:1,textTransform:'uppercase'}}>{m.label}</span>
                            <span style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:700,color:m.color}}>{m.val}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Trade levels */}
                  <div style={{display:'grid',gridTemplateColumns:mode==='both'?'1fr 1fr':'1fr',gap:0}}>
                    {(mode==='swing' || mode==='both') && (
                      <div style={{padding:'12px 16px',borderRight:mode==='both'?'1px solid var(--border)':'none'}}>
                        <div style={{fontSize:9,color:'var(--cyan)',letterSpacing:2,fontFamily:'var(--font-mono)',fontWeight:700,marginBottom:10}}>⚡ SWING · 2-10 DAYS</div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                          {[
                            {label:'Entry',  val:swEntry,      color:'var(--green)',  bg:'rgba(0,230,118,0.06)',  border:'rgba(0,230,118,0.2)'},
                            {label:'Stop',   val:swStop,       color:'var(--red)',    bg:'rgba(255,61,87,0.06)',  border:'rgba(255,61,87,0.2)'},
                            {label:'Target', val:sw.target1||'—', color:'var(--cyan)',bg:'rgba(0,212,255,0.06)',  border:'rgba(0,212,255,0.2)'},
                            {label:'R/R',    val:sw.riskReward||'—', color:'var(--amber)',bg:'rgba(240,165,0,0.06)',border:'rgba(240,165,0,0.2)'},
                          ].map(lv => (
                            <div key={lv.label} style={{background:lv.bg,border:`1px solid ${lv.border}`,borderRadius:4,padding:'8px 10px'}}>
                              <div style={{fontSize:9,color:'var(--text3)',letterSpacing:.5,textTransform:'uppercase',marginBottom:4}}>{lv.label}</div>
                              <div style={{fontFamily:'var(--font-mono)',fontSize:14,fontWeight:700,color:lv.color}}>{lv.val}</div>
                            </div>
                          ))}
                        </div>
                        {sw.atrUsed && <div style={{fontSize:10,color:'var(--text3)',marginTop:8}}>ATR ${sw.atrUsed} · Stop {sw.stopPct}% below entry</div>}
                      </div>
                    )}
                    {(mode==='position' || mode==='both') && (
                      <div style={{padding:'12px 16px'}}>
                        <div style={{fontSize:9,color:'var(--green)',letterSpacing:2,fontFamily:'var(--font-mono)',fontWeight:700,marginBottom:10}}>📈 POSITION · 3-8 WEEKS · PULLBACK TO 50MA</div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                          {[
                            {label:'Entry',  val:posEntry,      color:'var(--green)',  bg:'rgba(0,230,118,0.06)',  border:'rgba(0,230,118,0.2)'},
                            {label:'Stop',   val:posStop,       color:'var(--red)',    bg:'rgba(255,61,87,0.06)',  border:'rgba(255,61,87,0.2)'},
                            {label:'Target', val:pos.target1||'—', color:'var(--cyan)',bg:'rgba(0,212,255,0.06)',  border:'rgba(0,212,255,0.2)'},
                            {label:'R/R',    val:pos.riskReward||'—', color:'var(--amber)',bg:'rgba(240,165,0,0.06)',border:'rgba(240,165,0,0.2)'},
                          ].map(lv => (
                            <div key={lv.label} style={{background:lv.bg,border:`1px solid ${lv.border}`,borderRadius:4,padding:'8px 10px'}}>
                              <div style={{fontSize:9,color:'var(--text3)',letterSpacing:.5,textTransform:'uppercase',marginBottom:4}}>{lv.label}</div>
                              <div style={{fontFamily:'var(--font-mono)',fontSize:14,fontWeight:700,color:lv.color}}>{lv.val}</div>
                            </div>
                          ))}
                        </div>
                        {pos.atrUsed && <div style={{fontSize:10,color:'var(--text3)',marginTop:8}}>ATR ${pos.atrUsed} · 50MA ${s.ma50?.toFixed(2)||'—'} · Stop {pos.stopPct}%</div>}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
          {picks.length > 7 && picksLimit <= 7 && (
            <div style={{textAlign:'center',marginTop:10}}>
              <button onClick={()=>setPicksLimit(50)} style={{padding:'6px 20px',fontSize:11,fontFamily:'var(--font-mono)',fontWeight:600,background:'transparent',color:'var(--text2)',border:'1px solid var(--border)',borderRadius:4,cursor:'pointer',letterSpacing:1}}>
                Show All {picks.length} Candidates ▼
              </button>
            </div>
          )}
          {picksLimit > 7 && (
            <div style={{textAlign:'center',marginTop:10}}>
              <button onClick={()=>setPicksLimit(7)} style={{padding:'6px 20px',fontSize:11,fontFamily:'var(--font-mono)',fontWeight:600,background:'transparent',color:'var(--text2)',border:'1px solid var(--border)',borderRadius:4,cursor:'pointer',letterSpacing:1}}>
                Show Top 7 Only ▲
              </button>
            </div>
          )}
        </div>
      )}

      {/* Pending pullback — extended stocks to watch for position entry */}
      {pendingPullback.length > 0 && (
        <div style={{marginBottom:20}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,paddingLeft:2}}>
            <span style={{fontSize:10,color:'var(--amber)',letterSpacing:1.5,fontFamily:'var(--font-mono)'}}>
              PENDING PULLBACK — {pendingPullback.length} stocks watching for 50MA entry
            </span>
            <span style={{fontSize:10,color:'var(--text3)'}}>
              Strong RS + structure but too extended for position entry. Alert when vsMA50 drops below 5%.
            </span>
          </div>
          <div style={{overflowX:'auto'}}>
            <table className="rs-table" style={{fontSize:12}}>
              <thead>
                <tr>
                  <th>Ticker</th>
                  <th>Price</th>
                  <th>RS</th>
                  <th>Accel</th>
                  <th>Mom</th>
                  <th title="Distance above 50MA — needs to drop to ≤5% for position entry">vs 50MA</th>
                  <th>50MA</th>
                  <th title="Position entry zone when stock pulls back">Entry Zone</th>
                  <th>SEPA</th>
                  <th>Signals</th>
                </tr>
              </thead>
              <tbody>
                {pendingPullback.map(s => {
                  const entryZone = s.ma50 ? `$${(s.ma50 * 0.995).toFixed(2)} – $${(s.ma50 * 1.01).toFixed(2)}` : '—';
                  return (
                    <tr key={s.ticker}>
                      <td><span className="td-ticker">{s.ticker}</span></td>
                      <td style={{fontFamily:'var(--font-mono)'}}>${s.price?.toFixed(2)}</td>
                      <td style={{fontFamily:'var(--font-mono)',color:rsColor(s.rsRank),fontWeight:700}}>{s.rsRank}</td>
                      <td style={{fontFamily:'var(--font-mono)',color:(s.rsTrend?.vs4w||0)>5?'var(--green)':'var(--amber)'}}>{s.rsTrend?.vs4w>0?'+':''}{s.rsTrend?.vs4w||0}</td>
                      <td style={{fontFamily:'var(--font-mono)',color:s.swingMomentum>=60?'var(--green)':'var(--amber)'}}>{s.swingMomentum}</td>
                      <td style={{fontFamily:'var(--font-mono)',color:'var(--amber)',fontWeight:700}}>{s.vsMA50?.toFixed(1)}%</td>
                      <td style={{fontFamily:'var(--font-mono)',color:'var(--text3)'}}>${s.ma50?.toFixed(2)}</td>
                      <td style={{fontFamily:'var(--font-mono)',color:'var(--cyan)',fontSize:11}}>{entryZone}</td>
                      <td style={{fontFamily:'var(--font-mono)',color:s.sepaScore>=5?'var(--green)':'var(--amber)'}}>{s.sepaScore||0}/8</td>
                      <td style={{fontSize:11}}>
                        {s.rsRank>=70&&(s.rsTrend?.vs4w||0)>0&&s.swingMomentum>=60 && <span style={{color:'var(--green)',fontWeight:700,marginRight:3}}>★</span>}
                        {s.vcpForming && <span style={{color:'var(--purple)',fontWeight:700,marginRight:3}}>VCP</span>}
                        {s.stage===2 && <span style={{color:'var(--green)',fontWeight:700,marginRight:3}}>S2</span>}
                        {s.rsLineNewHigh && <span style={{color:'var(--gold)',fontWeight:700}}>⭐</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Detailed swing lab results (when scan is run) */}
      {results.length > 0 && (
        <div>
          <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:10}}>DETAILED SCAN RESULTS ({scanned} candidates)</div>
          <div className="sl-grid">
            {results.map(s => {
              const b = s.brief || {};
              return (
                <div className="sl-card anim-in" key={s.ticker} style={{opacity:noLongs?0.6:1}}>
                  <div className="sl-card-header">
                    <div className="sl-card-title">
                      <div>
                        <span className="sl-ticker">{s.ticker}</span>
                        <span style={{fontSize:11,color:'var(--text3)',marginLeft:8}}>${fmt(s.price)}</span>
                      </div>
                    </div>
                    <div className="sl-name">{s.name} · {s.sector}</div>
                    <div className="sl-metrics">
                      <div className="sl-metric">
                        <div className="sl-metric-label">RS</div>
                        <div className="sl-metric-val" style={{color:rsColor(s.rsRank)}}>{s.rsRank}</div>
                      </div>
                      <div className="sl-metric">
                        <div className="sl-metric-label">Mom</div>
                        <div className="sl-metric-val" style={{color:s.swingMomentum>=60?'var(--green)':'var(--amber)'}}>{s.swingMomentum||'—'}</div>
                      </div>
                      <div className="sl-metric">
                        <div className="sl-metric-label">Vol</div>
                        <div className={`sl-metric-val ${s.volumeRatio>1.5?'up':''}`}>{fmt(s.volumeRatio,2)}x</div>
                      </div>
                    </div>
                  </div>
                  <div className="sl-card-body">
                    {s.algoSetup && (
                      <div style={{marginBottom:8}}>
                        <div className="sl-levels">
                          <div className="sl-level"><div className="sl-level-label">Entry</div><div className="sl-level-val up">{s.algoSetup.entryZone||'—'}</div></div>
                          <div className="sl-level"><div className="sl-level-label">Stop</div><div className="sl-level-val dn">{s.algoSetup.stopLevel||'—'}</div></div>
                          <div className="sl-level"><div className="sl-level-label">T1 ({s.algoSetup.riskReward})</div><div className="sl-level-val" style={{color:'var(--cyan)'}}>{s.algoSetup.target1||'—'}</div></div>
                        </div>
                        <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>ATR: ${s.algoSetup.atrUsed} · Stop: {s.algoSetup.stopPct}%</div>
                      </div>
                    )}
                    {(s.earningsDate || b?.earningsDate) && (
                      <div className="sl-earnings" style={{background:(s.daysToEarnings||99)<=7?'rgba(255,61,87,0.15)':'rgba(240,165,0,0.08)',borderColor:(s.daysToEarnings||99)<=7?'rgba(255,61,87,0.5)':'rgba(240,165,0,0.3)'}}>
                        ⚠ Earnings: <strong>{s.earningsDate||b?.earningsDate}</strong>
                        {s.daysToEarnings!=null && ` — ${s.daysToEarnings}d`}
                        {(s.daysToEarnings!=null && s.daysToEarnings<=14) && <strong style={{color:'var(--red)',marginLeft:4}}>DO NOT HOLD</strong>}
                      </div>
                    )}
                    <button disabled={noLongs || staging===s.ticker} onClick={()=>stageFromSetup(s.ticker)}
                      style={{width:'100%',marginTop:8,padding:'6px 0',background:noLongs?'var(--bg3)':'var(--green)',border:`1px solid ${noLongs?'var(--border)':'var(--green)'}`,borderRadius:4,color:noLongs?'var(--text3)':'#000',fontSize:11,fontWeight:800,cursor:noLongs?'not-allowed':'pointer',letterSpacing:1,fontFamily:'var(--font-mono)'}}>
                      {staging===s.ticker ? 'STAGING...' : 'STAGE'}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {!picks?.length && !results.length && !loading && !picksLoad && (
        <div className="panel" style={{textAlign:'center',padding:30,color:'var(--text3)'}}>
          Run <strong>RS Scanner</strong> first (RS Dashboard tab), then refresh picks here.
        </div>
      )}
    </div>
  );
}

function WatchlistTab({ rsData }) {
  const [list,      setList]    = useState([]);
  const [staged,    setStaged]  = useState([]);
  const [ticker,    setTicker]  = useState('');
  const [note,      setNote]    = useState('');
  const [loading,   setLoading] = useState(false);
  const [editNote,  setEditNote] = useState(null);
  const [editVal,   setEditVal]  = useState('');
  const [stageFilter, setStageFilter] = useState('all');
  const [staging,   setStaging] = useState(null);
  const { sortData: sortWL, SH: WLSH } = useSortTable('addedAt', -1);

  useEffect(() => { loadWL(); loadStaged(); }, []);

  async function loadWL() {
    try { const d = await api('/api/watchlist'); setList(d.watchlist || []); } catch(_) {}
  }

  async function loadStaged() {
    try { const d = await api('/api/staging?status=staged'); setStaged(d.orders || []); } catch(_) {}
  }

  async function add() {
    if (!ticker.trim()) return;
    setLoading(true);
    try {
      await api('/api/watchlist', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: ticker.toUpperCase(), note }) });
      setTicker(''); setNote('');
      await loadWL();
    } catch(_) {}
    setLoading(false);
  }

  async function remove(t) {
    await api(`/api/watchlist/${t}`, { method:'DELETE' });
    await loadWL();
  }

  async function saveNote(w) {
    try {
      await api('/api/watchlist', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: w.ticker, note: editVal, stage: w.stage }) });
      setEditNote(null);
      await loadWL();
    } catch(_) {}
  }

  async function updateStage(w, newStage) {
    try {
      await api('/api/watchlist', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: w.ticker, note: w.note, stage: newStage }) });
      await loadWL();
    } catch(_) {}
  }

  async function stageFromPipeline(ticker, mode) {
    setStaging(ticker);
    try {
      const r = await api('/api/staging/from-setup', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker, mode: mode || 'swing' }),
      });
      await loadStaged();
      alert(`Staged ${r.staged?.symbol}: ${r.sizing?.shares} shares, $${r.sizing?.dollarRisk?.toFixed(0)} risk`);
    } catch(e) { alert(`Stage failed: ${e.message}`); }
    setStaging(null);
  }

  const stageColor = s => s==='staged'?'var(--green)':s==='candidate'?'var(--amber)':'var(--text3)';
  const stageLabel = s => s==='staged'?'STAGED':s==='candidate'?'CANDIDATE':'WATCHING';

  const stagedSymbols = new Set(staged.map(s => s.symbol));
  const filtered = list.filter(w => stageFilter === 'all' || w.stage === stageFilter);
  const counts = { watching: list.filter(w=>w.stage==='watching').length, candidate: list.filter(w=>w.stage==='candidate').length, staged: stagedSymbols.size };

  return (
    <div>
      <div className="panel">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,flexWrap:'wrap',gap:8}}>
          <div>
            <div className="panel-title" style={{marginBottom:4}}>📋 <span>Trade Pipeline</span></div>
            <div className="panel-sub">Watching → Candidate → Staged → Executed. One-click staging when setup forms.</div>
          </div>
        </div>

        {/* Pipeline funnel counts */}
        <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
          {[
            {id:'all',label:'All',count:list.length,color:'var(--text)'},
            {id:'watching',label:'Watching',count:counts.watching,color:'var(--text3)'},
            {id:'candidate',label:'Candidates',count:counts.candidate,color:'var(--amber)'},
            {id:'staged',label:'Staged Orders',count:counts.staged,color:'var(--green)'},
          ].map(f => (
            <button key={f.id} onClick={()=>setStageFilter(f.id)}
              style={{padding:'6px 14px',background:stageFilter===f.id?'rgba(255,255,255,0.06)':'transparent',
                border:`1px solid ${stageFilter===f.id?f.color:'var(--border)'}`,borderRadius:4,color:stageFilter===f.id?f.color:'var(--text3)',
                cursor:'pointer',fontSize:11,fontFamily:'var(--font-mono)',fontWeight:stageFilter===f.id?700:400}}>
              {f.label} <strong style={{marginLeft:4}}>{f.count}</strong>
            </button>
          ))}
        </div>

        <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
          <input value={ticker} onChange={e=>setTicker(e.target.value.toUpperCase())} placeholder="TICKER"
            style={{width:90,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'8px 10px',fontFamily:'var(--font-mono)',fontSize:13,outline:'none',letterSpacing:2}}/>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Thesis, key level, what triggers entry..."
            style={{flex:1,minWidth:120,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'8px 10px',fontSize:12,outline:'none'}}/>
          <button className="btn btn-primary btn-sm" onClick={add} disabled={loading||!ticker}>+ Add</button>
        </div>

        {/* Staged orders summary (if filter is 'staged') */}
        {stageFilter === 'staged' && staged.length > 0 && (
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:'var(--green)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>STAGED ORDERS — READY TO SUBMIT</div>
            <table className="data-table">
              <thead><tr>
                {['Symbol','Entry','Stop','Target','Qty','Source',''].map(h =>
                  <th key={h} style={{fontSize:10}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {staged.map(s => (
                  <tr key={s.id}>
                    <td><span className="td-ticker">{s.symbol}</span></td>
                    <td style={{fontFamily:'var(--font-mono)'}}>${fmt(s.entry_price)}</td>
                    <td style={{fontFamily:'var(--font-mono)',color:'var(--red)'}}>${fmt(s.stop_price)}</td>
                    <td style={{fontFamily:'var(--font-mono)',color:'var(--green)'}}>{s.target1_price?'$'+fmt(s.target1_price):'—'}</td>
                    <td style={{fontFamily:'var(--font-mono)'}}>{s.qty}</td>
                    <td style={{fontSize:10,color:'var(--text3)'}}>{s.source}</td>
                    <td style={{fontSize:11,color:'var(--cyan)'}}>Go to Trading tab to submit</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {stageFilter !== 'staged' && filtered.length === 0 && (
          <div className="empty">No stocks in this stage. Add tickers above or promote from a lower stage.</div>
        )}

        {stageFilter !== 'staged' && filtered.length > 0 && (
          <table className="data-table">
            <thead>
              <tr>
                <th>Stage</th>
                <th title="Ticker symbol">Ticker</th>
                <WLSH k="price"  label="Price"   title="Current market price"/>
                <WLSH k="chg1d"  label="1D"      title="Today's % price change"/>
                <WLSH k="chg1w"  label="1W"      title="5-day price return"/>
                <WLSH k="chg1m"  label="1M"      title="21-day price return"/>
                <WLSH k="rsRank" label="IBD RS"  title="IBD RS percentile rank 1-99"/>
                <th>RS Trend</th>
                <WLSH k="swingMomentum" label="SwingMom" title="Absolute price velocity"/>
                <th>Note / Thesis</th>
                <WLSH k="addedAt" label="Added"/>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {sortWL(filtered.map(w => {
                const s2 = rsData?.find(r => r.ticker === w.ticker);
                return {...w, price:s2?.price, chg1d:s2?.chg1d, chg1w:s2?.chg1w, chg1m:s2?.chg1m,
                        rsRank:s2?.rsRank, rsTrend:s2?.rsTrend, swingMomentum:s2?.swingMomentum};
              })).map(w => {
                const isStaged = stagedSymbols.has(w.ticker);
                return (
                  <tr key={w.ticker}>
                    <td>
                      <span style={{padding:'2px 8px',borderRadius:3,fontSize:10,fontWeight:700,letterSpacing:0.5,
                        background:w.stage==='candidate'?'rgba(240,165,0,0.15)':'rgba(255,255,255,0.04)',
                        color:stageColor(w.stage),border:`1px solid ${stageColor(w.stage)}`}}>
                        {stageLabel(w.stage)}
                      </span>
                    </td>
                    <td><span className="td-ticker">{w.ticker}</span></td>
                    <td>{w.price ? `$${fmt(w.price)}` : '—'}</td>
                    <td className={fmtC(w.chg1d)}>{fmtP(w.chg1d)}</td>
                    <td className={fmtC(w.chg1w)}>{fmtP(w.chg1w)}</td>
                    <td className={fmtC(w.chg1m)}>{fmtP(w.chg1m)}</td>
                    <td>{w.rsRank ? <RSBar rs={w.rsRank}/> : '—'}</td>
                    <td>{w.rsTrend ? <RSTrendBadge trend={w.rsTrend} rs={w.rsRank}/> : '—'}</td>
                    <td>
                      {w.swingMomentum != null ? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:w.swingMomentum>=60?'var(--green)':w.swingMomentum>=45?'var(--amber)':'var(--red)'}}>{w.swingMomentum}</span> : '—'}
                    </td>
                    <td style={{maxWidth:180}}>
                      {editNote === w.ticker ? (
                        <div style={{display:'flex',gap:4}}>
                          <textarea value={editVal} onChange={e=>setEditVal(e.target.value)}
                            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveNote(w);}if(e.key==='Escape')setEditNote(null);}}
                            autoFocus rows={2}
                            style={{flex:1,minWidth:100,background:'var(--bg)',border:'1px solid var(--amber)',borderRadius:3,color:'var(--text)',padding:'4px 6px',fontSize:11,outline:'none',resize:'vertical',fontFamily:'var(--font-sans)',lineHeight:1.4}}/>
                          <button onClick={()=>saveNote(w)} style={{padding:'2px 6px',background:'var(--amber)',border:'none',borderRadius:2,color:'#000',fontSize:10,cursor:'pointer',fontWeight:700}}>✓</button>
                        </div>
                      ) : (
                        <span onClick={()=>{setEditNote(w.ticker);setEditVal(w.note||'');}}
                          title="Click to edit"
                          style={{fontSize:11,color:w.note?'var(--text2)':'var(--text3)',cursor:'text',display:'block',
                                  minWidth:60,whiteSpace:'normal',wordBreak:'break-word',lineHeight:1.4}}>
                          {w.note || <em style={{opacity:0.4}}>+ thesis</em>}
                        </span>
                      )}
                    </td>
                    <td className="muted" style={{fontSize:10}}>{w.addedAt?.split('T')[0]}</td>
                    <td>
                      <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap'}}>
                        {w.stage === 'watching' && (
                          <button onClick={()=>updateStage(w,'candidate')} title="Promote to candidate"
                            style={{padding:'3px 8px',fontSize:10,background:'rgba(240,165,0,0.15)',border:'1px solid rgba(240,165,0,0.3)',borderRadius:3,color:'var(--amber)',cursor:'pointer',fontWeight:600}}>↑ Candidate</button>
                        )}
                        {w.stage === 'candidate' && !isStaged && (
                          <button onClick={()=>stageFromPipeline(w.ticker)} disabled={staging===w.ticker} title="Auto-size and stage bracket order"
                            style={{padding:'3px 8px',fontSize:10,background:'rgba(0,210,211,0.15)',border:'1px solid rgba(0,210,211,0.3)',borderRadius:3,color:'var(--cyan)',cursor:'pointer',fontWeight:600}}>
                            {staging===w.ticker?'Staging...':'⚡ Stage'}
                          </button>
                        )}
                        {isStaged && <span style={{fontSize:10,color:'var(--green)',fontWeight:700}}>STAGED</span>}
                        {w.stage === 'candidate' && (
                          <button onClick={()=>updateStage(w,'watching')} title="Demote"
                            style={{padding:'3px 6px',fontSize:10,background:'transparent',border:'1px solid var(--border)',borderRadius:3,color:'var(--text3)',cursor:'pointer'}}>↓</button>
                        )}
                        <button onClick={()=>remove(w.ticker)} style={{padding:'3px 6px',fontSize:10,color:'var(--red)',background:'transparent',border:'1px solid rgba(255,61,87,0.3)',borderRadius:3,cursor:'pointer'}}>✕</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}

        <div style={{marginTop:16,padding:'12px 16px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:5,fontSize:12,color:'var(--text3)',lineHeight:1.9}}>
          <strong style={{color:'var(--amber)'}}>Pipeline Flow:</strong>{' '}
          <span style={{color:'var(--text3)'}}>WATCHING</span> → add thesis →{' '}
          <span style={{color:'var(--amber)'}}>CANDIDATE</span> → click Stage →{' '}
          <span style={{color:'var(--green)'}}>STAGED ORDER</span> → go to <strong style={{color:'var(--text)'}}>Trading</strong> tab to submit to broker
        </div>
      </div>
    </div>
  );
}


// ─── RS TREND SECTION (embedded in RS Dashboard) ─────────────────────────────
function RSTrendSection({ rsData }) {

    setLoading(false);
  }

  const dirColor = d => d==='rising'?'var(--green)':d==='falling'?'var(--red)':'var(--text3)';

  const PAGE_SIZE = 60;
  const allTrends = (history?.trends||[]).filter(t => filter==='all' || t.direction===filter);

  return (
    <div style={{marginTop:20}}>
      <hr style={{border:'none',borderTop:'1px solid var(--border)',margin:'20px 0'}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>

          <div style={{fontSize:11,color:'var(--text3)',lineHeight:1.8}}>
            <strong style={{color:'var(--text)'}}>What these columns mean:</strong><br/>
            RS Today = current percentile rank (85 = beats 85% of universe).
            +/- 1W = how many RS points gained or lost vs 7 days ago.
            +/- 4W = gained/lost vs 28 days ago (1 month of accumulation signal).<br/>
            +/- 3M = RS change over 90 days — positive means sustained outperformance for a full quarter.<br/>
            <strong style={{color:'var(--amber)'}}>Best setup: RS 65-79 today AND +/- 4W is +5 or more = emerging leader, entry zone.</strong>
            &nbsp;{history?.totalDays||0} days of snapshots saved.
          </div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['rising','flat','falling','all'].map(f => (
            <button key={f} className={`mode-btn ${filter===f?'active':''}`}
              style={{fontSize:10,padding:'4px 10px',
                      borderColor:filter===f?dirColor(f):undefined,
                      color:filter===f?dirColor(f):undefined}}
              onClick={()=>setFilter(f)}>
              {dirIcon(f)} {f} ({(history?.trends||[]).filter(t=>f==='all'||t.direction===f).length})
            </button>
          ))}
        </div>
      </div>

      {history?.totalDays === 0 && (
        <div className="info-box">ℹ No history yet — pre-generated on first RS scan. Run ⟳ Scan above.</div>
      )}

      {loading ? <Loader msg="Loading RS history..."/> : trends.length > 0 && (
        <table className="data-table">
          <thead>
            <tr>
              <th title="Ticker symbol">Ticker</th>
              <TrendSH k="current"   label="RS Today" title="Current IBD RS rank (1-99, percentile vs universe). Click to sort."/>
              <TrendSH k="direction" label="Trend"    title="Direction based on 7-day RS change. Click to group rising/falling."/>
              <TrendSH k="vs1w"  label="+/- 1W"  title="RS rank change vs 7 days ago. +8 = gained 8 percentile points this week."/>
              <TrendSH k="vs2w"  label="+/- 2W"  title="RS rank change vs 14 days ago"/>
              <TrendSH k="vs4w"  label="+/- 4W"  title="RS rank change vs 28 days ago. Key: rising 4W = sustained accumulation."/>
              <TrendSH k="vs3m"  label="+/- 3M"  title="RS rank change vs 90 days ago. Full quarterly arc — most reliable signal."/>
              <th title="Actionable: ✓ SWING (RS≥70 rising), 👁 WATCH (RS≥55 rising), ✗ AVOID (RS falling below 50), ✗ FADE (falling), → HOLD (stable leader)">Signal</th>
            </tr>
          </thead>
          <tbody>
            {sortTrend(trends).map(t => {
              const interp =
                t.direction==='rising' && t.current>=80 ? '✓ SWING/POSITION — institutions accumulating' :
                t.direction==='rising' && t.current>=70 ? '✓ SWING candidate — RS entering actionable zone' :
                t.direction==='rising' && t.current>=55 ? '👁 WATCH — add to watchlist, RS approaching 70' :
                t.direction==='rising'                  ? '— Low base rising (RS below 55) — not actionable yet' :
                t.direction==='falling' && t.current<50 ? '✗ AVOID — distribution, RS weakening below 50' :
                t.direction==='falling'                 ? '✗ FADE — once-leader losing strength, avoid' :
                t.current>=75                           ? '→ HOLD — maintaining leadership, ok for positions' :
                                                          '— Neutral — monitor';
              return (
                <tr key={t.ticker}>
                  <td><span className="td-ticker">{t.ticker}</span></td>
                  <td><RSBar rs={t.current}/></td>
                  <td style={{color:dirColor(t.direction),fontFamily:'var(--font-mono)',fontWeight:700}}>
                    {dirIcon(t.direction)} {t.direction}
                  </td>
                  <td className={t.vs1w>0?'up':t.vs1w<0?'dn':''}>{t.vs1w!=null?(t.vs1w>0?'+':'')+t.vs1w:'—'}</td>
                  <td className={t.vs1m>0?'up':t.vs1m<0?'dn':''}>{t.vs1m!=null?(t.vs1m>0?'+':'')+t.vs1m:'—'}</td>
                  <td className={t.vs2m>0?'up':t.vs2m<0?'dn':''}>{t.vs2m!=null?(t.vs2m>0?'+':'')+t.vs2m:'—'}</td>
                  <td className={t.vs3m>0?'up':t.vs3m<0?'dn':''}>{t.vs3m!=null?(t.vs3m>0?'+':'')+t.vs3m:'—'}</td>
                  <td style={{fontSize:11,color:'var(--text3)'}}>{interp}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
    </div>
  );
}

// ─── SECTOR / INDUSTRY RS TREND HISTORY ────────────────────────────────────
function SectorIndustryRSTrend({ type, title, api: apiPath }) {

  const { sortData: sortSI, SH: SISH } = useSortTable('current', -1);

    setLoading(true);
    try { const d = await api(apiPath); setHistory(d); } catch(_) {}
    setLoading(false);
  }

    setOpen(o => !o);

  const dirColor = d => d==='rising'?'var(--green)':d==='falling'?'var(--red)':'var(--text3)';

  return (
    <div style={{marginTop:20}}>

                  <th title="Sector or industry ETF ticker symbol">Name</th>
                  <SISH k="current"   label="IBD RS" title="Current RS percentile rank (1-99) within its universe"/>
                  <SISH k="direction" label="Trend"  title="Direction: rising >+3 pts in 7 days, falling <-3 pts, flat otherwise"/>
                  <SISH k="vs1w"      label="vs 1W"  title="RS rank change vs 7 days ago"/>
                  <SISH k="vs1m"      label="vs 1M"  title="RS rank change vs 30 days ago"/>
                  <SISH k="vs2m"      label="vs 2M"  title="RS rank change vs 60 days ago"/>

              <tbody>
                {sortSI(trends).map(t => {
                  const signal =

                    t.direction==='rising'  && t.current>=60 ? 'Improving — watchlist, wait for BULL' :
                    t.direction==='falling' && t.current<50  ? 'Lagging — avoid' :
                    t.direction==='falling'                  ? 'Fading — reduce exposure' :
                                                               'Neutral — hold if owned';
                  return (
                    <tr key={t.ticker}>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--cyan)'}}>{t.ticker}</td>
                      <td><RSBar rs={t.current}/></td>
                      <td style={{color:dirColor(t.direction),fontFamily:'var(--font-mono)',fontWeight:700}}>
                        {dirIcon(t.direction)} {t.direction}
                      </td>
                      <td className={t.vs1w>0?'up':t.vs1w<0?'dn':''}>{t.vs1w!=null?(t.vs1w>0?'+':'')+t.vs1w:'—'}</td>
                      <td className={t.vs1m>0?'up':t.vs1m<0?'dn':''}>{t.vs1m!=null?(t.vs1m>0?'+':'')+t.vs1m:'—'}</td>
                      <td className={t.vs2m>0?'up':t.vs2m<0?'dn':''}>{t.vs2m!=null?(t.vs2m>0?'+':'')+t.vs2m:'—'}</td>
                      <td className={t.vs3m>0?'up':t.vs3m<0?'dn':''}>{t.vs3m!=null?(t.vs3m>0?'+':'')+t.vs3m:'—'}</td>
                      <td style={{fontSize:12,color:'var(--text2)'}}>{signal}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      )}
    </div>
  );
}

// ─── EXECUTION TAB — Broker, Staged Orders, Alerts ───────────────────────────
function ExecutionTab() {
  const [section, setSection] = useState('overview');
  const [broker, setBroker]     = useState(null);
  const [positions, setPositions] = useState([]);
  const [orders, setOrders]     = useState([]);
  const [staged, setStaged]     = useState([]);
  const [subs, setSubs]         = useState([]);
  const [firedAlerts, setFired] = useState([]);
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');
  // Alert form
  const [alertForm, setAlertForm] = useState({symbol:'',trigger_price:'',direction:'above',message:''});
  // Stage form
  const [stageForm, setStageForm] = useState({symbol:'',entry_price:'',stop_price:'',target1_price:'',qty:'',notes:''});
  const [showStageForm, setShowStageForm] = useState(false);
  const [showAlertForm, setShowAlertForm] = useState(false);

  async function loadAll() {
    setLoading(true); setError('');
    try {
      const [b, p, o, s, al, fa] = await Promise.all([
        api('/api/broker/status').catch(()=>null),
        api('/api/broker/positions').catch(()=>({positions:[]})),
        api('/api/broker/orders').catch(()=>({orders:[]})),
        api('/api/staging').catch(()=>({orders:[]})),
        api('/api/alerts/subscriptions').catch(()=>({subscriptions:[]})),
        api('/api/alerts?limit=20').catch(()=>({alerts:[]})),
      ]);
      setBroker(b); setPositions(p.positions||[]); setOrders(o.orders||[]);
      setStaged(s.orders||[]); setSubs(al.subscriptions||[]); setFired(fa.alerts||[]);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  useEffect(() => {
    loadAll();
    const interval = setInterval(loadAll, 30000); // refresh every 30s
    return () => clearInterval(interval);
  }, []);

  async function submitStaged(id) {
    try {
      await api(`/api/staging/${id}/submit`, {method:'POST'});
      loadAll();
    } catch(e) { setError(e.message); }
  }

  async function cancelStaged(id) {
    try {
      await api(`/api/staging/${id}/cancel`, {method:'POST'});
      loadAll();
    } catch(e) { setError(e.message); }
  }

  async function cancelOrder(id) {
    try {
      await api(`/api/broker/orders/${id}`, {method:'DELETE'});
      loadAll();
    } catch(e) { setError(e.message); }
  }

  async function createAlert() {
    if (!alertForm.symbol || !alertForm.trigger_price) return;
    try {
      await api('/api/alerts/subscriptions', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({...alertForm, trigger_price:+alertForm.trigger_price}),
      });
      setAlertForm({symbol:'',trigger_price:'',direction:'above',message:''});
      setShowAlertForm(false); loadAll();
    } catch(e) { setError(e.message); }
  }

  async function deactivateAlert(id) {
    try {
      await api(`/api/alerts/subscriptions/${id}`, {method:'DELETE'});
      loadAll();
    } catch(e) { setError(e.message); }
  }

  async function checkAlertsNow() {
    try {
      const r = await api('/api/alerts/check', {method:'POST'});
      if (r.fired > 0) setError(''); // clear old errors
      loadAll();
    } catch(e) { setError(e.message); }
  }

  async function stageOrder() {
    if (!stageForm.symbol || !stageForm.entry_price || !stageForm.stop_price || !stageForm.qty) return;
    try {
      await api('/api/staging', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({...stageForm, entry_price:+stageForm.entry_price, stop_price:+stageForm.stop_price, target1_price:+stageForm.target1_price||undefined, qty:+stageForm.qty}),
      });
      setStageForm({symbol:'',entry_price:'',stop_price:'',target1_price:'',qty:'',notes:''});
      setShowStageForm(false); loadAll();
    } catch(e) { setError(e.message); }
  }

  async function acknowledgeAlert(id) {
    try {
      await api(`/api/alerts/${id}/acknowledge`, {method:'PUT'});
      loadAll();
    } catch(e) { setError(e.message); }
  }

  const sections = [
    {id:'overview',  label:'Overview'},
    {id:'staged',    label:`Staged Orders (${staged.filter(s=>s.status==='staged').length})`},
    {id:'positions', label:`Positions (${positions.length})`},
    {id:'alerts',    label:`Alerts (${subs.length})`},
    {id:'orders',    label:`Broker Orders (${orders.length})`},
  ];

  const statusColor = s => s==='filled'?'var(--green)':s==='submitted'?'var(--cyan)':s==='staged'?'var(--amber)':s==='cancelled'||s==='expired'?'var(--text3)':'var(--text)';

  return (
    <div>
      {/* Header */}
      <div className="panel" style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <div>
            <div className="panel-title">Execution <span>Bridge</span></div>
            <div className="panel-sub">Alpaca broker integration — stage orders, monitor stops, manage alerts</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary" onClick={loadAll} disabled={loading}>
              {loading ? '...' : '⟳ Refresh'}
            </button>
          </div>
        </div>
        {error && <ErrorBox msg={error}/>}

        {/* Section tabs */}
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {sections.map(s => (
            <button key={s.id} className={`mode-btn ${section===s.id?'active':''}`}
              onClick={()=>setSection(s.id)} style={{fontSize:11}}>
              {s.label}
            </button>
          ))}
        </div>
      </div>

      {loading && <div className="panel"><Loader msg="Loading execution data..."/></div>}

      {/* ─── OVERVIEW ─────────────────────────────── */}
      {section==='overview' && broker && (
        <div>
          {/* Connection + Account */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginBottom:14}}>
            <div className="panel" style={{padding:14}}>
              <div style={{fontSize:10,color:'var(--text3)',letterSpacing:1.5,fontFamily:'var(--font-mono)',marginBottom:8}}>BROKER STATUS</div>
              <div style={{fontSize:20,fontWeight:800,color:broker.broker?.connected?'var(--green)':'var(--red)',fontFamily:'var(--font-mono)'}}>
                {broker.broker?.connected ? 'CONNECTED' : 'DISCONNECTED'}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>
