<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Alpha Hunter — IBD RS · CAN SLIM · Stage Analysis · Swing Intelligence</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2303030b'/%3E%3Ccircle cx='32' cy='32' r='20' fill='none' stroke='%23f0a500' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='32' r='10' fill='none' stroke='%23f0a500' stroke-width='2'/%3E%3Ccircle cx='32' cy='32' r='3' fill='%23f0a500'/%3E%3Cline x1='32' y1='8' x2='32' y2='17' stroke='%23f0a500' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='32' y1='47' x2='32' y2='56' stroke='%23f0a500' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='8' y1='32' x2='17' y2='32' stroke='%23f0a500' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='47' y1='32' x2='56' y2='32' stroke='%23f0a500' stroke-width='2.5' stroke-linecap='round'/%3E%3Cpolyline points='22,38 28,28 34,33 40,22' fill='none' stroke='%2300e676' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.22.5/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.1.16/umd/Recharts.js"></script>
<style>
:root {
  --bg:    #03030b; --bg2: #07071a; --bg3: #0b0b22;
  --border:#14142e; --border2:#1e1e40;
  --text:  #d8d8f0; --text2:#9999cc; --text3:#6666aa;
  --green: #00e676; --red: #ff3d57; --amber: #f0a500;
  --cyan:  #00d4ff; --purple:#c44dff; --gold:#ffd700;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-sans: 'IBM Plex Sans', sans-serif;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:var(--font-sans); font-size:15px; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── Layout ─────────────────────────────────── */
#app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
#ticker-bar { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 16px; height:38px; display:flex; align-items:center; gap:20px; overflow-x:auto; flex-shrink:0; white-space:nowrap; }
#header { background:var(--bg2); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; flex-wrap:wrap; gap:8px; }
#tabs-row { background:var(--bg2); border-bottom:1px solid var(--border); display:flex; overflow-x:auto; flex-shrink:0; }
#main { flex:1; overflow-y:auto; padding:20px; }

/* ── Header ──────────────────────────────────── */
.logo { font-family:var(--font-mono); font-size:18px; font-weight:600; color:var(--amber); letter-spacing:4px; }
.logo span { font-size:10px; color:var(--text3); margin-left:6px; }
.header-actions { display:flex; align-items:center; gap:10px; }
.load-btn { padding:8px 20px; background:var(--amber); border:none; border-radius:4px; color:#000; font-family:var(--font-sans); font-weight:700; font-size:12px; letter-spacing:2px; cursor:pointer; }
.load-btn:disabled { background:var(--text3); cursor:not-allowed; }
.status-dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; }
.status-live { background:var(--green); animation:pulse 2s infinite; }
.status-idle { background:var(--text3); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Ticker bar ──────────────────────────────── */
.ticker-item { display:flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:11px; white-space:nowrap; }
.ticker-sym { color:var(--text2); font-weight:600; }
.ticker-price { color:var(--text); }
.up { color:var(--green); }
.dn { color:var(--red); }
.neutral { color:var(--text2); }

/* ── Tabs ────────────────────────────────────── */
.tab { padding:11px 16px; border:none; background:transparent; cursor:pointer; font-family:var(--font-sans); font-weight:600; font-size:11px; letter-spacing:1.5px; color:var(--text3); border-bottom:2px solid transparent; transition:all 0.15s; white-space:nowrap; text-transform:uppercase; }
.tab:hover { color:var(--text2); }
.tab.active { color:var(--amber); border-bottom-color:var(--amber); }
.tab-badge { font-size:8px; padding:1px 5px; background:rgba(0,230,118,0.15); color:var(--green); border-radius:3px; margin-left:5px; vertical-align:1px; }

/* ── Panels ──────────────────────────────────── */
.panel { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:18px; margin-bottom:16px; }
.panel-title { font-family:var(--font-mono); font-size:14px; font-weight:600; color:var(--text); letter-spacing:2px; margin-bottom:4px; }
.panel-title span { color:var(--amber); }
.panel-sub { font-size:11px; color:var(--text3); margin-bottom:14px; }
.section-label { font-family:var(--font-mono); font-size:10px; color:var(--text3); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }

/* ── Tables ──────────────────────────────────── */
.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table th { padding:7px 10px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--text3); border-bottom:1px solid var(--border); background:var(--bg3); cursor:pointer; white-space:nowrap; }
.data-table th:hover { color:var(--amber); }
.data-table td { padding:8px 10px; border-bottom:1px solid var(--border); font-family:var(--font-mono); font-size:13px; white-space:nowrap; }
.data-table tr:hover td { background:var(--bg3); }
.td-name { font-family:var(--font-sans) !important; font-size:12px !important; color:var(--text2); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.td-ticker { color:var(--cyan); font-weight:600; }

/* ── RS Bar ──────────────────────────────────── */
.rs-bar { display:flex; align-items:center; gap:6px; min-width:100px; }
.rs-track { flex:1; height:3px; background:var(--border2); border-radius:2px; }
.rs-fill { height:100%; border-radius:2px; }
.rs-val { font-family:var(--font-mono); font-size:11px; font-weight:600; min-width:24px; text-align:right; }

/* ── Sector Cards ────────────────────────────── */
.sector-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:10px; margin-bottom:20px; }
.sector-card { background:var(--bg3); border:1px solid var(--border); border-radius:5px; overflow:hidden; }
.sector-card-bar { height:3px; }
.sector-card-body { padding:11px 12px; }
.sc-name { font-size:11px; color:var(--text); font-weight:600; margin-bottom:2px; }
.sc-ticker { font-family:var(--font-mono); font-size:9px; color:var(--text3); margin-bottom:8px; }
.sc-stats { display:grid; grid-template-columns:1fr 1fr; gap:5px 10px; }
.sc-stat-label { font-size:8px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; }
.sc-stat-val { font-family:var(--font-mono); font-size:11px; font-weight:600; }
.sc-rs { display:flex; align-items:center; justify-content:space-between; margin-top:8px; }

/* ── Swing Lab Cards ─────────────────────────── */
.sl-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
.sl-card { background:var(--bg3); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.sl-card-header { padding:12px 14px 10px; border-bottom:1px solid var(--border); }
.sl-card-title { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.sl-ticker { font-family:var(--font-mono); font-size:16px; font-weight:600; color:var(--text); }
.sl-name { font-size:11px; color:var(--text3); margin-top:2px; }
.sl-metrics { display:flex; gap:12px; margin-top:8px; flex-wrap:wrap; }
.sl-metric { text-align:center; }
.sl-metric-label { font-size:8px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; }
.sl-metric-val { font-family:var(--font-mono); font-size:12px; font-weight:600; margin-top:2px; }
.sl-card-body { padding:12px 14px; }
.sl-thesis { font-size:12px; color:var(--text2); line-height:1.7; margin-bottom:10px; }
.sl-levels { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px; }
.sl-level { background:var(--bg2); border:1px solid var(--border); border-radius:4px; padding:7px 10px; text-align:center; }
.sl-level-label { font-size:8px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; }
.sl-level-val { font-family:var(--font-mono); font-size:12px; font-weight:600; margin-top:3px; }
.sl-tags { display:flex; flex-wrap:wrap; gap:5px; }
.sl-tag { font-size:10px; padding:2px 7px; border-radius:3px; border:1px solid; }
.sl-tag-risk { border-color:rgba(255,61,87,0.3); color:var(--red); background:rgba(255,61,87,0.06); }
.sl-tag-catalyst { border-color:rgba(0,214,255,0.3); color:var(--cyan); background:rgba(0,214,255,0.06); }
.sl-earnings { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--amber); margin-top:8px; padding:5px 8px; background:rgba(240,165,0,0.08); border-radius:3px; }

/* ── Verdict badges ──────────────────────────── */
.badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:3px; letter-spacing:.5px; font-family:var(--font-mono); }
.badge-buy { background:rgba(0,230,118,0.15); color:var(--green); }
.badge-watch { background:rgba(0,212,255,0.15); color:var(--cyan); }
.badge-avoid { background:rgba(255,61,87,0.15); color:var(--red); }
.badge-lead { background:rgba(0,230,118,0.12); color:var(--green); }
.badge-lag  { background:rgba(255,61,87,0.12); color:var(--red); }
.badge-neutral { background:rgba(136,136,170,0.12); color:var(--text2); }

/* ── AI output ───────────────────────────────── */
.ai-output { background:var(--bg3); border:1px solid var(--border); border-radius:5px; padding:16px; font-size:13px; line-height:1.8; color:var(--text); min-height:100px; }
.ai-output h2, .ai-output h3 { font-family:var(--font-mono); color:var(--amber); font-size:11px; letter-spacing:2px; text-transform:uppercase; margin:14px 0 6px; border-bottom:1px solid var(--border); padding-bottom:5px; }
.ai-output ul, .ai-output ol { padding-left:18px; }
.ai-output li { margin-bottom:4px; }
.ai-output strong { color:var(--text); }
.ai-input-row { display:flex; gap:10px; margin-top:12px; }
.ai-textarea { flex:1; background:var(--bg2); border:1px solid var(--border); border-radius:4px; color:var(--text); padding:10px 14px; font-size:13px; font-family:var(--font-sans); resize:vertical; outline:none; min-height:60px; }
.ai-textarea::placeholder { color:var(--text3); }

/* ── Buttons ─────────────────────────────────── */
.btn { padding:9px 18px; border:1px solid var(--border); border-radius:4px; background:transparent; color:var(--text2); cursor:pointer; font-size:12px; font-family:var(--font-sans); font-weight:600; letter-spacing:1px; transition:all 0.15s; }
.btn:hover { border-color:var(--amber); color:var(--amber); }
.btn-primary { background:var(--amber); border-color:var(--amber); color:#000; font-weight:700; }
.btn-primary:hover { opacity:0.85; }
.btn-primary:disabled { background:var(--text3); border-color:var(--text3); color:var(--bg); cursor:not-allowed; }
.btn-sm { padding:5px 12px; font-size:11px; }
.btn-group { display:flex; gap:6px; }
.mode-btn { padding:7px 14px; border:1px solid var(--border); background:transparent; color:var(--text3); cursor:pointer; font-size:11px; font-weight:600; letter-spacing:1px; transition:all 0.15s; border-radius:3px; }
.mode-btn.active { border-color:var(--amber); color:var(--amber); background:rgba(240,165,0,0.08); }

/* ── Macro cards ─────────────────────────────── */
.macro-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:18px; }
.macro-card { background:var(--bg3); border:1px solid var(--border); border-radius:5px; padding:12px; }
.macro-label { font-size:8px; color:var(--text3); letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
.macro-price { font-family:var(--font-mono); font-size:16px; color:var(--text); margin-bottom:4px; }
.macro-chg { font-family:var(--font-mono); font-size:11px; }

/* ── Misc ────────────────────────────────────── */
.loader { display:flex; align-items:center; gap:8px; padding:20px; color:var(--text3); font-size:12px; }
.spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--amber); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:40px; color:var(--text3); font-size:13px; }
.error-box { background:rgba(255,61,87,0.07); border:1px solid rgba(255,61,87,0.25); border-radius:5px; padding:12px 16px; color:var(--red); font-size:12px; margin-bottom:14px; }
.info-box { background:rgba(240,165,0,0.07); border:1px solid rgba(240,165,0,0.25); border-radius:5px; padding:12px 16px; color:var(--amber); font-size:12px; margin-bottom:14px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
@media (max-width:768px) { .grid-2,.grid-3 { grid-template-columns:1fr; } }
.divider { border:none; border-top:1px solid var(--border); margin:16px 0; }
.preset-pill { padding:5px 12px; border:1px solid var(--border); border-radius:20px; background:transparent; color:var(--text2); cursor:pointer; font-size:11px; transition:all 0.15s; }
.preset-pill:hover { border-color:var(--cyan); color:var(--cyan); }
.tag-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.num { font-family:var(--font-mono); }
.muted { color:var(--text3); }
.text-green { color:var(--green); }
.text-red   { color:var(--red); }
.text-amber { color:var(--amber); }
.text-cyan  { color:var(--cyan); }
.anim-in { animation:fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, Cell, ResponsiveContainer } = Recharts;

// ─── Helpers ──────────────────────────────────────────────────────────────────
const fmt  = (n,d=2) => n != null ? Number(n).toFixed(d) : '—';
const fmtP = v => v == null ? '—' : `${v >= 0 ? '+' : ''}${Number(v).toFixed(2)}%`;
const fmtC = v => v == null ? '' : v >= 0 ? 'up' : 'dn';
const fmtK = n => {
  if (!n) return '—';
  if (n >= 1e12) return `$${(n/1e12).toFixed(1)}T`;
  if (n >= 1e9)  return `$${(n/1e9).toFixed(1)}B`;
  if (n >= 1e6)  return `$${(n/1e6).toFixed(0)}M`;
  return `$${n}`;
};
const rsColor = rs => rs >= 90 ? '#00e676' : rs >= 70 ? '#69f0ae' : rs >= 50 ? '#f0a500' : rs >= 30 ? '#ff8c00' : '#ff3d57';

async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || `HTTP ${r.status}`); }
  return r.json();
}

async function askClaude(prompt, systemPrompt = '', useWebSearch = false) {
  const d = await api('/api/claude', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ prompt, systemPrompt, useWebSearch, maxTokens:1500 }),
  });
  return d.content || '';
}

// RS Trend badge — shows direction and magnitude of RS change over past week
function RSTrendBadge({ trend, rs }) {
  if (!trend) return <span style={{color:'var(--text3)',fontSize:10}}>—</span>;
  const dir  = trend.direction;
  const mag  = trend.vs1m != null ? Math.abs(trend.vs1m).toFixed(0) : '';
  const icon = dir === 'rising' ? '▲' : dir === 'falling' ? '▼' : '→';
  // Low-RS stocks rising from a weak base (e.g. RS 1→6) shown in grey not green
  // They are rising but NOT actionable yet
  const lowBase = rs != null && rs < 50 && dir === 'rising';
  const col  = lowBase ? 'var(--text3)' :
               dir === 'rising'  ? 'var(--green)' :
               dir === 'falling' ? 'var(--red)'   : 'var(--text3)';
  const tip  = (lowBase ? '[Low RS — not actionable yet] ' : '') +
    `1W: ${trend.vs1w!=null?(trend.vs1w>0?'+':'')+trend.vs1w:'?'} | 1M: ${trend.vs1m!=null?(trend.vs1m>0?'+':'')+trend.vs1m:'?'} | 3M: ${trend.vs3m!=null?(trend.vs3m>0?'+':'')+trend.vs3m:'?'}`;
  return (
    <span title={tip} style={{color:col,fontFamily:'var(--font-mono)',fontSize:11,fontWeight:700,cursor:'help'}}>
      {icon}{mag?` ${mag}`:''}
      {lowBase && <span style={{fontSize:9,color:'var(--text3)',marginLeft:2}}>low</span>}
    </span>
  );
}

// Market regime banner — shown at top of Swing Lab
function RegimeBanner({ regime }) {
  if (!regime) return null;
  const bg  = regime.swingOk === false ? 'rgba(255,61,87,0.1)' : regime.regime === 'BULL / RISK ON' ? 'rgba(0,230,118,0.08)' : 'rgba(240,165,0,0.08)';
  const col = regime.swingOk === false ? 'var(--red)' : regime.regime === 'BULL / RISK ON' ? 'var(--green)' : 'var(--amber)';
  return (
    <div style={{padding:'10px 14px',background:bg,border:`1px solid ${col}44`,borderRadius:5,marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
      <div>
        <span style={{fontFamily:'var(--font-mono)',fontWeight:700,color:col,fontSize:12,letterSpacing:1}}>{regime.regime}</span>
        {regime.warning && <span style={{fontSize:11,color:'var(--text2)',marginLeft:10}}>{regime.warning}</span>}
      </div>
      <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--font-mono)'}}>
        SPY {regime.spyAbove50?'above':'below'} 50MA · {regime.spyAbove200?'above':'below'} 200MA · VIX {regime.vixLevel?.toFixed(0)}
      </div>
    </div>
  );
}

function RSBar({ rs }) {
  if (rs == null) return <span className="muted">—</span>;
  return (
    <div className="rs-bar">
      <div className="rs-track">
        <div className="rs-fill" style={{width:`${rs}%`, background:rsColor(rs)}}/>
      </div>
      <span className="rs-val" style={{color:rsColor(rs)}}>{rs}</span>
    </div>
  );
}

function Loader({ msg = 'Loading...' }) {
  return <div className="loader"><div className="spinner"/>{msg}</div>;
}

function ErrorBox({ msg }) {
  return <div className="error-box">⚠ {msg}</div>;
}

function formatAI(text) {
  if (!text) return null;
  return text
    .replace(/##\s+(.+)/g, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, m => `<ul>${m}</ul>`)
    .replace(/\n\n/g, '<br/><br/>')
    .replace(/\n/g, '<br/>');
}

function AIOutput({ text, loading }) {
  if (loading) return <div className="ai-output"><Loader msg="Claude is analyzing with web search..."/></div>;
  if (!text)   return null;
  return (
    <div className="ai-output anim-in"
      dangerouslySetInnerHTML={{__html: formatAI(text)}} />
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('pulse');
  const [tickerData, setTickerData] = useState([]);
  const [isLive, setIsLive] = useState(false);

  // Shared data cache
  const [rsData,    setRsData]    = useState([]);
  // Share rsData globally so Sectors/Industries tabs can access stock list
  React.useEffect(() => { window._rsData = rsData; }, [rsData]);
  const [rsLoaded,  setRsLoaded]  = useState(false);
  const [minRS,     setMinRS]     = useState(50);   // lifted — persists across tabs
  const [swingResults, setSwingResults] = useState([]);
  const [swingRegime,  setSwingRegime]  = useState(null);
  const [swingScanned, setSwingScanned] = useState(0);
  const [swingSummary, setSwingSummary] = useState('');

  useEffect(() => {
    loadTicker();
    const id = setInterval(loadTicker, 60000);
    return () => clearInterval(id);
  }, []);

  async function loadTicker() {
    try {
      const d = await api('/api/macro');
      const items = (d.macro || []).filter(m =>
        ['SPY','QQQ','IWM','^VIX'].includes(m.symbol)
      );
      setTickerData(items);
      setIsLive(items.length > 0);
    } catch(_) {}
  }

  async function loadAll() {
    // Preload RS data shared across tabs
    try {
      const d = await api('/api/rs-scan');

// ─── InlineLevels: shows ATR trade levels for any stock row ──────────────────
function InlineLevels({ stock: s }) {
  const [funds, setFunds] = useState(null);
  const [fLoad, setFLoad] = useState(false);

  const [fundsError, setFundsError] = useState(null);
  const [news,    setNews]    = useState(null);

  useEffect(() => {
    if (!s?.ticker) return;
    api(`/api/news/${s.ticker}`)
      .then(d => setNews(d.items || []))
      .catch(() => {});
  }, [s?.ticker]);

  useEffect(() => {
    if (!s?.ticker) return;
    setFLoad(true); setFunds(null); setFundsError(null);
    api(`/api/fundamentals/${s.ticker}`)
      .then(d => {
        if (d?.error || d == null) {
          setFundsError(d?.error || 'No fundamental data available from Yahoo Finance');
        } else if (d.canSlimScore != null || d.epsGrowthQoQ != null || d.revenueGrowthYoY != null) {
          setFunds(d);
        } else {
          setFundsError('Yahoo Finance returned data but all fields are empty — ticker may not have coverage');
        }
      })
      .catch(e => setFundsError(e.message || 'Network error fetching fundamentals'))
      .finally(() => setFLoad(false));
  }, [s?.ticker]);


  if (!s) return null;
  const atr   = s.atr || (s.price * 0.02);
  const price = s.price;
  const ma50  = s.ma50;
  const ma200 = s.ma200;

  // ── STOP LOSS — structural support + volatility calibrated ──────────────────
  //
  // SWING (tight — 2-10 days):
  //   Stop = 50MA minus 0.5×ATR (just below the moving average, tight)
  //   Rationale: swing trade requires fast exit if MA breaks. 0.5×ATR avoids
  //   random intraday noise but exits quickly on a real breakdown.
  //
  // POSITION (wider — 3-8 weeks):
  //   Stop = 50MA minus 1.5×ATR (further below MA, gives more room)
  //   Rationale: position trade can handle a brief dip below 50MA. We want
  //   to stay in if it's a shakeout. Exit only on a decisive breakdown.
  //
  // Both use 50MA as the STRUCTURAL reference (not arbitrary % of price).
  // 50MA is where institutions re-accumulate on pullbacks — it's the real floor.
  // If 50MA is more than 15% below price (very extended), fall back to ATR only.

  const ma50Buffer  = ma50 && ma50 > price * 0.85 ? ma50 : null; // 50MA usable if < 15% away
  const swingStop   = ma50Buffer
    ? +(ma50Buffer - 0.5 * atr).toFixed(2)   // 50MA minus half ATR
    : +(price - 1.5 * atr).toFixed(2);        // fallback: 1.5×ATR from price
  const posStop     = ma50Buffer
    ? +(ma50Buffer - 1.5 * atr).toFixed(2)   // 50MA minus 1.5 ATR (wider)
    : +(price - 2.5 * atr).toFixed(2);        // fallback: 2.5×ATR from price

  // Swing is ALWAYS tighter than position (correct — swing exits fast, position holds)
  const stop        = swingStop;
  const stopReason  = ma50Buffer ? `50MA $${ma50?.toFixed(2)} - 0.5×ATR` : '1.5×ATR (50MA too far)';
  const posStopRsn  = ma50Buffer ? `50MA $${ma50?.toFixed(2)} - 1.5×ATR` : '2.5×ATR (50MA too far)';

  const t1      = +(price + 2.5 * atr).toFixed(2);
  const t2      = +(price + 4.0 * atr).toFixed(2);
  const risk    = price - stop;
  const rr      = risk > 0 ? +((t1 - price) / risk).toFixed(1) : 0;
  const stopPct = risk > 0 ? ((risk/price)*100).toFixed(1) : '?';

  const posRisk    = price - posStop;
  const posT1      = +(price + 3.0 * atr).toFixed(2);
  const posT2      = +(price + 5.0 * atr).toFixed(2);
  const posRR      = posRisk > 0 ? +((posT1-price)/posRisk).toFixed(1) : 0;
  const posStopPct = posRisk > 0 ? ((posRisk/price)*100).toFixed(1) : '?';

  const Cell = ({label, val, color}) => (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',minWidth:90,padding:'6px 10px',background:'var(--bg2)',borderRadius:4,border:'1px solid var(--border)'}}>
      <div style={{fontSize:9,color:'var(--text3)',letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>{label}</div>
      <div style={{fontFamily:'var(--font-mono)',fontSize:13,color:color||'var(--text)',fontWeight:600}}>{val}</div>
    </div>
  );

  return (
    <div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
        <div style={{fontSize:10,color:'var(--amber)',fontWeight:700,alignSelf:'center',minWidth:60}}>⚡ SWING</div>
        <Cell label="Entry"  val={`$${price?.toFixed(2)}`}         color="var(--cyan)"/>
        <Cell label="Stop"   val={`$${stop} (-${stopPct}%)`}       color="var(--red)"/>
        <Cell label="Target 1" val={`$${t1}`}                      color="var(--green)"/>
        <Cell label="Target 2" val={`$${t2}`}                      color="var(--green)"/>
        <Cell label="R/R"    val={`${rr.toFixed(1)}:1`}            color={rr>=2?'var(--green)':'var(--amber)'}/>
        <Cell label="ATR"    val={`$${atr.toFixed(2)} (${s.atrPct}%)`} color="var(--text3)"/>
      </div>
      {s.vsMA200 > 0 && (
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:6}}>
          <div style={{fontSize:10,color:'var(--green)',fontWeight:700,alignSelf:'center',minWidth:60}}>📈 POSITION</div>
          <Cell label="Entry zone" val={`$${(price*0.995).toFixed(2)}–$${(price*1.01).toFixed(2)}`} color="var(--cyan)"/>
          <Cell label={`Stop: ${posStopRsn}`} val={`$${posStop} (-${posStopPct}%)`}                                  color="var(--red)"/>
          <Cell label="Target 1"   val={`$${posT1}`}                                                  color="var(--green)"/>
          <Cell label="R/R"        val={`${posRR}:1`}                                                 color={posRR>=2?'var(--green)':'var(--amber)'}/>
        </div>
      )}
      <div style={{fontSize:10,color:'var(--text3)'}}>
        IBD RS: <strong style={{color:'var(--text)'}}>{s.rsRank}</strong> ·
        SwingMom: <strong style={{color:'var(--text)'}}>{s.swingMomentum}</strong> ·
        Vol: <strong style={{color:'var(--text)'}}>{s.volumeRatio?.toFixed(2)}x</strong> ·
        {s.earningsDate && <span style={{color:'var(--amber)'}}> ⚠ Earnings: {s.earningsDate} ({s.daysToEarnings}d)</span>}
        {s.volumeTrend==='accumulating' && <span style={{color:'var(--green)'}}> · ACC (institutional buying)</span>}
        {s.volumeTrend==='distributing' && <span style={{color:'var(--red)'}}> · DIST (institutional selling)</span>}
        <span style={{color:'var(--text3)'}}> · Position size = (1% account) ÷ ${risk?.toFixed(2)} = shares</span>
      </div>
      {(fLoad || funds || fundsError) && (
        <div style={{marginTop:10,padding:'10px 14px',background:'var(--bg)',borderRadius:4,border:'1px solid var(--border)'}}>
          {fLoad ? <Loader msg="Loading CAN SLIM data..."/> :
           fundsError ? (<div style={{fontSize:11,color:'var(--text3)',padding:8}}>⚠ {fundsError}</div>) : (
            <div>
              <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:8,flexWrap:'wrap'}}>
                <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--text3)',letterSpacing:2}}>CAN SLIM SCORE</span>
                <span style={{fontFamily:'var(--font-mono)',fontSize:20,color:funds.canSlimScore>=5?'var(--green)':funds.canSlimScore>=3?'var(--amber)':'var(--red)',fontWeight:700}}>
                  {funds.canSlimScore}/6
                </span>
                {s.sepaScore != null && <span style={{fontFamily:'var(--font-mono)',fontSize:13,color:s.sepaScore>=5?'var(--green)':'var(--amber)'}}>SEPA {s.sepaScore}/8</span>}
                {s.rsLineNewHigh && <span style={{color:'var(--gold)',fontWeight:700,fontSize:12}}>⭐ RS Line at 52wk High</span>}
                {s.vcpForming && (
          <div style={{fontSize:11,padding:'4px 10px',background:'rgba(196,77,255,0.08)',borderRadius:3,marginTop:6,color:'var(--purple)'}}>
            <strong>VCP: {s.vcpCount} contractions</strong>
            {s.vcpPivot && <span style={{marginLeft:10}}>Pivot (breakout above): <strong>${s.vcpPivot}</strong></span>}
            {s.vcpStop && <span style={{marginLeft:10}}>VCP Stop (below last base): <strong>${s.vcpStop}</strong></span>}
            {s.vcpHigherLows && <span style={{marginLeft:10,color:'var(--green)'}}>✓ Higher lows</span>}
            <span style={{marginLeft:10,color:'var(--text3)'}}>Tightness: {s.vcpTightness}%</span>
          </div>
        )}
                {s.stage===2 && <span style={{color:'var(--green)',fontSize:11}}>Stage 2 Uptrend ✓</span>}
                {s.stage===3 && <span style={{color:'var(--amber)',fontSize:11}}>Stage 3 Topping ⚠</span>}
                {s.stage===4 && <span style={{color:'var(--red)',fontSize:11}}>Stage 4 Downtrend ✗</span>}
              </div>

              {/* ── C: Multi-quarter EPS section ─────────────────────── */}
              <div style={{marginBottom:10,padding:'8px 10px',background:'var(--bg3)',borderRadius:4,border:'1px solid var(--border)'}}>
                <div style={{fontSize:9,color:'var(--text3)',letterSpacing:1.5,marginBottom:6,textTransform:'uppercase'}}>C — EPS Growth: Last 3 Quarters vs Same Quarter Prior Year</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                  {[
                    {label:'Q0 (latest)',  val:funds.epsGrowth_Q0_yoy, pass:funds.c_pass_q0},

                  {funds.c_pass_q0 && funds.c_pass_q1 && funds.c_pass_q2 && (
                    <span style={{fontSize:10,color:'var(--green)',fontWeight:700,background:'rgba(0,230,118,0.12)',padding:'2px 6px',borderRadius:3}}>★ 3-qtr streak ≥25%</span>

                </div>
                {/* Rev per quarter */}
                {(funds.revGrowth_Q0_yoy != null || funds.revGrowth_Q1_yoy != null) && (

                  <div>
                    <span style={{fontSize:10,color:'var(--text3)'}}>YoY Growth: </span>

                    </span>

              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8,alignItems:'start'}}>

                      {s.epsGrowthEst}%

                )}
                {[
                  {label:'N — Rev Growth YoY',   val:funds.revenueGrowthYoY, unit:'%', pass:funds.revenueGrowthYoY>=15, threshold:'≥15%'},

}

// ─── SectorStocks: shows universe stocks for a clicked sector/industry ─────────
function SectorStocks({ sectorName, rsData: propData, onClose }) {
  const [localStocks, setLocalStocks] = useState(null);
  const [loading, setLoading] = useState(false);
  const { sortData: sortSS, SH: SSH } = useSortTable('rsRank');

  const allStocks = (propData?.length ? propData : localStocks) || [];

  useEffect(() => {
    // If prop data not yet loaded, fetch it
    if (!propData?.length && !localStocks) {
      setLoading(true);
      api('/api/rs-scan').then(d => {
        const stocks = d.stocks || [];
        setLocalStocks(stocks);
        window._rsData = stocks; // share globally
      }).catch(() => {}).finally(() => setLoading(false));
    }
  }, []);

  if (!sectorName) return null;
  if (loading) return <div style={{padding:16}}><Loader msg={`Loading ${sectorName} stocks...`}/></div>;

  const stocks = allStocks
    .filter(s => s.sector === sectorName);

  if (!stocks.length && !loading) return (

// ─── Reusable sort hook ───────────────────────────────────────────────────────
function useSortTable(defaultKey, defaultDir = -1) {
  const [sortKey, setSortKey] = useState(defaultKey);
  const [sortDir, setSortDir] = useState(defaultDir);
  function toggleSort(k) {
    if (sortKey === k) setSortDir(d => -d);
    else { setSortKey(k); setSortDir(-1); }
  }
  function sortData(data) {
    if (!sortKey || !data) return data || [];
    function getVal(obj, key) {
      // Support nested keys like 'rsTrend.vs4w'
      return key.split('.').reduce((o, k) => o?.[k], obj) ?? -Infinity;
    }
    return [...data].sort((a, b) => {
      const av = getVal(a, sortKey);
      const bv = getVal(b, sortKey);
      if (typeof av === 'string') return sortDir * av.localeCompare(bv);
      return sortDir * (av < bv ? -1 : av > bv ? 1 : 0);
    });
  }
  function SH({ k, label, title }) {
    return (
      <th onClick={() => toggleSort(k)} title={title||''}
        style={{cursor:'pointer',userSelect:'none',color:sortKey===k?'var(--amber)':''}}>
        {label}{sortKey===k?(sortDir>0?' ▲':' ▼'):''}
      </th>
    );
  }
  return { sortKey, sortDir, toggleSort, sortData, SH };
}

                  <col style={{width:'58px'}}/>{/* 52wkH% */}

                    <SH k="chg1d"         label="1D"        title="Today's price change %"/>

                    <SH k="volumeRatio"   label="Vol"       title="Today's volume ÷ 3M avg. ⚡=surge ≥2x near highs. ACC=above 50MA+vol>1.2x. DIST=below 50MA+vol>1.2x."/>

                      <td style={{fontFamily:'var(--font-mono)',fontSize:12}}>

                              : s.rsRank <= 3 && Math.abs(s.rsTrend.vs4w) <= 2
                              ? <span style={{color:'var(--red)',fontSize:9}} title="Sustained bottom">FLOOR</span>
                              : <span className={s.rsTrend.vs4w>3?'up':s.rsTrend.vs4w<-3?'dn':''}>{s.rsTrend.vs4w>0?'+':''}{s.rsTrend.vs4w}</span>)
                          : <span className="muted">—</span>}
                      </td>
                      <td style={{whiteSpace:'nowrap',fontSize:10}}>
                        {(s.rsRank>=70 && (s.rsTrend?.vs4w||0)>0 && s.swingMomentum>=60) && (
                          <span title="Triple: RS>70+Accel>0+Mom>60" style={{color:'var(--green)',fontWeight:700,marginRight:3}}>★</span>
                        )}
                        {s.rsLineNewHigh && (
                          <span title="RS Line at 52wk high — stock outperforming SPY. IBD #1 signal." style={{color:'var(--gold)',fontWeight:700,marginRight:3}}>⭐</span>

                        {(s.rsTrend?.vs4w>5 && s.rsRank>=55 && s.rsRank<70) && (

                        )}
                        {s.vcpForming && (

                        {s.stage===4 && <span title="S4: Downtrend. Avoid all longs." style={{color:'var(--red)',fontWeight:700,marginRight:3}}>S4</span>}
                        {s.sepaScore!=null && <span title={s.sepa?Object.entries(s.sepa).map(([k,v])=>`${k}:${v===true?'✓':v===false?'✗':'?'}`).join(' '):'SEPA score'} style={{color:s.sepaScore>=6?'var(--green)':s.sepaScore>=4?'var(--amber)':'var(--text3)',fontWeight:700}}>{s.sepaScore}/8</span>}
                      </td>

                      <td className={fmtC(s.chg1w)}>{fmtP(s.chg1w)}</td>
                      <td className={s.vsMA50>0?'up':'dn'}>{fmt(s.vsMA50,1)}%</td>

                          ? <span style={{color:'var(--green)',fontWeight:700,fontSize:10}}>🔥</span>
                          : <span style={{color:s.distFromHigh<=0.03?'var(--green)':s.distFromHigh<=0.07?'var(--amber)':'var(--text3)'}}>
                              {s.distFromHigh!=null?`-${(s.distFromHigh*100).toFixed(1)}%`:'—'}

                      }</td>
                      <td className={s.volumeRatio>1.5?'up':s.volumeRatio<0.7?'dn':''}>
                        {fmt(s.volumeRatio,2)}x
                        {s.volumeSurge && <span title="Vol surge ≥2x near highs" style={{color:'var(--amber)',marginLeft:3}}>⚡</span>}
                        {s.volumeTrend==='accumulating' && <span style={{color:'var(--green)',fontSize:9,marginLeft:3}}>ACC</span>}
                        {s.volumeTrend==='distributing' && <span style={{color:'var(--red)',fontSize:9,marginLeft:3}}>DIST</span>}
                      </td>
                      <td style={{fontSize:11}}>
                        {s.earningsDate && (
                          <span style={{color:s.daysToEarnings<=7?'var(--red)':s.daysToEarnings<=14?'var(--amber)':'var(--text3)',fontFamily:'var(--font-mono)',fontWeight:s.daysToEarnings<=14?700:400}} title={`Next earnings: ${s.earningsDate}`}>
                            ⚠{s.daysToEarnings}d
                          </span>
                        )}
                      </td>
                      <td>
                        <button className="btn btn-sm" style={{padding:'2px 8px',fontSize:9}}
                          onClick={()=>setExpandedTicker(et=>et===s.ticker?null:s.ticker)}>
                          {expandedTicker===s.ticker?'▲':'Levels'}
                        </button>
                      </td>
                    </tr>
                    {expandedTicker===s.ticker && (
                      <tr>
                        <td colSpan={99} style={{padding:0,background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
                          <div style={{padding:'12px 16px',width:'max-content',minWidth:'100%',boxSizing:'border-box'}}>
                            <InlineLevels stock={s}/>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        )}

        {/* ── RS TREND HISTORY (merged) ── */}
        {rsLoaded && (
          <RSTrendSection rsData={rsData} />
        )}

        {/* ── TRADING REFERENCE GUIDE ── */}
        <TradingGuide />
      </div>
    </div>
  );
}

// ─── SWING LAB ────────────────────────────────────────────────────────────────
function SwingLabTab({ rsData, rsLoaded, results, setResults, regime, setRegime, scanned, setScanned, summary, setSummary }) {
  const [mode,    setMode]   = useState('swing');
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState('');
  const [total,   setTotal]   = useState(0);

  async function runScan() {
    if (!rsLoaded || !rsData.length) {
      setError('Load RS data first — click "↻ REFRESH ALL" in the header, or visit RS Scanner tab');
      return;
    }
    setLoading(true); setError(''); setResults([]);

    try {
      const d = await api('/api/swing-lab/scan', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ stocks: rsData, mode }),
      });
      setResults(d.results || []);
      setRegime(d.regime || null);
      setScanned(d.scannedCount || 0);
      setTotal(d.totalInput || 0);
      setSummary(d.message || '');
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  const verdictBadge = v => {
    if (v === 'BUY')   return <span className="badge badge-buy">BUY</span>;
    if (v === 'WATCH') return <span className="badge badge-watch">WATCH</span>;
    if (v === 'AVOID') return <span className="badge badge-avoid">AVOID</span>;
    return <span className="badge badge-neutral">{v||'—'}</span>;
  };

  const confColor = c => c==='high'?'var(--green)':c==='medium'?'var(--amber)':'var(--red)';

  return (
    <div>
      <div className="panel" style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12,flexWrap:'wrap',gap:8}}>

              Use <strong style={{color:'var(--cyan)'}}>Daily Picks</strong> first to get your candidate list (algo, free, fast). Then use <strong style={{color:'var(--amber)'}}>Swing Lab</strong> to generate AI thesis + verified earnings dates + news context on your shortlist.<br/>
              <span style={{color:'var(--text3)'}}>Swing Lab requires Anthropic API key · Filter: RS≥70 + SwingMom≥55 + within 7% of high + vol≥1.1x</span>
            </div>
          </div>
        </div>

        {regime && <RegimeBanner regime={regime} />}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
          <div className="btn-group">
            {['swing','position','both'].map(m => (
              <button key={m} className={`mode-btn ${mode===m?'active':''}`}
                onClick={() => setMode(m)}>
                {m === 'swing' ? '⚡ Swing (2-10d)' : m === 'position' ? '📈 Position (3-8w)' : '⚡📈 Both'}
              </button>

          <span style={{fontSize:10,color:'var(--text3)'}}>

        <div style={{padding:'8px 12px',background:'var(--bg3)',borderRadius:4,border:'1px solid var(--border)',marginBottom:10,fontSize:11,color:'var(--text3)'}}>

// ─── TRADE SIGNALS ────────────────────────────────────────────────────────────
function SignalsTab({ rsData }) {
  const [loading, setLoading] = useState(false);
  const [result,  setResult]  = useState('');
  const [error,   setError]   = useState('');
  const [ticker,  setTicker]  = useState('');
  const [mode,    setMode]    = useState('swing');

  async function generate() {
    const sym = ticker.trim().toUpperCase(); if (!sym) return;
    setLoading(true); setResult(''); setError('');

    // Always get algorithmic levels first (no API key needed)
    try {
      const ad = await api('/api/trade-setup', { method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: sym, mode }) });
      if (ad?.setup) {
        const ss = ad.setup;
        setResult('## ' + sym + ' — ' + mode.toUpperCase() + ' LEVELS (ATR-based, no API key)\n\n' +
          '- **IBD RS:** ' + ad.ibdRS + '/99  · **SwingMom:** ' + ad.swingMomentum + '  · **RS Trend:** ' + (ad.rsTrend||'—') + '\n' +
          '- **vs 50MA:** ' + fmt(ad.vsMA50,1) + '%  · **vs 200MA:** ' + fmt(ad.vsMA200,1) + '%  · **ATR:** $' + ad.atr + ' (' + ad.atrPct + '% of price)\n\n' +
          '**Entry Zone:** ' + ss.entryZone + '\n' +
          '**Stop Level:** ' + ss.stopLevel + '\n' +
          '**Target 1:** ' + ss.target1 + '  · **Target 2:** ' + ss.target2 + '\n' +
          '**Risk/Reward:** ' + ss.riskReward + '  · **Stop risk:** ' + ss.stopPct + '% per share\n\n' +
          '_Position size = (1% of account) ÷ (entry − stop)_\n\n---\n' +
          '_Set ANTHROPIC_API_KEY in .env for AI thesis, news, and earnings date._');
      }
    } catch(algoErr) {
      console.warn('Algo levels failed:', algoErr.message);
    }

    // Step 2: AI analysis (appends below algo levels, requires API key)
    const stock = rsData.find(s => s.ticker === sym);
    const ctx = stock
      ? `Price:$${fmt(stock.price)} RS:${stock.rsRank}/99 vs50MA:${fmt(stock.vsMA50,1)}% vs200MA:${fmt(stock.vsMA200,1)}% volRatio:${fmt(stock.volumeRatio,2)}x distFromHigh:-${((stock.distFromHigh||0)*100).toFixed(1)}% sector:${stock.sector}`
      : 'search for current data';
    try {
      const t = await askClaude(
        `Generate ${mode==='swing'?'SWING TRADE (2-10 day)':'POSITION TRADE (3-8 week)'} signal for ${sym}. Data: ${ctx}\n\n## SETUP THESIS\nWhat makes this tradeable right now? (3-4 sentences)\n\n## MOMENTUM & RS CHECK\n- RS vs sector and SPY: improving or deteriorating?\n- Price cycle position: early breakout / mid-trend / extended / climax?\n\n## ENTRY CRITERIA\n- Ideal entry zone (specific price range)\n- Entry trigger / confirmation needed\n- Volume requirement\n\n## RISK MANAGEMENT\n- Stop loss level with specific rationale\n- Maximum position size (% of portfolio)\n\n## PRICE TARGETS\n- Target 1 (conservative)\n- Target 2 (bull case)\n- Risk/Reward Ratio\n\n## SIGNAL RATING: ★★★★★\nRate 1-5 with one sentence justification.`,
        'Elite hedge fund analyst. ## headers, - bullets. Max 600 words.',
        true
      );
      setResult(prev => prev
        ? prev + '\n\n---\n\n## AI ANALYSIS\n\n' + t
        : t);
    } catch(e) {
      // API key not set or error — algo levels already shown, that is fine
      if (!e.message.includes('ANTHROPIC')) setError(e.message);
    }
    setLoading(false);
  }

  const TOP_EXAMPLES = rsData.slice(0,10).map(s=>s.ticker);
  const EXAMPLES = TOP_EXAMPLES.length ? TOP_EXAMPLES : ['NVDA','PLTR','MSTR','LLY','AXON','GEV','COIN','CEG','CRWD','TSM'];

  return (
    <div>

// ─── AI SCANNER ───────────────────────────────────────────────────────────────
function ScannerTab() {
  const [query,   setQuery]   = useState('');
  const [loading, setLoading] = useState(false);
  const [result,  setResult]  = useState('');
  const [error,   setError]   = useState('');

  async function run(q) {
    const text = q || query; if (!text.trim()) return;
    setQuery(text); setLoading(true); setResult(''); setError('');
    try {
      const t = await askClaude(text, 'You are an elite hedge fund analyst and trader. Use ## section headers and - bullets. Max 700 words.', true);
      setResult(prev => prev
        ? prev + '\n\n---\n\n## AI ANALYSIS\n\n' + t
        : t);
    } catch(e) {
      // API key not set or error — algo levels already shown, that is fine
      if (!e.message.includes('ANTHROPIC')) setError(e.message);
    }
    setLoading(false);
  }

  const PRESETS = [
    ["Sector RS ranking",        "Which sectors have the strongest relative strength vs SPY this week? Give me a ranked list with thesis for the top 2."],
    ["Top breakouts today",      "What are the top 5 stocks breaking out today with strong volume and RS above 85? Include current price and entry levels."],
    ["Macro environment",        "What is the current macro environment — VIX level, yield curve status, Fed stance — and how should I position swing trades this week?"],
    ["Risk events this week",    "What are the key macro risk events (Fed, CPI, earnings, geopolitical) this week that could disrupt swing trades?"],
    ["Semis vs Software RS",     "Compare semiconductors vs software right now — which group has better relative strength and momentum, and why?"],
    ["Best swing setup today",   "What is the single best swing trade setup in the market today? Give me ticker, entry, stop, target, and thesis."],
  ];

  return (
    <div>
      <div className="panel">
        <div className="panel-title" style={{marginBottom:4}}>AI <span>Scanner</span></div>
        <div className="panel-sub">Ask anything about current market conditions — Claude searches the web for live context</div>

        <div className="tag-row">
          {PRESETS.map(([label, q]) => (
            <button key={label} className="preset-pill" onClick={() => run(q)}>{label}</button>
          ))}

        <div className="ai-input-row">
          <textarea className="ai-textarea" value={query} onChange={e=>setQuery(e.target.value)}
            placeholder="Ask a market question… e.g. 'Analyze NVDA for a swing trade right now'"

        {result || loading ? <div style={{marginTop:12}}><AIOutput text={result} loading={loading}/></div> : null}

    </div>
  );
}

// ─── WATCHLIST TAB ────────────────────────────────────────────────────────────
function WatchlistTab({ rsData }) {
  const [list,      setList]    = useState([]);
  const [ticker,    setTicker]  = useState('');
  const [note,      setNote]    = useState('');
  const [stage,     setStage]   = useState('watching');
  const [loading,   setLoading] = useState(false);
  const [editNote,  setEditNote] = useState(null);   // ticker being edited
  const [editVal,   setEditVal]  = useState('');     // current edit value
  const { sortData: sortWL, SH: WLSH } = useSortTable('addedAt', -1);

  useEffect(() => { loadWL(); }, []);

  async function loadWL() {
    try { const d = await api('/api/watchlist'); setList(d.watchlist || []); } catch(_) {}
  }

  async function add() {
    if (!ticker.trim()) return;
    setLoading(true);
    try {
      await api('/api/watchlist', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: ticker.toUpperCase(), note, stage }) });
      setTicker(''); setNote('');
      await loadWL();
    } catch(_) {}
    setLoading(false);
  }

  async function remove(t) {
    await api(`/api/watchlist/${t}`, { method:'DELETE' });
    await loadWL();
  }

  async function saveNote(w) {
    try {
      await api('/api/watchlist', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: w.ticker, note: editVal, stage: w.stage }) });
      setEditNote(null);
      await loadWL();
    } catch(_) {}
  }

  async function updateStage(w, newStage) {
    try {
      await api('/api/watchlist', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ticker: w.ticker, note: w.note, stage: newStage }) });
      await loadWL();
    } catch(_) {}
  }

  const stageColor = s => s==='active'?'var(--green)':s==='candidate'?'var(--amber)':'var(--text3)';
  const stageLabel = s => s==='active'?'ACTIVE TRADE':s==='candidate'?'CANDIDATE':'WATCHING';

  return (
    <div>
      <div className="panel">
        <div className="panel-title" style={{marginBottom:4}}>⭐ <span>Watchlist</span></div>
        <div className="panel-sub">Track stocks from idea → candidate → active trade. Persisted to disk.</div>

        <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
          <input value={ticker} onChange={e=>setTicker(e.target.value.toUpperCase())} placeholder="TICKER"
            style={{width:90,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'8px 10px',fontFamily:'var(--font-mono)',fontSize:13,outline:'none',letterSpacing:2}}/>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Note (optional)"
            style={{flex:1,minWidth:120,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'8px 10px',fontSize:12,outline:'none'}}/>
          <select value={stage} onChange={e=>setStage(e.target.value)}
            style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,color:'var(--text)',padding:'8px 10px',fontSize:12,outline:'none'}}>
            <option value="watching">Watching</option>
            <option value="candidate">Candidate</option>
            <option value="active">Active Trade</option>
          </select>
          <button className="btn btn-primary btn-sm" onClick={add} disabled={loading||!ticker}>+ Add</button>
        </div>

        {list.length === 0 && (
          <div className="empty">No stocks in watchlist yet. Add tickers above.</div>
        )}

        {list.length > 0 && (
          <table className="data-table">
            <thead>
              <tr>
                <th title="Trade lifecycle stage: Watching (idea), Candidate (setup forming), Active Trade (position open)">Stage</th>
                <th title="Ticker symbol">Ticker</th>
                <WLSH k="price"  label="Price"   title="Current market price"/>
                <WLSH k="chg1d"  label="1D"      title="Today's % price change"/>
                <WLSH k="chg1w"  label="1W"      title="5-day price return"/>
                <WLSH k="chg1m"  label="1M"      title="21-day price return"/>
                <WLSH k="rsRank" label="IBD RS"  title="IBD RS percentile rank 1-99. Updates each time you run the RS Scanner."/>
                <th title="RS direction: rising/flat/falling based on 7-day rank change. Arrow shows the arc.">RS Trend</th>
                <WLSH k="swingMomentum" label="SwingMom" title="Absolute price velocity (5/10/21-day ROC). ≥60=moving fast now. NOT relative to peers."/>
                <th title="Your personal notes on this position — thesis, entry level, what you're watching for">Note</th>
                <WLSH k="addedAt" label="Added"  title="Date you added this to the watchlist"/>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {sortWL(list.map(w => {
                const s2 = rsData?.find(r => r.ticker === w.ticker);
                return {...w, price:s2?.price, chg1d:s2?.chg1d, chg1w:s2?.chg1w, chg1m:s2?.chg1m,
                        rsRank:s2?.rsRank, swingMomentum:s2?.swingMomentum};
              })).map(w => {
                const s = w; // merged via sortWL map above
                return (
                  <tr key={w.ticker}>
                    <td>
                      <select value={w.stage} onChange={e=>updateStage(w,e.target.value)}
                        style={{fontSize:10,padding:'2px 6px',borderRadius:3,
                          background:stageColor(w.stage)+'22',color:stageColor(w.stage),
                          border:'1px solid '+stageColor(w.stage)+'44',
                          fontFamily:'var(--font-mono)',cursor:'pointer',outline:'none'}}>
                        <option value="watching">WATCHING</option>
                        <option value="candidate">CANDIDATE</option>
                        <option value="active">ACTIVE TRADE</option>
                      </select>
                    </td>
                    <td><span className="td-ticker">{w.ticker}</span></td>
                    <td>{s ? `$${fmt(s.price)}` : '—'}</td>
                    <td className={fmtC(s?.chg1d)}>{fmtP(s?.chg1d)}</td>
                    <td className={fmtC(s?.chg1w)}>{fmtP(s?.chg1w)}</td>
                    <td className={fmtC(s?.chg1m)}>{fmtP(s?.chg1m)}</td>
                    <td>{s ? <RSBar rs={s.rsRank}/> : '—'}</td>
                    <td>{s ? <RSTrendBadge trend={s.rsTrend} rs={s.rsRank}/> : '—'}</td>
                    <td>
                      {s?.swingMomentum != null ? <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:s.swingMomentum>=60?'var(--green)':s.swingMomentum>=45?'var(--amber)':'var(--red)'}}>{s.swingMomentum}</span> : '—'}
                    </td>
                    <td style={{maxWidth:180}}>
                      {editNote === w.ticker ? (
                        <div style={{display:'flex',gap:4}}>
                          <textarea value={editVal} onChange={e=>setEditVal(e.target.value)}
                            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveNote(w);}if(e.key==='Escape')setEditNote(null);}}
                            autoFocus rows={2}
                            placeholder="Enter note (Enter to save, Shift+Enter for newline)"
                            style={{flex:1,minWidth:100,background:'var(--bg)',border:'1px solid var(--amber)',borderRadius:3,color:'var(--text)',padding:'4px 6px',fontSize:11,outline:'none',resize:'vertical',fontFamily:'var(--font-sans)',lineHeight:1.4}}/>
                          <button onClick={()=>saveNote(w)} style={{padding:'2px 6px',background:'var(--amber)',border:'none',borderRadius:2,color:'#000',fontSize:10,cursor:'pointer',fontWeight:700}}>✓</button>
                          <button onClick={()=>setEditNote(null)} style={{padding:'2px 6px',background:'transparent',border:'1px solid var(--border)',borderRadius:2,color:'var(--text3)',fontSize:10,cursor:'pointer'}}>✕</button>
                        </div>
                      ) : (
                        <span onClick={()=>{setEditNote(w.ticker);setEditVal(w.note||'');}}
                          title="Click to edit note"
                          style={{fontSize:11,color:w.note?'var(--text2)':'var(--text3)',cursor:'text',display:'block',
                                  minWidth:60,whiteSpace:'normal',wordBreak:'break-word',lineHeight:1.4}}>
                          {w.note || <em style={{opacity:0.4}}>+ add note</em>}
                        </span>
                      )}
                    </td>
                    <td className="muted" style={{fontSize:10}}>{w.addedAt?.split('T')[0]}</td>
                    <td><button className="btn btn-sm" onClick={()=>remove(w.ticker)} style={{padding:'3px 8px',fontSize:10,color:'var(--red)',borderColor:'rgba(255,61,87,0.3)'}}>✕</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}

        <div style={{marginTop:16,padding:'12px 16px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:5,fontSize:12,color:'var(--text3)',lineHeight:1.9}}>
          <strong style={{color:'var(--amber)'}}>Workflow:</strong><br/>
          <strong style={{color:'var(--text)'}}>Watching</strong> → Found via Thematic Hunt or tip. Monitoring RS trend.<br/>
          <strong style={{color:'var(--text)'}}>Candidate</strong> → RS ≥ 75 and rising. Waiting for swing momentum to confirm.<br/>
          <strong style={{color:'var(--text)'}}>Active Trade</strong> → Position open. Track until exit.
        </div>
      </div>
    </div>
  );
}


// ─── RS TREND SECTION (embedded in RS Dashboard) ─────────────────────────────
function RSTrendSection({ rsData }) {
  const [history,  setHistory]  = useState(null);
  const [filter,   setFilter]   = useState('rising');
  const [loading,  setLoading]  = useState(false);
  const { sortData: sortTrend, SH: TrendSH } = useSortTable('current', -1);

  useEffect(() => { loadH(); }, []);

  async function loadH() {
    setLoading(true);
    try { const d = await api('/api/rs-history'); setHistory(d); } catch(_) {}
    setLoading(false);
  }

  const dirColor = d => d==='rising'?'var(--green)':d==='falling'?'var(--red)':'var(--text3)';
  const dirIcon  = d => d==='rising'?'▲':d==='falling'?'▼':'→';

  const [page, setPage] = useState(0);
  const PAGE_SIZE = 60;
  const allTrends = (history?.trends||[]).filter(t => filter==='all' || t.direction===filter);
  const trends    = allTrends; // full list for sorting, sliced in render

  return (
    <div style={{marginTop:20}}>
      <hr style={{border:'none',borderTop:'1px solid var(--border)',margin:'20px 0'}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
        <div>
          <div className="panel-title" style={{fontSize:15}}>RS <span>Trend History</span></div>
          <div style={{fontSize:11,color:'var(--text3)',lineHeight:1.8}}>
            <strong style={{color:'var(--text)'}}>What these columns mean:</strong><br/>
            RS Today = current percentile rank (85 = beats 85% of universe).
            +/- 1W = how many RS points gained or lost vs 7 days ago.
            +/- 4W = gained/lost vs 28 days ago (1 month of accumulation signal).<br/>
            +/- 3M = RS change over 90 days — positive means sustained outperformance for a full quarter.<br/>
            <strong style={{color:'var(--amber)'}}>Best setup: RS 65-79 today AND +/- 4W is +5 or more = emerging leader, entry zone.</strong>
            &nbsp;{history?.totalDays||0} days of snapshots saved.
          </div>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['rising','flat','falling','all'].map(f => (
            <button key={f} className={`mode-btn ${filter===f?'active':''}`}
              style={{fontSize:10,padding:'4px 10px',
                      borderColor:filter===f?dirColor(f):undefined,
                      color:filter===f?dirColor(f):undefined}}
              onClick={()=>setFilter(f)}>
              {dirIcon(f)} {f} ({(history?.trends||[]).filter(t=>f==='all'||t.direction===f).length})
            </button>
          ))}
        </div>
      </div>

      {history?.totalDays === 0 && (
        <div className="info-box">ℹ No history yet — pre-generated on first RS scan. Run ⟳ Scan above.</div>
      )}

      {loading ? <Loader msg="Loading RS history..."/> : trends.length > 0 && (
        <table className="data-table">
          <thead>
            <tr>
              <th title="Ticker symbol">Ticker</th>
              <TrendSH k="current"   label="RS Today" title="Current IBD RS rank (1-99, percentile vs universe). Click to sort."/>
              <TrendSH k="direction" label="Trend"    title="Direction based on 7-day RS change. Click to group rising/falling."/>
              <TrendSH k="vs1w"  label="+/- 1W"  title="RS rank change vs 7 days ago. +8 = gained 8 percentile points this week."/>
              <TrendSH k="vs2w"  label="+/- 2W"  title="RS rank change vs 14 days ago"/>
              <TrendSH k="vs4w"  label="+/- 4W"  title="RS rank change vs 28 days ago. Key: rising 4W = sustained accumulation."/>
              <TrendSH k="vs3m"  label="+/- 3M"  title="RS rank change vs 90 days ago. Full quarterly arc — most reliable signal."/>
              <th title="Actionable: ✓ SWING (RS≥70 rising), 👁 WATCH (RS≥55 rising), ✗ AVOID (RS falling below 50), ✗ FADE (falling), → HOLD (stable leader)">Signal</th>
            </tr>
          </thead>
          <tbody>
            {sortTrend(trends).map(t => {
              const interp =
                t.direction==='rising' && t.current>=80 ? '✓ SWING/POSITION — institutions accumulating' :
                t.direction==='rising' && t.current>=70 ? '✓ SWING candidate — RS entering actionable zone' :
                t.direction==='rising' && t.current>=55 ? '👁 WATCH — add to watchlist, RS approaching 70' :
                t.direction==='rising'                  ? '— Low base rising (RS below 55) — not actionable yet' :
                t.direction==='falling' && t.current<50 ? '✗ AVOID — distribution, RS weakening below 50' :
                t.direction==='falling'                 ? '✗ FADE — once-leader losing strength, avoid' :
                t.current>=75                           ? '→ HOLD — maintaining leadership, ok for positions' :
                                                          '— Neutral — monitor';
              return (
                <tr key={t.ticker}>
                  <td><span className="td-ticker">{t.ticker}</span></td>
                  <td><RSBar rs={t.current}/></td>
                  <td style={{color:dirColor(t.direction),fontFamily:'var(--font-mono)',fontWeight:700}}>
                    {dirIcon(t.direction)} {t.direction}
                  </td>
                  <td className={t.vs1w>0?'up':t.vs1w<0?'dn':''}>{t.vs1w!=null?(t.vs1w>0?'+':'')+t.vs1w:'—'}</td>
                  <td className={t.vs1m>0?'up':t.vs1m<0?'dn':''}>{t.vs1m!=null?(t.vs1m>0?'+':'')+t.vs1m:'—'}</td>
                  <td className={t.vs2m>0?'up':t.vs2m<0?'dn':''}>{t.vs2m!=null?(t.vs2m>0?'+':'')+t.vs2m:'—'}</td>
                  <td className={t.vs3m>0?'up':t.vs3m<0?'dn':''}>{t.vs3m!=null?(t.vs3m>0?'+':'')+t.vs3m:'—'}</td>
                  <td style={{fontSize:11,color:'var(--text3)'}}>{interp}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
    </div>
  );
}

              <strong style={{color:'var(--text)'}}>The Triple → S2 → VCP hierarchy — how to filter daily.</strong>
              <strong style={{color:'var(--amber)'}}>★ Triple (RS&gt;70 + Accel&gt;0 + Mom&gt;60)</strong>: Your morning candidate list. RS&gt;70 = top-tier institutional quality. Accel&gt;0 = gaining ground vs peers right now. Mom&gt;60 = absolute price velocity is strong. Together these confirm a stock that's been a long-term leader AND is actively being accumulated AND is moving now. ~15-25 stocks. This IS sufficient for swing trading. Many professional momentum traders stop here.
              <br/><strong style={{color:'var(--amber)'}}>★★ + Stage 2</strong>: Adds Weinstein stage context. Stage 2 = price above a RISING 150-day MA. This eliminates stocks that are Triple-qualifying while in a Stage 3 top (stalling) or Stage 4 decline (distribution). Without S2, you might buy a bouncing stock in a failing uptrend. With S2, you're only entering confirmed uptrends. Reduces list to ~8-15 stocks. Higher quality, fewer false starts.
              <br/><strong style={{color:'var(--amber)'}}>★★★ + VCP (best entry timing)</strong>: Volatility Contraction Pattern — 2+ contracting price ranges where each pullback is smaller than the prior (ideal: 20%→10%→5%). Higher lows on each contraction = institutions stepping in earlier = the coil before the spring. VCP gives you: a precise pivot entry (buy above the high of the last contraction on volume), the tightest possible stop (just below last contraction low), and the highest-probability R/R. S2 is the context. VCP is the trigger.
              <br/><strong style={{color:'var(--text3)'}}>Bottom line:</strong> Triple = find it. +S2 = trust it. +VCP = time it.<br/> SwingMOM is absolute price velocity (5/10/21-day ROC from a base of 50). A score of 70 means "this stock is moving fast right now in absolute price terms." It does NOT compare to peers. RS Accel is relative — how many percentile rank points the stock gained vs all universe peers over 28 days. +12 means it passed 12% of the field. Best setups have both: high RS Accel (gaining ground vs peers) AND high SwingMOM (actually moving now).<br/>
              <strong style={{color:'var(--text)'}}>Pos✓ column in RS Scanner:</strong> A pre-filter for position trades (3-8 week hold). Checks: RS≥70 + above 200MA (uptrend intact) + within 5% of 50MA (pullback zone, not extended) + RS rising 1 month (active accumulation). ✓ means this stock is in a buyable pullback inside a confirmed uptrend. Does not replace chart confirmation.<br/>
              <strong style={{color:'var(--text)'}}>Institution % &gt;100%:</strong> Not an error. When shares are lent for short selling, both the original institutional holder AND the short seller's broker report those shares in 13F filings — the numerator (reported holdings) exceeds the denominator (total float). 103% typically = high conviction + heavy short interest = potential short squeeze fuel if RS is rising and volume surges.<br/>
              Always confirm with a TradingView chart before entering. This is a screening tool, not a trade recommendation.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

                  ['S — Supply/Demand','Smaller float = more explosive moves. Short float > 15% + rising RS = squeeze candidate. Quarterly volume trend should be rising — confirms institutional buying.'],
                  ['L — Leader','IBD RS > 80 AND top 1-2 stocks in its industry group. If the group leader is weak, the group is weak. Do not settle for the 5th-best name in a sector.'],
                  ['I — Institutional','Rising institutional sponsor count quarter-over-quarter. 10-80% institutional = ideal zone. Under 10% = too undiscovered. Over 90% = over-owned, limited new buyers.'],
                  ['M — Market','Regime filter. Do not fight a BEAR market — cash is a position. 3 of 4 major indexes in confirmed uptrend = go. Mixed = half size. Bear = sideline.'],
                  ['Revenue Growth','Quarterly sales growth ≥ 20-25%. Confirms earnings growth comes from real demand, not cost-cutting. EPS up but revenue flat = accounting trick, not a business.'],
                ].map(([k,v]) => (
                  <div key={k} style={{display:'flex',gap:8,marginBottom:10,fontSize:12,borderBottom:'1px solid var(--border)',paddingBottom:8}}>
                    <span style={{color:'var(--purple)',fontWeight:700,minWidth:140,flexShrink:0,lineHeight:1.5}}>{k}</span>
                    <span style={{color:'var(--text2)',lineHeight:1.7}}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{background:'var(--bg3)',border:'1px solid rgba(196,77,255,0.3)',borderRadius:5,padding:16}}>
                <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--purple)',letterSpacing:2,fontWeight:700,marginBottom:6}}>SEPA TREND TEMPLATE — All 8 Rules (Minervini)</div>
                <div style={{fontSize:11,color:'var(--text3)',marginBottom:10}}>All 8 required for ideal setup. App scores 0-8 (criteria 3+4 each split). Enter when SEPA ≥ 6 AND VCP forming.</div>
                {[
                  ['Rule 1','Price above 200-day MA. Long-term uptrend confirmed.'],
                  ['Rule 2','Price above 150-day MA (30-week). Medium-term uptrend confirmed.'],
                  ['Rule 3','150-day MA above 200-day MA. Moving averages aligned bullishly.'],
                  ['Rule 4','200-day MA trending UP for ≥ 1 month (4-5 months ideal). A long rising 200MA = sustained institutional buying — not a short-term bounce.'],
                  ['Rule 5','50-day MA above BOTH 150-day AND 200-day MAs. Full bullish MA stack. Short-term trend confirms long-term structure.'],
                  ['Rule 6','Current price above 50-day MA. Short-term trend intact.'],
                  ['Rule 7','Price ≥ 30% above 52-week low. Stock has proven upward mobility — not just bouncing from a bottom.'],
                  ['Rule 8','Price within 25% of 52-week high. Near highs = institutional sponsorship ongoing. Far from high = accumulation not confirmed.'],
                  ['Rule +RS','IBD RS ≥ 70 (ideally ≥ 80). Confirms outperformance vs peers. Shown in RS column of app.'],
                ].map(([k,v]) => (
                  <div key={k} style={{display:'flex',gap:8,marginBottom:8,fontSize:12}}>
                    <span style={{color:k.includes('+') ? 'var(--gold)' : 'var(--purple)',fontWeight:700,minWidth:70,flexShrink:0}}>{k}</span>
                    <span style={{color:'var(--text2)',lineHeight:1.6}}>{v}</span>
                  </div>
                ))}
                <div style={{marginTop:12,padding:'10px 12px',background:'rgba(196,77,255,0.08)',borderRadius:4,fontSize:12,lineHeight:1.8}}>
                  <strong style={{color:'var(--purple)'}}>VCP within SEPA — The Complete Setup:</strong><br/>
                  Stage 2 (SEPA passing) is the context. VCP is the timing. Textbook VCP has 2-5 contractions where each pullback range roughly halves (e.g., 20%→10%→5%). Higher lows on each contraction = buyers stepping in earlier = coiling. Entry: break above the pivot (high of last contraction) on ≥40-50% above-average volume. Stop: just below the last contraction low — tightest possible risk. This is Minervini primary setup.
                </div>
              </div>
            </div>
          )}

          {activeSection === 'workflow' && (
            <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:5,padding:16}}>
              <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text3)',letterSpacing:2,fontWeight:700,marginBottom:14}}>🔄 DAILY TRADING WORKFLOW</div>
              <div style={{display:'grid',gap:10,gridTemplateColumns:'1fr 1fr'}}>
                {[
                  ['1. Market Pulse (2 min)','Check regime. BEAR = no new longs, go to cash. CAUTION = half size. BULL = full size. Yield curve (10Y−3M): >+100bps = healthy, 0 to +100bps = late-cycle caution, negative = INVERTED (historically 80% recession signal within 12-18 months — but markets can still rally for months after first inversion, so do not short on inversion alone — tighten stops and reduce leverage). UUP = US Dollar ETF (tracks DXY basket).'],
                  ['2. Sectors Tab (2 min)','Which 2-3 sectors are leading by RS Accel? Check the Signals column directly — ⭐RS↑H means the sector ETF is outperforming SPY (strongest confirmation). VCP on a sector ETF = entire sector coiling. S2 = Stage 2 uptrend. Money flows sector-first: ⭐ on sector + ⭐ on stock = highest conviction.'],
                  ['3. RS Dashboard — Sort by RS Accel (3 min)','Sort ↓ by RS Accel. Fastest-accelerating stocks rise to top. Look for ★BEST + ⭐RS↑H + VCP combinations. These are your candidates.'],
                  ['4. Bottom-up Discovery (5 min)','Finviz.com free screen: EPS growth > 25%, price above 200MA, RS > 70. Cross-reference with RS Accel column here. Any ↗EMRG stocks with EPS acceleration?'],
                  ['5. Click Levels on candidates (2 min each)','SEPA score ≥ 4? CAN SLIM score ≥ 4? EPS accelerating? Stage 2? Short float > 15% = bonus. Only proceed if ≥ 3 of 4 pass.'],
                  ['6. Swing Lab (1 min)','Run scan for ATR-based entry/stop/target. Regime-adjusted sizing. Earnings warning check. BUY-rated = candidates for today.'],
                  ['7. Watchlist (ongoing)','Move ↗EMRG stocks from Watching → Candidate when SEPA ≥ 4. Move to Active Trade when you enter.'],
                  ['Non-negotiable rules','Never hold swing through earnings. Stop = 1.5×ATR, no exceptions. Regime BEAR = cash only. One bad trade handled correctly > ten good trades handled poorly.'],
                ].map(([step, desc]) => (
                  <div key={step} style={{padding:'10px 12px',background:'var(--bg2)',borderRadius:4,borderLeft:'2px solid var(--border)'}}>
                    <div style={{fontSize:11,color:'var(--text)',fontWeight:700,marginBottom:4}}>{step}</div>
                    <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.6}}>{desc}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}


function SectorIndustryRSTrend({ type, title, api: apiPath }) {
  const [history,  setHistory]  = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [open,     setOpen]     = useState(false);
  const { sortData: sortSI, SH: SISH } = useSortTable('current', -1);

  async function load() {
    if (history) return; // already loaded
    setLoading(true);
    try { const d = await api(apiPath); setHistory(d); } catch(_) {}
    setLoading(false);
  }

  function handleOpen() {
    setOpen(o => !o);
    if (!open && !history) load();
  }

  const dirColor = d => d==='rising'?'var(--green)':d==='falling'?'var(--red)':'var(--text3)';
  const dirIcon  = d => d==='rising'?'▲':d==='falling'?'▼':'→';
  const trends   = history?.trends || [];

  return (
    <div style={{marginTop:20}}>
      <hr style={{border:'none',borderTop:'1px solid var(--border)',margin:'20px 0'}}/>
      <button className="btn btn-sm" onClick={handleOpen} style={{marginBottom:10}}>
        {open?'▼':'▶'} {title} ({trends.length > 0 ? `${trends.length} items, ${history?.totalDays||0} snapshots` : 'click to load'})
      </button>
      {open && (
        <div>
          {loading && <Loader msg={`Loading ${type} RS history...`}/>}
          {history?.totalDays === 0 && (
            <div className="info-box">ℹ No {type} RS history yet. Load the {type} tab to start building history.</div>
          )}
          {trends.length > 0 && (
            <table className="data-table">
              <thead>
                <tr>
                  <th title="Sector or industry ETF ticker symbol">Name</th>
                  <SISH k="current"   label="IBD RS" title="Current RS percentile rank (1-99) within its universe — sectors vs sectors, industries vs industries"/>
                  <SISH k="direction" label="Trend"  title="Direction: rising >+3 pts in 7 days, falling <-3 pts, flat otherwise"/>
                  <SISH k="vs1w"      label="vs 1W"  title="RS rank change vs 7 days ago. Positive = gaining ground this week."/>
                  <SISH k="vs1m"      label="vs 1M"  title="RS rank change vs 30 days ago. Shows 1-month momentum arc."/>
                  <SISH k="vs2m"      label="vs 2M"  title="RS rank change vs 60 days ago. Distinguishes new vs sustained trends."/>
                  <SISH k="vs3m"      label="vs 3M"  title="RS rank change vs 90 days ago. Full quarterly arc — most reliable signal."/>
                  <th title="Actionable label derived from RS level + direction. Leading=RS≥80 rising (rotate in), Improving=RS≥60 rising (watch), Fading=falling (reduce), Lagging=RS<50 falling (avoid).">Signal</th>
                </tr>
              </thead>
              <tbody>
                {sortSI(trends).map(t => {
                  const signal =
                    t.direction==='rising'  && t.current>=80 ? 'Leading — rotate in' :
                    t.direction==='rising'  && t.current>=60 ? 'Improving — watch' :
                    t.direction==='falling' && t.current<50  ? 'Lagging — avoid' :
                    t.direction==='falling'                  ? 'Fading — reduce' :
                                                               'Neutral — hold';
                  return (
                    <tr key={t.ticker}>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--cyan)'}}>{t.ticker}</td>
                      <td><RSBar rs={t.current}/></td>
                      <td style={{color:dirColor(t.direction),fontFamily:'var(--font-mono)',fontWeight:700}}>
                        {dirIcon(t.direction)} {t.direction}
                      </td>
                      <td className={t.vs1w>0?'up':t.vs1w<0?'dn':''}>{t.vs1w!=null?(t.vs1w>0?'+':'')+t.vs1w:'—'}</td>
                      <td className={t.vs1m>0?'up':t.vs1m<0?'dn':''}>{t.vs1m!=null?(t.vs1m>0?'+':'')+t.vs1m:'—'}</td>
                      <td className={t.vs2m>0?'up':t.vs2m<0?'dn':''}>{t.vs2m!=null?(t.vs2m>0?'+':'')+t.vs2m:'—'}</td>
                      <td className={t.vs3m>0?'up':t.vs3m<0?'dn':''}>{t.vs3m!=null?(t.vs3m>0?'+':'')+t.vs3m:'—'}</td>
                      <td style={{fontSize:11,color:'var(--text3)'}}>{signal}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
